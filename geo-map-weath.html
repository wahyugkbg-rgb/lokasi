<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peta Super HQ · Multi Layer + GPS & Parameter</title>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Control Geocoder -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0b1a2f;
      height: 100vh;
      overflow: hidden;
    }
    #map {
      height: 100vh;
      width: 100vw;
      background: #1a2a3a;
    }
    /* Dashboard bawah */
    .dashboard {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(10, 20, 35, 0.75);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 28px;
      padding: 18px 20px;
      color: #f0f6ff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1000;
      pointer-events: none;
    }
    .dashboard > * {
      pointer-events: auto;
    }
    .param-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #cfdfff;
    }
    .param-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 14px 4px 10px;
      border-radius: 40px;
      border-left: 2px solid #3b9eff;
    }
    .param-item i {
      color: #6ab0ff;
      width: 18px;
      font-size: 0.9rem;
    }
    .param-item span {
      font-weight: 500;
      color: #fff;
      margin-right: 2px;
    }
    .param-item small {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 60px;
      padding: 4px 8px 4px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 180px;
      flex: 1 1 200px;
    }
    .search-box i {
      color: #7aa9ff;
      margin-right: 8px;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 8px 0;
      color: #fff;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
    }
    .search-box input::placeholder {
      color: #a0bada;
      font-weight: 300;
    }
    .gps-btn {
      background: #1e6fff;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30, 111, 255, 0.4);
      transition: 0.2s;
      white-space: nowrap;
    }
    .gps-btn:hover {
      background: #3a7fff;
      transform: scale(1.02);
    }
    .gps-btn i {
      font-size: 1rem;
    }
    /* Layer control kustom di kiri atas */
    .layer-control-container {
      position: absolute;
      top: 100px;
      left: 20px;
      z-index: 800;
      background: rgba(10, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      color: #e0ecff;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 130px;
    }
    .layer-control-container .layer-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .layer-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #c0d6f0;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .layer-btn i {
      width: 18px;
      font-size: 0.9rem;
      color: #6ab0ff;
    }
    .layer-btn:hover {
      background: rgba(30, 111, 255, 0.2);
      border-color: #3b9eff;
    }
    .layer-btn.active {
      background: rgba(30, 111, 255, 0.25);
      border-color: #3b9eff;
      color: #fff;
      box-shadow: 0 0 12px rgba(30, 111, 255, 0.2);
    }
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
      border-radius: 16px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: rgba(12, 28, 48, 0.8) !important;
      backdrop-filter: blur(4px);
      color: #e0ecff !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    .leaflet-control-zoom a:hover {
      background: #1a3a66 !important;
    }
    .leaflet-control-geocoder {
      border-radius: 40px !important;
      background: rgba(8, 22, 40, 0.8) !important;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12) !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
      overflow: hidden;
    }
    .leaflet-control-geocoder-form input {
      background: transparent !important;
      color: #fff !important;
      padding: 10px 16px !important;
      font-size: 0.9rem !important;
    }
    .leaflet-control-geocoder-form input::placeholder {
      color: #9ab0d0 !important;
    }
    .leaflet-control-geocoder-icon {
      background: #1e6fff !important;
      border-radius: 0 40px 40px 0 !important;
      color: white !important;
    }
    .my-location-marker {
      filter: drop-shadow(0 0 12px #3b9eff);
    }
    .loading-gps {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      padding: 20px 32px;
      border-radius: 60px;
      color: white;
      font-weight: 400;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      align-items: center;
      gap: 14px;
      font-size: 1rem;
      pointer-events: none;
    }
    .loading-gps i {
      font-size: 1.6rem;
      color: #6ab0ff;
    }
    @media (max-width: 700px) {
      .dashboard {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        bottom: 10px;
        left: 10px;
        right: 10px;
        padding: 14px;
        border-radius: 24px;
      }
      .param-grid {
        font-size: 0.75rem;
        gap: 6px 12px;
        justify-content: center;
      }
      .search-box {
        min-width: unset;
      }
      .gps-btn {
        justify-content: center;
        padding: 10px;
      }
      .layer-control-container {
        top: 80px;
        left: 10px;
        padding: 10px 12px;
        min-width: 100px;
      }
      .layer-btn {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="gpsLoading" class="loading-gps">
    <i class="fas fa-satellite-dish fa-spin"></i> Mengaktifkan GPS & posisi...
  </div>

  <!-- Layer Control Kustom -->
  <div class="layer-control-container" id="layerControl">
    <div class="layer-title"><i class="fas fa-layer-group"></i> Peta</div>
    <button class="layer-btn active" data-layer="hybrid"><i class="fas fa-globe"></i> Hybrid</button>
    <button class="layer-btn" data-layer="satellite"><i class="fas fa-satellite"></i> Satelit</button>
    <button class="layer-btn" data-layer="terrain"><i class="fas fa-mountain"></i> Terrain</button>
    <button class="layer-btn" data-layer="street"><i class="fas fa-road"></i> Street</button>
  </div>

  <!-- Dashboard Bawah -->
  <div class="dashboard" id="dashboard">
    <div class="param-grid" id="paramGrid">
      <div class="param-item"><i class="fas fa-thermometer-half"></i> <span id="suhu">--</span>°C <small>suhu</small></div>
      <div class="param-item"><i class="fas fa-tint"></i> <span id="kelembaban">--</span>% <small>humidity</small></div>
      <div class="param-item"><i class="fas fa-mountain"></i> <span id="ketinggian">--</span>m <small>alt</small></div>
      <div class="param-item"><i class="fas fa-sun"></i> <span id="uv">--</span> UV <small>index</small></div>
      <div class="param-item"><i class="fas fa-fire"></i> <span id="kebakaran">--</span> <small>fire</small></div>
      <div class="param-item"><i class="fas fa-earth-asia"></i> <span id="gempa">--</span> <small>gempa</small></div>
      <div class="param-item"><i class="fas fa-volcano"></i> <span id="letusan">--</span> <small>vulkanik</small></div>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <div class="search-box" id="searchBox">
        <i class="fas fa-search"></i>
        <input type="text" id="addressInput" placeholder="Cari alamat / lokasi (RW/RT)..." />
      </div>
      <button class="gps-btn" id="gpsBtn"><i class="fas fa-location-dot"></i> Posisi Saya</button>
    </div>
  </div>

  <script>
    (function() {
      // Inisialisasi peta
      const map = L.map('map', {
        zoomControl: true,
        fadeAnimation: true,
        zoomAnimation: true,
        attributionControl: true
      }).setView([-2.5489, 118.0149], 5);

      // Definisi layer-layer
      const layerDefs = {
        hybrid: {
          name: 'Hybrid',
          layers: [
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
              attribution: '&copy; ESRI',
              maxZoom: 22
            }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
              attribution: '&copy; ESRI',
              maxZoom: 22,
              opacity: 0.5,
              zIndex: 2
            })
          ]
        },
        satellite: {
          name: 'Satelit',
          layers: [
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
              attribution: '&copy; ESRI',
              maxZoom: 22
            })
          ]
        },
        terrain: {
          name: 'Terrain',
          layers: [
            L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
              attribution: '&copy; OpenTopoMap',
              maxZoom: 17
            }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
              attribution: '&copy; ESRI',
              maxZoom: 22,
              opacity: 0.3,
              zIndex: 2
            })
          ]
        },
        street: {
          name: 'Street',
          layers: [
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '&copy; OpenStreetMap',
              maxZoom: 19
            }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
              attribution: '&copy; ESRI',
              maxZoom: 22,
              opacity: 0.3,
              zIndex: 2
            })
          ]
        }
      };

      // Container untuk layer aktif
      let activeLayers = [];
      let currentLayerKey = 'hybrid';

      function setLayer(key) {
        // Hapus semua layer yang aktif
        activeLayers.forEach(l => map.removeLayer(l));
        activeLayers = [];

        // Tambahkan layer baru
        const def = layerDefs[key];
        if (def) {
          def.layers.forEach(l => {
            l.addTo(map);
            activeLayers.push(l);
          });
          currentLayerKey = key;
        }

        // Update tombol aktif
        document.querySelectorAll('.layer-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.layer === key) {
            btn.classList.add('active');
          }
        });
      }

      // Event listener tombol layer
      document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const key = this.dataset.layer;
          if (key && key !== currentLayerKey) {
            setLayer(key);
          }
        });
      });

      // Set default hybrid
      setLayer('hybrid');

      // Zoom maksimum 50x
      map.setMaxZoom(50);
      map.options.maxZoom = 50;

      // Variabel marker & posisi
      let userMarker = null;
      let userCircle = null;
      let currentPosition = null;

      // Elemen UI parameter
      const suhuEl = document.getElementById('suhu');
      const kelembabanEl = document.getElementById('kelembaban');
      const ketinggianEl = document.getElementById('ketinggian');
      const uvEl = document.getElementById('uv');
      const kebakaranEl = document.getElementById('kebakaran');
      const gempaEl = document.getElementById('gempa');
      const letusanEl = document.getElementById('letusan');
      const gpsLoading = document.getElementById('gpsLoading');
      const gpsBtn = document.getElementById('gpsBtn');

      // --- Update parameter (simulasi real condition) ---
      function updateParameters(lat, lng) {
        const suhu = (28 + Math.sin(lat / 10) * 4 + Math.cos(lng / 15) * 3 + (Math.random() - 0.5) * 2).toFixed(1);
        const kelembaban = (65 + Math.sin(lat / 8) * 15 + Math.cos(lng / 12) * 10 + (Math.random() - 0.5) * 8).toFixed(0);
        const ketinggian = (Math.abs(Math.sin(lat / 20) * 400 + Math.cos(lng / 25) * 300) + 50 + (Math.random() - 0.5) * 40).toFixed(0);
        const uv = (6 + Math.sin(lat / 30) * 3 + Math.cos(lng / 20) * 2 + (Math.random() - 0.5) * 1.5).toFixed(1);
        const fire = Math.random() > 0.85 ? '🔥 Aktif' : '☑️ Aman';
        const earthquake = Math.random() > 0.92 ? '⚠️ Terdeteksi' : '✅ Stabil';
        const volcano = Math.random() > 0.95 ? '🌋 Siaga' : '🔹 Normal';

        suhuEl.textContent = suhu;
        kelembabanEl.textContent = kelembaban;
        ketinggianEl.textContent = ketinggian;
        uvEl.textContent = uv;
        kebakaranEl.textContent = fire;
        gempaEl.textContent = earthquake;
        letusanEl.textContent = volcano;
      }

      // --- GPS / Geolokasi ---
      function locateUser(showLoading = true) {
        if (!navigator.geolocation) {
          alert('GPS tidak didukung di perangkat ini.');
          return;
        }
        if (showLoading) {
          gpsLoading.style.display = 'flex';
        }
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            currentPosition = [lat, lng];
            updateUserMarker(lat, lng);
            map.setView([lat, lng], 18, { animate: true });
            updateParameters(lat, lng);
            gpsLoading.style.display = 'none';
          },
          function(error) {
            gpsLoading.style.display = 'none';
            console.warn('GPS error:', error);
            alert('Gagal mengambil posisi GPS. Pastikan izin lokasi diberikan.\nError: ' + error.message);
            const fallback = [-6.2088, 106.8456];
            currentPosition = fallback;
            updateUserMarker(fallback[0], fallback[1]);
            map.setView(fallback, 14);
            updateParameters(fallback[0], fallback[1]);
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
      }

      // --- Update marker user ---
      function updateUserMarker(lat, lng) {
        if (userMarker) map.removeLayer(userMarker);
        if (userCircle) map.removeLayer(userCircle);
        const icon = L.divIcon({
          className: 'my-location-marker',
          html: '<i class="fas fa-circle" style="color: #3b9eff; font-size: 28px; text-shadow: 0 0 24px #3b9effaa; background: rgba(0,0,0,0.2); border-radius: 50%; padding: 2px;"></i>',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });
        userMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
        userCircle = L.circle([lat, lng], {
          radius: 40,
          color: '#3b9eff',
          weight: 1.5,
          opacity: 0.6,
          fillColor: '#1e6fff',
          fillOpacity: 0.15,
        }).addTo(map);
        updateParameters(lat, lng);
      }

      // --- Geocoder ---
      const geocoder = L.Control.Geocoder.nominatim({
        geocodingQueryParams: { countrycodes: 'id', limit: 5, 'accept-language': 'id' }
      });

      const geocoderControl = L.Control.geocoder({
        geocoder: geocoder,
        position: 'topleft',
        placeholder: 'Cari alamat / RW/RT...',
        defaultMarkGeocode: true,
        collapsed: false,
        suggestMinLength: 2,
        errorMessage: 'Lokasi tidak ditemukan'
      }).addTo(map);

      geocoderControl.on('markgeocode', function(e) {
        const center = e.geocode.center;
        if (center) {
          map.setView(center, 18);
          updateUserMarker(center.lat, center.lng);
          currentPosition = [center.lat, center.lng];
          updateParameters(center.lat, center.lng);
        }
      });

      // Input search manual
      document.getElementById('addressInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const query = this.value.trim();
          if (query.length > 1) {
            geocoder.geocode(query, function(results) {
              if (results.length > 0) {
                const r = results[0];
                const center = r.center;
                if (center) {
                  map.setView(center, 18);
                  updateUserMarker(center.lat, center.lng);
                  currentPosition = [center.lat, center.lng];
                  updateParameters(center.lat, center.lng);
                }
              } else {
                alert('Alamat / lokasi tidak ditemukan. Coba lebih spesifik (RW/RT).');
              }
            });
          }
        }
      });

      // Tombol GPS
      gpsBtn.addEventListener('click', function() {
        locateUser(true);
      });

      // Inisialisasi
      window.addEventListener('load', function() {
        map.setView([-2.5, 118.0], 5);
        locateUser(true);
        updateParameters(-2.5, 118.0);
      });

      // Update parameter periodik
      setInterval(function() {
        if (currentPosition) {
          updateParameters(currentPosition[0], currentPosition[1]);
        } else {
          updateParameters(-2.5, 118.0);
        }
      }, 12000);

      // Klik peta update parameter
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        updateParameters(lat, lng);
      });

    })();
  </script>
</body>
</html>
