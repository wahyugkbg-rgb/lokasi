<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Peta Super HQ + Lokasi Saya</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Font Awesome untuk ikon keren -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
        }
        
        #map {
            height: 100vh;
            width: 100%;
            z-index: 1;
        }
        
        /* ===== TOMBOL KUSTOM ===== */
        .custom-control-btn {
            background: white;
            padding: 12px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            color: #1a1a2e;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }
        
        .custom-control-btn i {
            font-size: 18px;
            color: #2563eb;
        }
        
        .custom-control-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 30px rgba(37, 99, 235, 0.35);
            background: #f8faff;
        }
        
        .custom-control-btn:active {
            transform: scale(0.95);
        }
        
        /* Animasi pulsa pada tombol */
        .custom-control-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(37,99,235,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .custom-control-btn:hover::after {
            opacity: 1;
        }
        
        /* ===== INDICATOR LOADING ===== */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            flex-direction: column;
            gap: 20px;
        }
        
        #loadingOverlay.active {
            display: flex;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top: 5px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #loadingText {
            color: white;
            font-size: 18px;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        
        /* ===== INFO KOORDINAT ===== */
        #coordinateInfo {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            display: none;
            z-index: 999;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            text-align: center;
            gap: 4px;
            flex-direction: column;
            letter-spacing: 0.5px;
            max-width: 90%;
        }
        
        #coordinateInfo.visible {
            display: flex;
        }
        
        #coordinateInfo .label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.6;
            letter-spacing: 1px;
        }
        
        #coordinateInfo .coords {
            font-size: 15px;
            font-weight: 600;
            color: #60a5fa;
        }
        
        #coordinateInfo .accuracy {
            font-size: 11px;
            opacity: 0.7;
        }
        
        /* ===== TOMBOL RESET ZOOM ===== */
        #resetZoomBtn {
            position: fixed;
            bottom: 160px;
            right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
            cursor: pointer;
            font-size: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 999;
            color: #1a1a2e;
        }
        
        #resetZoomBtn:hover {
            transform: scale(1.1);
            background: #f0f4ff;
        }
        
        #resetZoomBtn.visible {
            display: flex;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .custom-control-btn {
                padding: 10px 16px;
                font-size: 13px;
                gap: 8px;
            }
            
            .custom-control-btn i {
                font-size: 16px;
            }
            
            #coordinateInfo {
                bottom: 90px;
                padding: 8px 16px;
                font-size: 11px;
                width: 90%;
            }
            
            #coordinateInfo .coords {
                font-size: 13px;
            }
            
            #resetZoomBtn {
                width: 42px;
                height: 42px;
                font-size: 17px;
                bottom: 145px;
                right: 15px;
            }
        }
        
        /* Custom marker style */
        .custom-marker {
            background: none;
            border: none;
        }
        
        .custom-marker i {
            font-size: 38px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }
        
        /* Animasi pulse untuk marker */
        .pulse-marker {
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- ===== PETA ===== -->
    <div id="map"></div>

    <!-- ===== LOADING OVERLAY ===== -->
    <div id="loadingOverlay">
        <div class="loader"></div>
        <div id="loadingText">⏳ Mengambil posisi Anda...</div>
    </div>

    <!-- ===== INFO KOORDINAT ===== -->
    <div id="coordinateInfo">
        <span class="label">📍 Posisi Anda</span>
        <span class="coords" id="coordDisplay">-6.2088, 106.8456</span>
        <span class="accuracy" id="accuracyDisplay">Akurasi: ±10m</span>
    </div>

    <!-- ===== TOMBOL RESET ZOOM ===== -->
    <button id="resetZoomBtn" title="Reset tampilan peta">
        <i class="fas fa-globe-asia"></i>
    </button>

    <script>
        // ============================================
        // 1. INISIALISASI PETA DENGAN TILE SUPER HQ
        // ============================================
        const map = L.map('map', {
            center: [-2.5, 118.0],
            zoom: 5,
            zoomControl: true,
            fadeAnimation: true,
            zoomAnimation: true,
            markerZoomAnimation: true
        });

        // --- TILE LAYER SUPER HQ (OpenStreetMap + peningkatan) ---
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 20,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
            subdomains: 'abc'
        }).addTo(map);

        // --- ALTERNATIF: TILE SATELIT HD (Esri) ---
        // Uncomment di bawah jika ingin peta satelit
        /*
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.esri.com">Esri</a>'
        }).addTo(map);
        */

        // --- TAMBAHAN: LAYER LABEL (opsional) ---
        // Untuk menambahkan nama jalan di atas satelit
        /*
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
        */

        // ============================================
        // 2. TOMBOL "LIHAT POSISI SAYA"
        // ============================================
        const locateControl = L.control({ position: 'bottomright' });

        locateControl.onAdd = function() {
            const div = L.DomUtil.create('div');
            div.innerHTML = `
                <button class="custom-control-btn" id="locateBtn">
                    <i class="fas fa-crosshairs"></i>
                    <span>Lihat Posisi Saya</span>
                </button>
            `;
            return div;
        };

        locateControl.addTo(map);

        // ============================================
        // 3. VARIABEL GLOBAL
        // ============================================
        let userMarker = null;
        let userCircle = null;
        let isLocating = false;
        let initialZoom = 5;
        let initialCenter = [-2.5, 118.0];

        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const coordInfo = document.getElementById('coordinateInfo');
        const coordDisplay = document.getElementById('coordDisplay');
        const accuracyDisplay = document.getElementById('accuracyDisplay');
        const resetBtn = document.getElementById('resetZoomBtn');

        // ============================================
        // 4. FUNGSI MENAMPILKAN LOKASI
        // ============================================
        function showLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            // Sembunyikan loading
            loadingOverlay.classList.remove('active');
            isLocating = false;

            // Hapus marker & circle sebelumnya
            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }
            if (userCircle) {
                map.removeLayer(userCircle);
                userCircle = null;
            }

            // --- BUAT MARKER KUSTOM DENGAN ICON FONT AWESOME ---
            const iconHtml = `
                <div style="
                    background: #2563eb;
                    width: 48px;
                    height: 48px;
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    border: 3px solid white;
                    box-shadow: 0 4px 20px rgba(37, 99, 235, 0.6);
                    animation: pulse 2s ease-in-out infinite;
                ">
                    <i class="fas fa-user" style="color: white; font-size: 22px;"></i>
                </div>
            `;

            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: iconHtml,
                iconSize: [48, 48],
                iconAnchor: [24, 24],
                popupAnchor: [0, -30]
            });

            userMarker = L.marker([lat, lng], { icon: customIcon })
                .addTo(map)
                .bindPopup(`
                    <b>📍 Anda di sini</b><br>
                    <b>Lat:</b> ${lat.toFixed(6)}<br>
                    <b>Lng:</b> ${lng.toFixed(6)}<br>
                    <b>Akurasi:</b> ±${Math.round(accuracy)}m
                `)
                .openPopup();

            // --- LINGKARAN AKURASI ---
            userCircle = L.circle([lat, lng], {
                radius: accuracy,
                color: '#2563eb',
                fillColor: '#3b82f6',
                fillOpacity: 0.15,
                weight: 3,
                dashArray: '8 6',
                opacity: 0.8
            }).addTo(map);

            // --- ZOOM KE LOKASI ---
            const zoomLevel = accuracy > 100 ? 14 : 16;
            map.flyTo([lat, lng], zoomLevel, {
                duration: 1.5,
                easeLinearity: 0.25
            });

            // --- TAMPILKAN INFO KOORDINAT ---
            coordDisplay.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            accuracyDisplay.textContent = `Akurasi: ±${Math.round(accuracy)}m`;
            coordInfo.classList.add('visible');

            // --- TAMPILKAN TOMBOL RESET ---
            resetBtn.classList.add('visible');

            // Kirim notifikasi sukses (opsional)
            if ('vibrate' in navigator) {
                navigator.vibrate(50);
            }
        }

        // ============================================
        // 5. FUNGSI ERROR HANDLING
        // ============================================
        function handleLocationError(error) {
            loadingOverlay.classList.remove('active');
            isLocating = false;

            let message = '❌ Gagal mengambil lokasi. ';
            switch(error.code) {
                case 1:
                    message += 'Izinkan akses lokasi di browser Anda.';
                    break;
                case 2:
                    message += 'Sinyal GPS tidak tersedia. Coba di luar ruangan.';
                    break;
                case 3:
                    message += 'Waktu habis. Coba lagi.';
                    break;
                default:
                    message += error.message || 'Terjadi kesalahan tidak diketahui.';
            }
            
            alert(message);
            console.error('Geolocation error:', error);
        }

        // ============================================
        // 6. FUNGSI MULAI PENCARIAN LOKASI
        // ============================================
        function startLocating() {
            if (isLocating) return;
            
            // Cek dukungan geolokasi
            if (!navigator.geolocation) {
                alert('❌ Browser Anda tidak mendukung Geolokasi.');
                return;
            }

            // Tampilkan loading
            isLocating = true;
            loadingOverlay.classList.add('active');
            loadingText.textContent = '⏳ Mengambil posisi Anda...';
            
            // Sembunyikan info sebelumnya
            coordInfo.classList.remove('visible');

            // Panggil geolokasi
            navigator.geolocation.getCurrentPosition(
                showLocation,
                handleLocationError,
                {
                    enableHighAccuracy: true,
                    timeout: 20000,
                    maximumAge: 0
                }
            );

            // Timeout fallback (jika terlalu lama)
            setTimeout(() => {
                if (isLocating) {
                    loadingOverlay.classList.remove('active');
                    isLocating = false;
                    alert('⏱️ Waktu pencarian lokasi habis. Coba lagi.');
                }
            }, 25000);
        }

        // ============================================
        // 7. EVENT LISTENER
        // ============================================
        
        // --- Tombol Locate ---
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('#locateBtn');
            if (btn) {
                e.preventDefault();
                startLocating();
            }
        });

        // --- Tombol Reset Zoom ---
        resetBtn.addEventListener('click', function() {
            map.flyTo(initialCenter, initialZoom, {
                duration: 1.2,
                easeLinearity: 0.3
            });
            
            // Sembunyikan info & tombol reset
            coordInfo.classList.remove('visible');
            resetBtn.classList.remove('visible');
            
            // Hapus marker & circle
            if (userMarker) {
                map.removeLayer(userMarker);
                userMarker = null;
            }
            if (userCircle) {
                map.removeLayer(userCircle);
                userCircle = null;
            }
        });

        // --- Dukungan tombol Enter/Space pada tombol ---
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                const target = e.target.closest('#locateBtn');
                if (target) {
                    e.preventDefault();
                    startLocating();
                }
            }
        });

        // ============================================
        // 8. OPSIONAL: AUTO-LOCATE SAAT PERTAMA BUKA
        // ============================================
        // Aktifkan jika ingin otomatis cari lokasi saat halaman dimuat
        /*
        window.addEventListener('load', function() {
            setTimeout(startLocating, 1500);
        });
        */

        // ============================================
        // 9. TAMPILKAN PESAN DI KONSOLE
        // ============================================
        console.log('✅ Peta Super HQ siap digunakan!');
        console.log('📍 Klik tombol "Lihat Posisi Saya" untuk menemukan lokasi Anda.');
        console.log('🔄 Tekan tombol reset (🌍) untuk kembali ke tampilan awal.');

        // ============================================
        // 10. HANDLE RESIZE (untuk responsif)
        // ============================================
        window.addEventListener('resize', function() {
            map.invalidateSize();
        });

        console.log('🚀 Peta siap!');
    </script>

</body>
</html>
