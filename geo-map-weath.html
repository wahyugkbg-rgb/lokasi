<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peta Super HQ · Hybrid + Terrain · GPS & Parameter</title>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Control Search -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0b1a2f;
      height: 100vh;
      overflow: hidden;
    }
    #map {
      height: 100vh;
      width: 100vw;
      background: #1a2a3a;
    }
    /* overlay modern – dashboard & search */
    .dashboard {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(10, 20, 35, 0.75);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 28px;
      padding: 18px 20px;
      color: #f0f6ff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1000;
      pointer-events: none;
    }
    .dashboard > * {
      pointer-events: auto;
    }
    .param-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #cfdfff;
    }
    .param-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 14px 4px 10px;
      border-radius: 40px;
      border-left: 2px solid #3b9eff;
    }
    .param-item i {
      color: #6ab0ff;
      width: 18px;
      font-size: 0.9rem;
    }
    .param-item span {
      font-weight: 500;
      color: #fff;
      margin-right: 2px;
    }
    .param-item small {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 60px;
      padding: 4px 8px 4px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 200px;
      flex: 1 1 220px;
    }
    .search-box i {
      color: #7aa9ff;
      margin-right: 8px;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 8px 0;
      color: #fff;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
    }
    .search-box input::placeholder {
      color: #a0bada;
      font-weight: 300;
    }
    .gps-btn {
      background: #1e6fff;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30, 111, 255, 0.4);
      transition: 0.2s;
      white-space: nowrap;
    }
    .gps-btn:hover {
      background: #3a7fff;
      transform: scale(1.02);
    }
    .gps-btn i {
      font-size: 1rem;
    }
    /* custom leaflet control position */
    .leaflet-top.leaflet-left {
      top: 20px;
      left: 20px;
    }
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
      border-radius: 16px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: rgba(12, 28, 48, 0.8) !important;
      backdrop-filter: blur(4px);
      color: #e0ecff !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    .leaflet-control-zoom a:hover {
      background: #1a3a66 !important;
    }
    /* geocoder search box */
    .leaflet-control-geocoder {
      border-radius: 40px !important;
      background: rgba(8, 22, 40, 0.8) !important;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12) !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
      overflow: hidden;
    }
    .leaflet-control-geocoder-form input {
      background: transparent !important;
      color: #fff !important;
      padding: 10px 16px !important;
      font-size: 0.9rem !important;
    }
    .leaflet-control-geocoder-form input::placeholder {
      color: #9ab0d0 !important;
    }
    .leaflet-control-geocoder-icon {
      background: #1e6fff !important;
      border-radius: 0 40px 40px 0 !important;
      color: white !important;
    }
    /* custom marker */
    .my-location-marker {
      filter: drop-shadow(0 0 12px #3b9eff);
    }
    /* Responsive */
    @media (max-width: 700px) {
      .dashboard {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        bottom: 10px;
        left: 10px;
        right: 10px;
        padding: 14px;
        border-radius: 24px;
      }
      .param-grid {
        font-size: 0.75rem;
        gap: 6px 12px;
        justify-content: center;
      }
      .search-box {
        min-width: unset;
      }
      .gps-btn {
        justify-content: center;
        padding: 10px;
      }
    }
    /* loading overlay */
    .loading-gps {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      padding: 20px 32px;
      border-radius: 60px;
      color: white;
      font-weight: 400;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      align-items: center;
      gap: 14px;
      font-size: 1rem;
      pointer-events: none;
    }
    .loading-gps i {
      font-size: 1.6rem;
      color: #6ab0ff;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Loading indicator -->
  <div id="gpsLoading" class="loading-gps">
    <i class="fas fa-satellite-dish fa-spin"></i> Mengaktifkan GPS & posisi...
  </div>

  <!-- Dashboard Bawah -->
  <div class="dashboard" id="dashboard">
    <div class="param-grid" id="paramGrid">
      <div class="param-item"><i class="fas fa-thermometer-half"></i> <span id="suhu">--</span>°C <small>suhu</small></div>
      <div class="param-item"><i class="fas fa-tint"></i> <span id="kelembaban">--</span>% <small>humidity</small></div>
      <div class="param-item"><i class="fas fa-mountain"></i> <span id="ketinggian">--</span>m <small>alt</small></div>
      <div class="param-item"><i class="fas fa-sun"></i> <span id="uv">--</span> UV <small>index</small></div>
      <div class="param-item"><i class="fas fa-fire"></i> <span id="kebakaran">--</span> <small>fire</small></div>
      <div class="param-item"><i class="fas fa-earth-asia"></i> <span id="gempa">--</span> <small>gempa</small></div>
      <div class="param-item"><i class="fas fa-volcano"></i> <span id="letusan">--</span> <small>vulkanik</small></div>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <div class="search-box" id="searchBox">
        <i class="fas fa-search"></i>
        <input type="text" id="addressInput" placeholder="Cari alamat / lokasi (RW/RT)..." />
      </div>
      <button class="gps-btn" id="gpsBtn"><i class="fas fa-location-dot"></i> Posisi Saya</button>
    </div>
  </div>

  <script>
    (function() {
      // Inisialisasi peta dengan layer hybrid + terrain (satellite + labels)
      const map = L.map('map', {
        zoomControl: true,
        fadeAnimation: true,
        zoomAnimation: true,
        attributionControl: true
      }).setView([-2.5489, 118.0149], 5); // Indonesia

      // Layer hybrid: satellite + terrain + labels (ESRI)
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; ESRI &mdash; Hybrid',
        maxZoom: 22,
        subdomains: ['server', 'services']
      }).addTo(map);

      // Overlay label / terrain (transparan) untuk kesan hybrid
      L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; ESRI',
        maxZoom: 22,
        opacity: 0.5,
        zIndex: 2
      }).addTo(map);

      // tambahan terrain shading (opsional)
      L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenTopoMap',
        maxZoom: 17,
        opacity: 0.25,
        zIndex: 1
      }).addTo(map);

      // Kontrol zoom diperbesar sampai 50x (secara visual, maxNativeZoom 22 tetap, tapi kita set maxZoom 50)
      map.setMaxZoom(50);
      // Untuk memungkinkan zoom hingga 50, kita set map options
      map.options.maxZoom = 50;

      // variabel marker & posisi
      let userMarker = null;
      let userCircle = null;
      let currentPosition = null;

      // Elemen UI
      const suhuEl = document.getElementById('suhu');
      const kelembabanEl = document.getElementById('kelembaban');
      const ketinggianEl = document.getElementById('ketinggian');
      const uvEl = document.getElementById('uv');
      const kebakaranEl = document.getElementById('kebakaran');
      const gempaEl = document.getElementById('gempa');
      const letusanEl = document.getElementById('letusan');
      const gpsLoading = document.getElementById('gpsLoading');
      const gpsBtn = document.getElementById('gpsBtn');

      // --- Fungsi update parameter (simulasi real condition) ---
      function updateParameters(lat, lng) {
        // Simulasi data realistik berdasarkan koordinat (acak + tren)
        const randomFactor = () => Math.random() * 0.8 + 0.2;
        const suhu = (28 + Math.sin(lat / 10) * 4 + Math.cos(lng / 15) * 3 + (Math.random() - 0.5) * 2).toFixed(1);
        const kelembaban = (65 + Math.sin(lat / 8) * 15 + Math.cos(lng / 12) * 10 + (Math.random() - 0.5) * 8).toFixed(0);
        const ketinggian = (Math.abs(Math.sin(lat / 20) * 400 + Math.cos(lng / 25) * 300) + 50 + (Math.random() - 0.5) * 40).toFixed(0);
        const uv = (6 + Math.sin(lat / 30) * 3 + Math.cos(lng / 20) * 2 + (Math.random() - 0.5) * 1.5).toFixed(1);
        // parameter kebakaran, gempa, letusan (indikator)
        const fire = Math.random() > 0.85 ? '🔥 Aktif' : '☑️ Aman';
        const earthquake = Math.random() > 0.92 ? '⚠️ Terdeteksi' : '✅ Stabil';
        const volcano = Math.random() > 0.95 ? '🌋 Siaga' : '🔹 Normal';

        suhuEl.textContent = suhu;
        kelembabanEl.textContent = kelembaban;
        ketinggianEl.textContent = ketinggian;
        uvEl.textContent = uv;
        kebakaranEl.textContent = fire;
        gempaEl.textContent = earthquake;
        letusanEl.textContent = volcano;
      }

      // --- GPS / Geolokasi ---
      function locateUser(showLoading = true) {
        if (!navigator.geolocation) {
          alert('GPS tidak didukung di perangkat ini.');
          return;
        }
        if (showLoading) {
          gpsLoading.style.display = 'flex';
        }
        navigator.geolocation.getCurrentPosition(
          function(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            currentPosition = [lat, lng];
            // paksa GPS berjalan: kita sudah dapat posisi
            updateUserMarker(lat, lng);
            map.setView([lat, lng], 18, { animate: true });
            updateParameters(lat, lng);
            gpsLoading.style.display = 'none';
          },
          function(error) {
            gpsLoading.style.display = 'none';
            console.warn('GPS error:', error);
            alert('Gagal mengambil posisi GPS. Pastikan izin lokasi diberikan.\nError: ' + error.message);
            // fallback ke Jakarta
            const fallback = [-6.2088, 106.8456];
            currentPosition = fallback;
            updateUserMarker(fallback[0], fallback[1]);
            map.setView(fallback, 14);
            updateParameters(fallback[0], fallback[1]);
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
      }

      // --- Update marker user dengan ikon kustom ---
      function updateUserMarker(lat, lng) {
        if (userMarker) {
          map.removeLayer(userMarker);
        }
        if (userCircle) {
          map.removeLayer(userCircle);
        }
        const icon = L.divIcon({
          className: 'my-location-marker',
          html: '<i class="fas fa-circle" style="color: #3b9eff; font-size: 28px; text-shadow: 0 0 24px #3b9effaa; background: rgba(0,0,0,0.2); border-radius: 50%; padding: 2px;"></i>',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });
        userMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
        userCircle = L.circle([lat, lng], {
          radius: 40,
          color: '#3b9eff',
          weight: 1.5,
          opacity: 0.6,
          fillColor: '#1e6fff',
          fillOpacity: 0.15,
        }).addTo(map);
        // update parameter
        updateParameters(lat, lng);
      }

      // --- Geocoder dengan Leaflet Control Geocoder (mencari hingga RW/RT) ---
      const geocoder = L.Control.Geocoder.nominatim({
        geocodingQueryParams: { countrycodes: 'id', limit: 5, 'accept-language': 'id' }
      });

      const geocoderControl = L.Control.geocoder({
        geocoder: geocoder,
        position: 'topleft',
        placeholder: 'Cari alamat / RW/RT...',
        defaultMarkGeocode: true,
        collapsed: false,
        suggestMinLength: 2,
        errorMessage: 'Lokasi tidak ditemukan'
      }).addTo(map);

      // override on mark geocode untuk zoom lebih detail
      geocoderControl.on('markgeocode', function(e) {
        const bbox = e.geocode.bbox;
        const center = e.geocode.center;
        if (bbox) {
          map.fitBounds(bbox, { maxZoom: 20, padding: [30, 30] });
        } else {
          map.setView(center, 18);
        }
        // set marker sementara
        if (center) {
          updateUserMarker(center.lat, center.lng);
          currentPosition = [center.lat, center.lng];
          updateParameters(center.lat, center.lng);
        }
      });

      // juga dukung input manual di search box kita
      document.getElementById('addressInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          const query = this.value.trim();
          if (query.length > 1) {
            geocoder.geocode(query, function(results) {
              if (results.length > 0) {
                const r = results[0];
                const center = r.center;
                if (center) {
                  map.setView(center, 18);
                  updateUserMarker(center.lat, center.lng);
                  currentPosition = [center.lat, center.lng];
                  updateParameters(center.lat, center.lng);
                }
              } else {
                alert('Alamat / lokasi tidak ditemukan. Coba lebih spesifik (RW/RT).');
              }
            });
          }
        }
      });

      // Tombol GPS
      gpsBtn.addEventListener('click', function() {
        locateUser(true);
      });

      // Inisialisasi: coba GPS otomatis, jika gagal tetap tampilkan peta dengan marker default
      window.addEventListener('load', function() {
        // Tampilkan peta dengan posisi default (Indonesia)
        map.setView([-2.5, 118.0], 5);
        // coba GPS
        locateUser(true);
        // update parameter dengan dummy
        updateParameters(-2.5, 118.0);
      });

      // Paksa GPS tetap berjalan: setiap 30 detik refresh posisi (opsional)
      setInterval(function() {
        if (currentPosition) {
          // refresh parameter saja
          updateParameters(currentPosition[0], currentPosition[1]);
          // refresh GPS posisi (jika diinginkan) - kita tidak paksa agar tidak boros baterai
          // tapi user bisa tekan tombol.
        }
      }, 30000);

      // tambahan: jika user klik peta, bisa update parameter berdasarkan klik (interaktif)
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        updateParameters(lat, lng);
        // optional: update marker? tidak otomatis, biarkan marker tetap di posisi user
      });

      // override zoom control untuk zoom sampai 50x (tampilan)
      // Kita tambahkan zoom level dengan tombol + / - standar sudah bisa sampai 50
      console.log('Peta Super HQ siap. Zoom hingga 50x.');

      // --- Simulasi data kebakaran, gempa, letusan (random update) ---
      setInterval(() => {
        if (currentPosition) {
          updateParameters(currentPosition[0], currentPosition[1]);
        } else {
          updateParameters(-2.5, 118.0);
        }
      }, 12000);

    })();
  </script>
</body>
</html>
