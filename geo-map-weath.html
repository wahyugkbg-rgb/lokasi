<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peta Super HQ · Multi Layer + GPS & Parameter</title>
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Leaflet Control Geocoder -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #0b1a2f;
      height: 100vh;
      overflow: hidden;
    }
    #map {
      height: 100vh;
      width: 100vw;
      background: #1a2a3a;
    }
    /* Dashboard bawah */
    .dashboard {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(10, 20, 35, 0.75);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 28px;
      padding: 18px 20px;
      color: #f0f6ff;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 1000;
      pointer-events: none;
      transition: all 0.25s ease;
    }
    .dashboard > * {
      pointer-events: auto;
    }
    .dashboard.minimized {
      padding: 10px 16px;
      bottom: 10px;
      left: 10px;
      right: 10px;
      border-radius: 40px;
      gap: 6px;
      background: rgba(10, 20, 35, 0.8);
    }
    .dashboard.minimized .param-grid {
      display: none;
    }
    .dashboard.minimized .search-box {
      min-width: 120px;
      flex: 0 1 auto;
    }
    .dashboard.minimized .gps-btn {
      padding: 6px 12px;
      font-size: 0.75rem;
    }
    .dashboard.minimized .dashboard-toggle i {
      transform: rotate(180deg);
    }
    .param-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px 20px;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.3px;
      color: #cfdfff;
    }
    .param-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 14px 4px 10px;
      border-radius: 40px;
      border-left: 2px solid #3b9eff;
    }
    .param-item i {
      color: #6ab0ff;
      width: 18px;
      font-size: 0.9rem;
    }
    .param-item span {
      font-weight: 500;
      color: #fff;
      margin-right: 2px;
    }
    .param-item small {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .search-box {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 60px;
      padding: 4px 8px 4px 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      min-width: 180px;
      flex: 1 1 200px;
      position: relative;
    }
    .search-box i {
      color: #7aa9ff;
      margin-right: 8px;
    }
    .search-box input {
      background: transparent;
      border: none;
      padding: 8px 0;
      color: #fff;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
    }
    .search-box input::placeholder {
      color: #a0bada;
      font-weight: 300;
    }
    /* Suggestion dropdown */
    .suggestions-container {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: rgba(10, 20, 35, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
      max-height: 200px;
      overflow-y: auto;
      z-index: 2000;
      display: none;
      padding: 6px 0;
    }
    .suggestions-container .suggestion-item {
      padding: 10px 16px;
      color: #e0ecff;
      cursor: pointer;
      font-size: 0.85rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .suggestions-container .suggestion-item:last-child {
      border-bottom: none;
    }
    .suggestions-container .suggestion-item:hover {
      background: rgba(30, 111, 255, 0.2);
    }
    .suggestions-container .suggestion-item i {
      color: #6ab0ff;
      width: 18px;
      font-size: 0.8rem;
    }
    .suggestions-container .suggestion-item .suggestion-main {
      flex: 1;
    }
    .suggestions-container .suggestion-item .suggestion-detail {
      font-size: 0.7rem;
      opacity: 0.5;
    }
    .gps-btn {
      background: #1e6fff;
      border: none;
      color: white;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(30, 111, 255, 0.4);
      transition: 0.2s;
      white-space: nowrap;
    }
    .gps-btn:hover {
      background: #3a7fff;
      transform: scale(1.02);
    }
    .gps-btn i {
      font-size: 1rem;
    }
    .dashboard-toggle {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #b0c8e8;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1.1rem;
      pointer-events: auto;
      flex-shrink: 0;
    }
    .dashboard-toggle:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }
    /* Layer control */
    .layer-control-container {
      position: absolute;
      top: 100px;
      left: 20px;
      z-index: 800;
      background: rgba(10, 20, 35, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
      color: #e0ecff;
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 130px;
    }
    .layer-control-container .layer-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .layer-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #c0d6f0;
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .layer-btn i {
      width: 18px;
      font-size: 0.9rem;
      color: #6ab0ff;
    }
    .layer-btn:hover {
      background: rgba(30, 111, 255, 0.2);
      border-color: #3b9eff;
    }
    .layer-btn.active {
      background: rgba(30, 111, 255, 0.25);
      border-color: #3b9eff;
      color: #fff;
      box-shadow: 0 0 12px rgba(30, 111, 255, 0.2);
    }
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5) !important;
      border-radius: 16px !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      background: rgba(12, 28, 48, 0.8) !important;
      backdrop-filter: blur(4px);
      color: #e0ecff !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    .leaflet-control-zoom a:hover {
      background: #1a3a66 !important;
    }
    .leaflet-control-geocoder {
      display: none !important;
    }
    .my-location-marker {
      filter: drop-shadow(0 0 12px #3b9eff);
    }
    .loading-gps {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      padding: 20px 32px;
      border-radius: 60px;
      color: white;
      font-weight: 400;
      z-index: 2000;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      align-items: center;
      gap: 14px;
      font-size: 1rem;
      pointer-events: none;
    }
    .loading-gps i {
      font-size: 1.6rem;
      color: #6ab0ff;
    }
    /* scroll suggestion */
    .suggestions-container::-webkit-scrollbar {
      width: 4px;
    }
    .suggestions-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .suggestions-container::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
    }
    @media (max-width: 700px) {
      .dashboard {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        bottom: 10px;
        left: 10px;
        right: 10px;
        padding: 14px;
        border-radius: 24px;
      }
      .dashboard.minimized {
        flex-direction: row;
        align-items: center;
        padding: 8px 14px;
        gap: 8px;
        flex-wrap: nowrap;
      }
      .dashboard.minimized .search-box {
        flex: 1 1 auto;
        min-width: 100px;
      }
      .dashboard.minimized .gps-btn {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      .param-grid {
        font-size: 0.75rem;
        gap: 6px 12px;
        justify-content: center;
      }
      .search-box {
        min-width: unset;
      }
      .gps-btn {
        justify-content: center;
        padding: 10px;
      }
      .layer-control-container {
        top: 80px;
        left: 10px;
        padding: 10px 12px;
        min-width: 100px;
      }
      .layer-btn {
        font-size: 0.7rem;
        padding: 4px 10px;
      }
      .suggestions-container {
        max-height: 150px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="gpsLoading" class="loading-gps">
    <i class="fas fa-satellite-dish fa-spin"></i> Mengaktifkan GPS & posisi...
  </div>

  <!-- Layer Control -->
  <div class="layer-control-container" id="layerControl">
    <div class="layer-title"><i class="fas fa-layer-group"></i> Peta</div>
    <button class="layer-btn active" data-layer="hybrid"><i class="fas fa-globe"></i> Hybrid</button>
    <button class="layer-btn" data-layer="satellite"><i class="fas fa-satellite"></i> Satelit</button>
    <button class="layer-btn" data-layer="terrain"><i class="fas fa-mountain"></i> Terrain</button>
    <button class="layer-btn" data-layer="street"><i class="fas fa-road"></i> Street</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="param-grid" id="paramGrid">
      <div class="param-item"><i class="fas fa-thermometer-half"></i> <span id="suhu">--</span>°C <small>suhu</small></div>
      <div class="param-item"><i class="fas fa-tint"></i> <span id="kelembaban">--</span>% <small>humidity</small></div>
      <div class="param-item"><i class="fas fa-mountain"></i> <span id="ketinggian">--</span>m <small>alt</small></div>
      <div class="param-item"><i class="fas fa-sun"></i> <span id="uv">--</span> UV <small>index</small></div>
      <div class="param-item"><i class="fas fa-fire"></i> <span id="kebakaran">--</span> <small>fire</small></div>
      <div class="param-item"><i class="fas fa-earth-asia"></i> <span id="gempa">--</span> <small>gempa</small></div>
      <div class="param-item"><i class="fas fa-volcano"></i> <span id="letusan">--</span> <small>vulkanik</small></div>
    </div>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
      <div class="search-box" id="searchBox">
        <i class="fas fa-search"></i>
        <input type="text" id="addressInput" placeholder="Cari alamat / lokasi (RW/RT)..." autocomplete="off" />
        <div class="suggestions-container" id="suggestionsContainer"></div>
      </div>
      <button class="gps-btn" id="gpsBtn"><i class="fas fa-location-dot"></i> Posisi Saya</button>
      <div class="dashboard-toggle" id="dashboardToggle" title="Minimize / Maximize">
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- Peta ---
      const map = L.map('map', {
        zoomControl: true,
        fadeAnimation: true,
        zoomAnimation: true,
        attributionControl: true
      }).setView([-2.5489, 118.0149], 5);

      // --- Layer ---
      const layerDefs = {
        hybrid: {
          layers: [
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; ESRI', maxZoom: 22 }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; ESRI', maxZoom: 22, opacity: 0.5, zIndex: 2 })
          ]
        },
        satellite: {
          layers: [
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; ESRI', maxZoom: 22 })
          ]
        },
        terrain: {
          layers: [
            L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenTopoMap', maxZoom: 17 }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; ESRI', maxZoom: 22, opacity: 0.3, zIndex: 2 })
          ]
        },
        street: {
          layers: [
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: '&copy; ESRI', maxZoom: 22, opacity: 0.3, zIndex: 2 })
          ]
        }
      };

      let activeLayers = [];
      let currentLayerKey = 'hybrid';

      function setLayer(key) {
        activeLayers.forEach(l => map.removeLayer(l));
        activeLayers = [];
        const def = layerDefs[key];
        if (def) {
          def.layers.forEach(l => { l.addTo(map); activeLayers.push(l); });
          currentLayerKey = key;
        }
        document.querySelectorAll('.layer-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.dataset.layer === key) btn.classList.add('active');
        });
      }
      setLayer('hybrid');
      map.setMaxZoom(50);
      map.options.maxZoom = 50;

      // --- Variabel ---
      let userMarker = null;
      let userCircle = null;
      let currentPosition = null;

      // --- Elemen UI ---
      const addressInput = document.getElementById('addressInput');
      const suggestionsContainer = document.getElementById('suggestionsContainer');
      const gpsBtn = document.getElementById('gpsBtn');
      const gpsLoading = document.getElementById('gpsLoading');
      const dashboard = document.getElementById('dashboard');
      const toggleBtn = document.getElementById('dashboardToggle');

      // --- Geocoder (Nominatim) ---
      const geocoder = L.Control.Geocoder.nominatim({
        geocodingQueryParams: { countrycodes: 'id', limit: 8, 'accept-language': 'id' }
      });

      // --- Reverse geocode untuk isi alamat ---
      function reverseGeocodeAndFill(lat, lng, callback) {
        geocoder.reverse({ lat, lng }, function(results) {
          if (results.length > 0) {
            const addr = results[0].name || results[0].display_name || results[0].html || '';
            if (addr) {
              addressInput.value = addr;
            } else {
              addressInput.value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
            }
          } else {
            addressInput.value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
          }
          if (callback) callback();
        });
      }

      // --- Update marker & posisi ---
      function updateUserMarker(lat, lng, updateAddress = true) {
        if (userMarker) map.removeLayer(userMarker);
        if (userCircle) map.removeLayer(userCircle);
        const icon = L.divIcon({
          className: 'my-location-marker',
          html: '<i class="fas fa-circle" style="color: #3b9eff; font-size: 28px; text-shadow: 0 0 24px #3b9effaa; background: rgba(0,0,0,0.2); border-radius: 50%; padding: 2px;"></i>',
          iconSize: [32, 32],
          iconAnchor: [16, 16]
        });
        userMarker = L.marker([lat, lng], { icon: icon, zIndexOffset: 1000 }).addTo(map);
        userCircle = L.circle([lat, lng], {
          radius: 40,
          color: '#3b9eff',
          weight: 1.5,
          opacity: 0.6,
          fillColor: '#1e6fff',
          fillOpacity: 0.15,
        }).addTo(map);
        currentPosition = [lat, lng];
        updateParameters(lat, lng);
        if (updateAddress) {
          reverseGeocodeAndFill(lat, lng);
        }
      }

      // --- Update parameter simulasi ---
      function updateParameters(lat, lng) {
        const suhu = (28 + Math.sin(lat / 10) * 4 + Math.cos(lng / 15) * 3 + (Math.random() - 0.5) * 2).toFixed(1);
        const kelembaban = (65 + Math.sin(lat / 8) * 15 + Math.cos(lng / 12) * 10 + (Math.random() - 0.5) * 8).toFixed(0);
        const ketinggian = (Math.abs(Math.sin(lat / 20) * 400 + Math.cos(lng / 25) * 300) + 50 + (Math.random() - 0.5) * 40).toFixed(0);
        const uv = (6 + Math.sin(lat / 30) * 3 + Math.cos(lng / 20) * 2 + (Math.random() - 0.5) * 1.5).toFixed(1);
        const fire = Math.random() > 0.85 ? '🔥 Aktif' : '☑️ Aman';
        const earthquake = Math.random() > 0.92 ? '⚠️ Terdeteksi' : '✅ Stabil';
        const volcano = Math.random() > 0.95 ? '🌋 Siaga' : '🔹 Normal';

        document.getElementById('suhu').textContent = suhu;
        document.getElementById('kelembaban').textContent = kelembaban;
        document.getElementById('ketinggian').textContent = ketinggian;
        document.getElementById('uv').textContent = uv;
        document.getElementById('kebakaran').textContent = fire;
        document.getElementById('gempa').textContent = earthquake;
        document.getElementById('letusan').textContent = volcano;
      }

      // --- GPS ---
      function locateUser(showLoading = true) {
        if (!navigator.geolocation) {
          alert('GPS tidak didukung di perangkat ini.');
          return;
        }
        if (showLoading) gpsLoading.style.display = 'flex';
        navigator.geolocation.getCurrentPosition(
          function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            gpsLoading.style.display = 'none';
            updateUserMarker(lat, lng, true);
            map.setView([lat, lng], 18, { animate: true });
            // Tutup suggestion
            suggestionsContainer.style.display = 'none';
          },
          function(err) {
            gpsLoading.style.display = 'none';
            console.warn('GPS error:', err);
            alert('Gagal mengambil posisi GPS. Pastikan izin lokasi diberikan.\nError: ' + err.message);
            const fallback = [-6.2088, 106.8456];
            updateUserMarker(fallback[0], fallback[1], true);
            map.setView(fallback, 14);
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
        );
      }

      // --- Suggestion / Autocomplete ---
      let suggestionTimeout = null;

      function fetchSuggestions(query) {
        if (!query || query.trim().length < 2) {
          suggestionsContainer.style.display = 'none';
          return;
        }
        geocoder.geocode(query.trim(), function(results) {
          suggestionsContainer.innerHTML = '';
          if (results.length === 0) {
            suggestionsContainer.style.display = 'none';
            return;
          }
          results.forEach((r, index) => {
            const displayName = r.name || r.display_name || r.html || 'Lokasi';
            const detail = r.display_name || r.html || '';
            const item = document.createElement('div');
            item.className = 'suggestion-item';
            item.innerHTML = `
              <i class="fas fa-map-pin"></i>
              <div class="suggestion-main">${displayName}</div>
              <div class="suggestion-detail">${detail.substring(0, 60)}${detail.length > 60 ? '...' : ''}</div>
            `;
            item.addEventListener('click', function() {
              const center = r.center;
              if (center) {
                map.setView(center, 18);
                updateUserMarker(center.lat, center.lng, true);
                suggestionsContainer.style.display = 'none';
                addressInput.blur();
              }
            });
            suggestionsContainer.appendChild(item);
          });
          suggestionsContainer.style.display = 'block';
        });
      }

      // Event input untuk suggestion
      addressInput.addEventListener('input', function() {
        const val = this.value;
        clearTimeout(suggestionTimeout);
        suggestionTimeout = setTimeout(() => {
          fetchSuggestions(val);
        }, 300);
      });

      // Sembunyikan suggestion saat blur (dengan delay biar klik kebaca)
      addressInput.addEventListener('blur', function() {
        setTimeout(() => {
          suggestionsContainer.style.display = 'none';
        }, 250);
      });

      // Tampilkan lagi saat focus jika ada nilai
      addressInput.addEventListener('focus', function() {
        if (this.value.trim().length >= 2) {
          fetchSuggestions(this.value);
        }
      });

      // Enter pada input: cari langsung
      addressInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          const val = this.value.trim();
          if (val.length >= 2) {
            geocoder.geocode(val, function(results) {
              if (results.length > 0) {
                const r = results[0];
                const center = r.center;
                if (center) {
                  map.setView(center, 18);
                  updateUserMarker(center.lat, center.lng, true);
                }
              } else {
                alert('Alamat tidak ditemukan. Coba lebih spesifik.');
              }
              suggestionsContainer.style.display = 'none';
            });
          }
        }
      });

      // Tombol GPS
      gpsBtn.addEventListener('click', function() {
        locateUser(true);
        suggestionsContainer.style.display = 'none';
      });

      // --- Toggle Dashboard ---
      toggleBtn.addEventListener('click', function() {
        dashboard.classList.toggle('minimized');
        const icon = this.querySelector('i');
        if (dashboard.classList.contains('minimized')) {
          icon.className = 'fas fa-chevron-up';
        } else {
          icon.className = 'fas fa-chevron-down';
        }
      });

      // --- Layer buttons ---
      document.querySelectorAll('.layer-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          const key = this.dataset.layer;
          if (key && key !== currentLayerKey) setLayer(key);
        });
      });

      // --- Inisialisasi ---
      window.addEventListener('load', function() {
        map.setView([-2.5, 118.0], 5);
        locateUser(true);
        updateParameters(-2.5, 118.0);
      });

      // Update parameter periodik
      setInterval(function() {
        if (currentPosition) {
          updateParameters(currentPosition[0], currentPosition[1]);
        } else {
          updateParameters(-2.5, 118.0);
        }
      }, 12000);

      // Klik peta update parameter (tanpa ubah marker)
      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        updateParameters(lat, lng);
      });

    })();
  </script>
</body>
</html>
