<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOMPAS REAL-TIME - OPPO A9</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0c10;--fg:#e8e6e1;--red:#ff1744;--green:#00e676;--cyan:#00e5ff;--gold:#ffab00;--glow:rgba(255,23,68,0.8)}
body{background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw;touch-action:none}
#app{height:100vh;display:flex;flex-direction:column;padding:6px;position:relative;background:radial-gradient(ellipse at center, rgba(255,23,68,0.03) 0%, transparent 70%)}
.header{text-align:center;padding:2px 0;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:12px;font-weight:900;letter-spacing:4px;color:var(--red);text-shadow:0 0 30px var(--glow);animation:pulseText 1.5s ease-in-out infinite}
@keyframes pulseText{0%,100%{opacity:1}50%{opacity:0.6}}
.header .status{font-size:7px;color:#555;letter-spacing:1px;display:flex;gap:8px;align-items:center}
.status .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.green{background:var(--green);box-shadow:0 0 15px var(--green);animation:blink 0.8s ease-in-out infinite}
.dot.red{background:var(--red);box-shadow:0 0 15px var(--red)}
.dot.cyan{background:var(--cyan);box-shadow:0 0 15px var(--cyan)}
.dot.gold{background:var(--gold);box-shadow:0 0 15px var(--gold)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

.compass-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0;margin:2px 0}
.compass-wrap svg{width:min(82vw,360px);height:min(82vw,360px);filter:drop-shadow(0 0 50px rgba(255,23,68,0.08))}
#compassDisplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10}
#compassDisplay .deg{font-size:clamp(48px,16vw,80px);font-weight:900;font-variant-numeric:tabular-nums;text-shadow:0 0 50px rgba(255,255,255,0.05);letter-spacing:-2px}
#compassDisplay .dir{font-size:clamp(20px,6vw,32px);font-weight:900;color:var(--gold);letter-spacing:5px;text-shadow:0 0 40px rgba(255,171,0,0.2);margin-top:-4px}
#compassDisplay .subdir{font-size:8px;color:#555;letter-spacing:2px;margin-top:2px}

.info-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin:3px 0}
.info-cell{background:rgba(20,22,28,0.92);border:1px solid rgba(255,255,255,0.04);border-radius:4px;padding:4px 2px;text-align:center}
.info-cell .label{font-size:5px;color:#444;letter-spacing:1px;text-transform:uppercase}
.info-cell .value{font-size:10px;font-weight:700;margin-top:1px;font-variant-numeric:tabular-nums}
.value.red{color:var(--red)}.value.cyan{color:var(--cyan)}.value.green{color:var(--green)}.value.gold{color:var(--gold)}

.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:3px;padding:2px 0}
.actions button{background:rgba(20,22,28,0.92);border:1px solid rgba(255,255,255,0.06);border-radius:5px;color:var(--fg);font-family:inherit;font-size:7px;font-weight:700;padding:8px 2px;cursor:pointer;transition:all 0.08s;text-transform:uppercase;letter-spacing:1px;position:relative}
.actions button:active{transform:scale(0.92);background:var(--red);color:#000;border-color:var(--red)}
.actions button.active{background:var(--red);color:#000;border-color:var(--red);box-shadow:0 0 25px var(--glow)}
.actions button.calibrating{animation:pulse 0.4s ease-in-out infinite alternate;border-color:var(--gold)}
@keyframes pulse{from{box-shadow:0 0 10px var(--gold)}to{box-shadow:0 0 40px var(--gold)}}
.actions button .badge{position:absolute;top:-4px;right:-4px;background:var(--red);color:#000;font-size:6px;padding:1px 4px;border-radius:3px;font-weight:900}

#graph{width:100%;height:28px;background:rgba(20,22,28,0.92);border:1px solid rgba(255,255,255,0.04);border-radius:4px;margin:2px 0;overflow:hidden}
#graph canvas{width:100%;height:100%}
#fps{position:fixed;top:2px;right:4px;font-size:6px;color:#333;z-index:50}
#manualBadge{position:absolute;top:8px;right:8px;background:rgba(0,229,255,0.12);border:1px solid var(--cyan);color:var(--cyan);font-size:6px;font-weight:700;padding:3px 8px;border-radius:3px;display:none;letter-spacing:2px;animation:blink 0.8s ease-in-out infinite}
#manualBadge.show{display:block}
.diag-toggle{background:rgba(20,22,28,0.92);border:1px solid rgba(255,255,255,0.04);border-radius:3px;color:#444;font-size:6px;padding:2px 4px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;margin:1px 0;font-family:inherit;width:100%}
.diag-panel{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.04);border-radius:3px;font-size:6px;line-height:1.8}
.diag-panel.open{max-height:500px;overflow-y:auto;padding:6px}
.diag-panel .ok{color:var(--green)}.diag-panel .err{color:var(--red)}.diag-panel .warn{color:var(--gold)}

#calibrationOverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;gap:15px}
#calibrationOverlay.show{display:flex}
#calOverlay .circle{width:150px;height:150px;border:3px solid var(--red);border-radius:50%;position:relative;animation:spin 2s linear infinite}
#calOverlay .circle::after{content:'';position:absolute;width:20px;height:20px;background:var(--red);border-radius:50%;top:-10px;left:50%;transform:translateX(-50%);box-shadow:0 0 30px var(--glow)}
@keyframes spin{to{transform:rotate(360deg)}}
#calOverlay .text{font-size:12px;color:var(--red);font-weight:700;letter-spacing:2px;text-align:center;line-height:2}
#calOverlay .progress{width:200px;height:4px;background:#222;border-radius:2px;overflow:hidden}
#calOverlay .bar{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));width:0%;transition:width 0.2s;border-radius:2px}
#calOverlay .done{display:none;color:var(--green);font-size:18px;font-weight:900;letter-spacing:3px;animation:popIn 0.4s ease-out}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
#calOverlay .closeBtn{background:var(--red);color:#000;border:none;padding:10px 30px;border-radius:5px;font-family:inherit;font-size:11px;font-weight:900;cursor:pointer;display:none;letter-spacing:2px}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.95);color:#fff;padding:8px 20px;border-radius:6px;font-size:9px;font-family:'Courier New',monospace;z-index:999;border:1px solid rgba(255,23,68,0.2);box-shadow:0 4px 30px rgba(0,0,0,0.6);opacity:0;transition:all 0.3s ease;pointer-events:none;font-weight:700;letter-spacing:0.5px;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>⚡ KOMPAS LIVE</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">INIT</span>
      <span id="strategyLabel" style="color:#444">STR:--</span>
    </div>
  </div>

  <button class="diag-toggle" id="diagToggle">🔍 DIAGNOSTIK</button>
  <div class="diag-panel" id="diagPanel"></div>

  <div class="compass-wrap" id="compassWrap">
    <svg viewBox="0 0 400 400" id="compassSvg">
      <defs>
        <filter id="glowFilter"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">

      <circle cx="200" cy="200" r="158" fill="none" stroke="rgba(255,23,68,0.03)" stroke-width="0.5"/>
      
      <g id="dialGroup">
        <g id="tickContainer"></g>
        <text x="200" y="28" text-anchor="middle" fill="var(--red)" font-size="26" font-weight="900" font-family="Courier New">N</text>
        <text x="376" y="206" text-anchor="middle" fill="var(--fg)" font-size="18" font-weight="700" font-family="Courier New">E</text>
        <text x="200" y="384" text-anchor="middle" fill="var(--fg)" font-size="18" font-weight="700" font-family="Courier New">S</text>
        <text x="24" y="206" text-anchor="middle" fill="var(--fg)" font-size="18" font-weight="700" font-family="Courier New">W</text>
        <text x="330" y="64" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="10" font-weight="700">NE</text>
        <text x="330" y="350" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="10" font-weight="700">SE</text>
        <text x="70" y="350" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="10" font-weight="700">SW</text>
        <text x="70" y="64" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="10" font-weight="700">NW</text>
      </g>
      
      <g id="needleGroup" filter="url(#glowFilter)">
        <polygon points="200,45 192,195 200,185 208,195" fill="url(#needleGrad)" opacity="0.95"/>

        <circle cx="200" cy="200" r="12" fill="var(--red)" stroke="#0a0c10" stroke-width="3"/>

    </svg>

    <div id="compassDisplay">
      <div class="deg" id="degDisplay">---</div>

    </div>
    <div id="manualBadge">✋ MANUAL</div>
  </div>

  <div class="info-grid">
    <div class="info-cell"><div class="label">AZIMUTH</div><div class="value red" id="infoAz">---</div></div>
    <div class="info-cell"><div class="label">MAGNET</div><div class="value cyan" id="infoMag">---</div></div>
    <div class="info-cell"><div class="label">UPD/S</div><div class="value green" id="infoUpd">0</div></div>
    <div class="info-cell"><div class="label">DELTA</div><div class="value gold" id="infoDelta">---</div></div>
    <div class="info-cell"><div class="label">SENSOR</div><div class="value" id="infoSensor" style="font-size:7px;color:#666">---</div></div>

  <div id="graph"><canvas id="graphCanvas"></canvas></div>

  <div class="actions">
    <button id="btnCalibrate">⚡ KALIBRASI</button>

  </div>
</div>
<div id="fps">0 FPS</div>

<div id="calibrationOverlay">
  <div class="circle"></div>
  <div class="text">PUTAR HP MEMBENTUK ANGKA 8<br><span style="font-size:9px;color:#666">Ulangi hingga progress penuh</span></div>
  <div class="progress"><div class="bar" id="calBar"></div></div>
  <div class="done" id="calDone">✅ KALIBRASI SELESAI</div>
  <button class="closeBtn" id="calClose">SELESAI</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ============================================================
// DOM REFS
// ============================================================
const $ = id => document.getElementById(id);
const compassSvg = $('compassSvg');
const dialGroup = $('dialGroup');
const needleGroup = $('needleGroup');
const tickContainer = $('tickContainer');
const degDisplay = $('degDisplay');
const dirDisplay = $('dirDisplay');
const subDirDisplay = $('subDirDisplay');
const statusDot = $('statusDot');
const statusText = $('statusText');
const strategyLabel = $('strategyLabel');
const infoAz = $('infoAz');
const infoMag = $('infoMag');
const infoUpd = $('infoUpd');
const infoDelta = $('infoDelta');
const infoSensor = $('infoSensor');
const fpsEl = $('fps');
const graphCanvas = $('graphCanvas');
const ctx = graphCanvas.getContext('2d');
const diagToggle = $('diagToggle');
const diagPanel = $('diagPanel');
const btnCalibrate = $('btnCalibrate');
const btnLock = $('btnLock');
const btnSmooth = $('btnSmooth');
const btnManual = $('btnManual');
const btnReset = $('btnReset');
const manualBadge = $('manualBadge');
const compassWrap = $('compassWrap');
const toast = $('toast');
const calOverlay = $('calibrationOverlay');
const calBar = $('calBar');
const calDone = $('calDone');
const calClose = $('calClose');

// ============================================================
// STATE - REAL TIME UPDATE
// ============================================================
let heading = 0;
let lockedHeading = 0;
let isLocked = false;
let isSmooth = false;
let isManual = false;
let isCalibrating = false;
let lastHeading = 0;
let updateCount = 0;
let lastUpdateTime = performance.now();
let hasData = false;
let activeStrategy = 'NONE';
let sensorSource = 'NONE';

// Sensor raw data
let rawMX = 0, rawMY = 0, rawMZ = 0;
let rawAX = 0, rawAY = 0, rawAZ = 0;
let pitch = 0, roll = 0;

// Smoothing
let smoothHeading = 0;
let smoothInitialized = false;
const SMOOTH_ALPHA = 0.2;

// FPS
let fpsCount = 0;
let fpsTime = performance.now();
let currentFps = 0;

// History (100 points for graph)
const history = new Array(100).fill(0);
let historyIndex = 0;

// Diag data
let diag = {
  doaFired: false, doFired: false, dmFired: false, magFired: false,
  doaData: false, doData: false,
  doaCount: 0, doCount: 0, dmCount: 0, magCount: 0,
  doaLast: null, doLast: null, magLast: null,
  lastUpdate: Date.now()
};

// Calibration
let calTotal = 0;
let calLastHeading = 0;
let calInterval = null;

// ============================================================
// DIRECTION LOOKUP (16 arah)
// ============================================================
const directions = [
  {min:348.75, max:360, short:'U', long:'UTARA', emoji:'⬆️'},
  {min:0, max:11.25, short:'U', long:'UTARA', emoji:'⬆️'},
  {min:11.25, max:33.75, short:'UTL', long:'UTARA TIMUR LAUT', emoji:'↗️'},
  {min:33.75, max:56.25, short:'TL', long:'TIMUR LAUT', emoji:'↗️'},
  {min:56.25, max:78.75, short:'TLT', long:'TIMUR LAUT TIMUR', emoji:'↗️'},
  {min:78.75, max:101.25, short:'T', long:'TIMUR', emoji:'➡️'},
  {min:101.25, max:123.75, short:'TTG', long:'TIMUR TENGGARA', emoji:'↘️'},
  {min:123.75, max:146.25, short:'TG', long:'TENGGARA', emoji:'↘️'},
  {min:146.25, max:168.75, short:'TGS', long:'TENGGARA SELATAN', emoji:'↘️'},
  {min:168.75, max:191.25, short:'S', long:'SELATAN', emoji:'⬇️'},
  {min:191.25, max:213.75, short:'SBD', long:'SELATAN BARAT DAYA', emoji:'↙️'},
  {min:213.75, max:236.25, short:'BD', long:'BARAT DAYA', emoji:'↙️'},
  {min:236.25, max:258.75, short:'BDB', long:'BARAT DAYA BARAT', emoji:'↙️'},
  {min:258.75, max:281.25, short:'B', long:'BARAT', emoji:'⬅️'},
  {min:281.25, max:303.75, short:'BBL', long:'BARAT BARAT LAUT', emoji:'↖️'},
  {min:303.75, max:326.25, short:'BL', long:'BARAT LAUT', emoji:'↖️'},
  {min:326.25, max:348.75, short:'BLU', long:'BARAT LAUT UTARA', emoji:'↖️'}
];

function getDirection(deg) {
  for (let d of directions) {
    if (deg >= d.min && deg < d.max) return d;
  }
  return directions[0];
}

function normalizeAngle(a) {
  a = a % 360;
  if (a < 0) a += 360;
  return a;
}

function angleDiff(a, b) {
  let d = a - b;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return d;
}

// ============================================================
// GENERATE COMPASS TICKS
// ============================================================
function generateTicks() {
  for (let deg = 0; deg < 360; deg += 2) {
    const rad = (deg - 90) * Math.PI / 180;
    const is30 = deg % 30 === 0;
    const is10 = deg % 10 === 0;
    const is5 = deg % 5 === 0;
    
    let inner, stroke, width;
    if (is30) {
      inner = 152;
      stroke = 'rgba(255,23,68,0.7)';
      width = '2.5';
    } else if (is10) {
      inner = 162;
      stroke = 'rgba(255,255,255,0.2)';
      width = '1.5';
    } else if (is5) {
      inner = 170;
      stroke = 'rgba(255,255,255,0.08)';
      width = '1';
    } else {
      inner = 175;
      stroke = 'rgba(255,255,255,0.03)';
      width = '0.5';
    }
    
    const outer = 185;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 200 + inner * Math.cos(rad));
    line.setAttribute('y1', 200 + inner * Math.sin(rad));
    line.setAttribute('x2', 200 + outer * Math.cos(rad));
    line.setAttribute('y2', 200 + outer * Math.sin(rad));
    line.setAttribute('stroke', stroke);
    line.setAttribute('stroke-width', width);
    tickContainer.appendChild(line);
    
    if (is30 && deg % 90 !== 0) {
      const labelR = 138;
      const lx = 200 + labelR * Math.cos(rad);
      const ly = 200 + labelR * Math.sin(rad);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lx);
      text.setAttribute('y', ly + 2);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', 'rgba(255,255,255,0.12)');
      text.setAttribute('font-size', '7');
      text.setAttribute('font-family', 'Courier New');
      text.textContent = deg + '°';
      tickContainer.appendChild(text);
    }
  }
}

// ============================================================
// COMPASS HEADING COMPUTATION (Tilt Compensated)
// ============================================================
function computeHeading(mx, my, mz, ax, ay, az) {
  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  if (mag < 0.1) return null;
  
  const nax = ax / mag, nay = ay / mag, naz = az / mag;
  const pitchAngle = Math.asin(Math.max(-1, Math.min(1, -nax)));
  const rollAngle = Math.atan2(nay, naz);
  const cosP = Math.cos(pitchAngle), sinP = Math.sin(pitchAngle);
  const cosR = Math.cos(rollAngle), sinR = Math.sin(rollAngle);
  
  const Xh = mx * cosP + mz * sinP;
  const Yh = mx * sinR * sinP + my * cosR - mz * sinR * cosP;
  
  let h = Math.atan2(-Yh, Xh) * 180 / Math.PI;
  if (h < 0) h += 360;
  return h;
}

// ============================================================
// SENSOR STRATEGIES - MULTI-LAYER AGGRESSIVE
// ============================================================
function initSensors() {
  // STRATEGY 1: deviceorientationabsolute (PRIORITY 1)
  window.addEventListener('deviceorientationabsolute', function(e) {
    diag.doaFired = true;
    diag.doaCount++;
    diag.doaLast = {alpha: e.alpha, beta: e.beta, gamma: e.gamma};
    diag.lastUpdate = Date.now();
    
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doaData = true;
      if (!isManual) {
        activeStrategy = 'DOA_ABS';
        sensorSource = 'ABSOLUTE';
        heading = normalizeAngle(e.alpha);
        pitch = e.beta || 0;
        roll = e.gamma || 0;
        hasData = true;
        updateStatus();
      }
    }
  }, {passive: true});

  // STRATEGY 2: deviceorientation with absolute flag (PRIORITY 2)
  window.addEventListener('deviceorientation', function(e) {
    diag.doFired = true;
    diag.doCount++;
    diag.doLast = {alpha: e.alpha, beta: e.beta, gamma: e.gamma};
    diag.lastUpdate = Date.now();
    
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doData = true;
      if (!isManual && (activeStrategy === 'NONE' || activeStrategy === 'ORIENTATION')) {
        if (e.absolute === true) {
          activeStrategy = 'DO_ABS_FLAG';
          sensorSource = 'ABSOLUTE';
          heading = normalizeAngle(e.alpha);
          pitch = e.beta || 0;
          roll = e.gamma || 0;
          hasData = true;
          updateStatus();
        } else if (!hasData) {
          activeStrategy = 'DO_REL';
          sensorSource = 'RELATIVE';
          heading = normalizeAngle(e.alpha);
          pitch = e.beta || 0;
          roll = e.gamma || 0;
          hasData = true;
          updateStatus();
        }
      }
    }
  }, {passive: true});

  // STRATEGY 3: Generic Magnetometer API (PRIORITY 3)
  if ('Magnetometer' in window) {
    try {
      const mag = new Magnetometer({frequency: 60});
      mag.addEventListener('reading', function() {
        diag.magFired = true;
        diag.magCount++;
        diag.magLast = {x: mag.x, y: mag.y, z: mag.z};
        diag.lastUpdate = Date.now();
        rawMX = mag.x;
        rawMY = mag.y;
        rawMZ = mag.z;
        
        if (!isManual && (activeStrategy === 'NONE' || activeStrategy === 'MAGNET' || !hasData)) {
          if (rawAX !== 0 || rawAY !== 0 || rawAZ !== 0) {
            const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
            if (h !== null) {
              activeStrategy = 'MAGNET';
              sensorSource = 'MAGNETOMETER';
              heading = h;
              hasData = true;
              updateStatus();
            }
          } else if (!hasData) {
            // Fallback tanpa tilt compensation
            let h = Math.atan2(-rawMX, rawMY) * 180 / Math.PI;
            if (h < 0) h += 360;
            activeStrategy = 'MAGNET_NO_TILT';
            sensorSource = 'MAGNETOMETER';
            heading = h;
            hasData = true;
            updateStatus();
          }
        }
      });
      mag.addEventListener('error', function(e) {
        console.warn('Magnetometer error:', e.error?.name);
      });
      mag.start();
    } catch(e) {
      console.warn('Magnetometer init failed:', e);
    }
  }

  // STRATEGY 4: DeviceMotion for accelerometer
  window.addEventListener('devicemotion', function(e) {
    diag.dmFired = true;
    diag.dmCount++;
    diag.lastUpdate = Date.now();
    
    const accel = e.accelerationIncludingGravity;
    if (accel && accel.x !== null && accel.x !== undefined) {
      rawAX = accel.x;
      rawAY = accel.y;
      rawAZ = accel.z;
      
      // Recompute with magnetometer if available
      if (!isManual && diag.magFired && 
          (activeStrategy === 'MAGNET' || activeStrategy === 'MAGNET_NO_TILT' || !hasData)) {
        const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
        if (h !== null) {
          activeStrategy = 'MAGNET';
          sensorSource = 'MAGNETOMETER';
          heading = h;
          hasData = true;
          updateStatus();
        }
      }
    }
  }, {passive: true});

  // STRATEGY 5: Fallback - Use gyroscope integration if available
  if ('Gyroscope' in window) {
    try {
      const gyro = new Gyroscope({frequency: 60});
      let gyroHeading = heading;
      let gyroInitialized = false;
      let lastGyroTime = performance.now();
      
      gyro.addEventListener('reading', function() {
        if (!hasData && !isManual) {
          const now = performance.now();
          const dt = (now - lastGyroTime) / 1000;
          lastGyroTime = now;
          
          if (!gyroInitialized) {
            gyroHeading = heading || 0;
            gyroInitialized = true;
          }
          
          // Integrate gyroscope (z-axis rotation)
          if (gyro.z !== null && gyro.z !== undefined) {
            gyroHeading += gyro.z * dt * 180 / Math.PI;
            gyroHeading = normalizeAngle(gyroHeading);
            activeStrategy = 'GYRO';
            sensorSource = 'GYROSCOPE';
            heading = gyroHeading;
            hasData = true;
            updateStatus();
          }
        }
      });
      gyro.start();
    } catch(e) {}
  }
}

// ============================================================
// MANUAL TOUCH MODE - REAL TIME DRAG
// ============================================================
let touchActive = false;
let touchStartAngle = 0;
let touchStartHeading = 0;
let lastTouchAngle = 0;

function initManualMode() {
  // Touch events for mobile
  compassWrap.addEventListener('touchstart', function(e) {
    if (!isManual) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    lastTouchAngle = touchStartAngle;
    touchActive = true;
  }, {passive: false});
  
  compassWrap.addEventListener('touchmove', function(e) {
    if (!isManual || !touchActive) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'TOUCH';
    updateStatus();
  }, {passive: false});
  
  compassWrap.addEventListener('touchend', function() {
    touchActive = false;
  }, {passive: true});
  
  // Mouse support for desktop
  compassWrap.addEventListener('mousedown', function(e) {
    if (!isManual) return;
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    lastTouchAngle = touchStartAngle;
    touchActive = true;
    e.preventDefault();
  });
  
  document.addEventListener('mousemove', function(e) {
    if (!isManual || !touchActive) return;
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'TOUCH';
    updateStatus();
  });
  
  document.addEventListener('mouseup', function() {
    touchActive = false;
  });
}

// ============================================================
// UPDATE UI - REAL TIME
// ============================================================
function updateStatus() {
  if (isManual) {
    statusDot.className = 'dot cyan';
    statusText.textContent = 'MANUAL';
    manualBadge.classList.add('show');
    strategyLabel.textContent = 'STR:MANUAL';
  } else if (hasData) {
    statusDot.className = 'dot green';
    statusText.textContent = 'LIVE';
    manualBadge.classList.remove('show');
    strategyLabel.textContent = 'STR:' + activeStrategy.substring(0, 6);
  } else {
    statusDot.className = 'dot red';
    statusText.textContent = 'WAITING';
    manualBadge.classList.remove('show');
    strategyLabel.textContent = 'STR:NONE';
  }
  
  modeLabel.textContent = isLocked ? '🔒 LOCK' : 'FREE';
  smoothLabel.textContent = isSmooth ? 'SMOOTH' : 'RAW';
}

function updateDisplay() {
  let displayHeading = heading;
  
  // Apply smoothing
  if (isSmooth && !isManual) {
    if (!smoothInitialized) {
      smoothHeading = heading;
      smoothInitialized = true;
    } else {
      const diff = angleDiff(heading, smoothHeading);
      smoothHeading = normalizeAngle(smoothHeading + diff * SMOOTH_ALPHA);
    }
    displayHeading = smoothHeading;
  } else {
    smoothHeading = heading;
    smoothInitialized = true;
  }
  
  // Apply lock
  if (isLocked) {
    displayHeading = lockedHeading;
  }
  
  const displayDeg = Math.round(displayHeading);
  const dir = getDirection(displayHeading);
  
  // Update display
  degDisplay.textContent = String(displayDeg).padStart(3, '0');
  dirDisplay.textContent = isLocked ? '🔒' : dir.emoji + ' ' + dir.short;
  subDirDisplay.textContent = isLocked ? 'TERKUNCI ' + lockedHeading + '°' : dir.long;
  
  // Rotate compass
  dialGroup.setAttribute('transform', `rotate(${-displayHeading}, 200, 200)`);
  
  // Info panel
  infoAz.textContent = displayDeg + '°';
  
  const magStrength = Math.sqrt(rawMX*rawMX + rawMY*rawMY + rawMZ*rawMZ);
  infoMag.textContent = magStrength > 0 ? magStrength.toFixed(1) + 'µT' : '---';
  
  const delta = Math.abs(angleDiff(displayHeading, lastHeading));
  infoDelta.textContent = delta.toFixed(1) + '°';
  infoDelta.style.color = delta > 15 ? 'var(--red)' : delta > 5 ? 'var(--gold)' : 'var(--green)';
  lastHeading = displayHeading;
  
  infoSensor.textContent = sensorSource;
  
  // Update counter
  updateCount++;
  const now = performance.now();
  if (now - lastUpdateTime >= 1000) {
    infoUpd.textContent = updateCount;
    updateCount = 0;
    lastUpdateTime = now;
  }
  
  // History for graph
  history[historyIndex] = displayHeading;
  historyIndex = (historyIndex + 1) % history.length;
}

// ============================================================
// GRAPH RENDER
// ============================================================
function drawGraph() {
  const rect = graphCanvas.parentElement.getBoundingClientRect();
  graphCanvas.width = rect.width * 2;
  graphCanvas.height = rect.height * 2;
  ctx.scale(2, 2);
  
  const w = graphCanvas.width / 2;
  const h = graphCanvas.height / 2;
  
  ctx.clearRect(0, 0, w, h);
  
  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 4]);
  ctx.beginPath();
  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Plot
  const gradient = ctx.createLinearGradient(0, 0, w, 0);
  gradient.addColorStop(0, 'rgba(255,23,68,0.2)');
  gradient.addColorStop(0.5, 'rgba(255,23,68,0.7)');
  gradient.addColorStop(1, 'rgba(255,23,68,1)');
  
  ctx.strokeStyle = gradient;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(255,23,68,0.3)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  
  const len = history.length;
  for (let i = 0; i < len; i++) {
    const idx = (historyIndex + i) % len;
    const val = history[idx];
    const x = (i / len) * w;
    const y = h/2 - (val - 180) / 180 * (h/2 - 2);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Current point
  const lastVal = history[(historyIndex - 1 + len) % len];
  const lastX = w - 2;
  const lastY = h/2 - (lastVal - 180) / 180 * (h/2 - 2);
  ctx.fillStyle = 'var(--red)';
  ctx.shadowColor = 'var(--red)';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ============================================================
// RENDER LOOP - REAL TIME UPDATE SETIAP FRAME
// ============================================================
function render() {
  // Update display every frame if we have data
  if (hasData || isManual) {
    updateDisplay();
    drawGraph();
  }
  
  // FPS counter
  fpsCount++;
  const now = performance.now();
  if (now - fpsTime >= 500) {
    currentFps = Math.round(fpsCount / ((now - fpsTime) / 1000));
    fpsEl.textContent = currentFps + ' FPS';
    fpsCount = 0;
    fpsTime = now;
  }
  
  requestAnimationFrame(render);
}

// ============================================================
// DIAGNOSTICS
// ============================================================
function updateDiag() {
  let html = '';
  const sec = window.isSecureContext;
  const https = location.protocol === 'https:';
  
  html += `<div style="display:flex;gap:10px;flex-wrap:wrap">`;
  html += `<span>Secure: <span class="${sec ? 'ok' : 'err'}">${sec ? '✅' : '❌'}</span></span>`;
  html += `<span>HTTPS: <span class="${https ? 'ok' : 'err'}">${https ? '✅' : '❌'}</span></span>`;
  html += `<span>DOA API: <span class="${typeof DeviceOrientationEvent !== 'undefined' ? 'ok' : 'err'}">${typeof DeviceOrientationEvent !== 'undefined' ? '✅' : '❌'}</span></span>`;
  html += `</div><br>`;
  
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:2px 10px">`;
  html += `<div>deviceorientationabsolute: <span class="${diag.doaFired ? (diag.doaData ? 'ok' : 'warn') : 'err'}">${diag.doaFired ? (diag.doaData ? '✅ DATA' : '⚠️ NO DATA') : '❌'}</span></div>`;
  html += `<div style="font-size:5px;color:#444">${diag.doaCount}x</div>`;
  html += `<div>deviceorientation: <span class="${diag.doFired ? (diag.doData ? 'ok' : 'warn') : 'err'}">${diag.doFired ? (diag.doData ? '✅ DATA' : '⚠️ NO DATA') : '❌'}</span></div>`;
  html += `<div style="font-size:5px;color:#444">${diag.doCount}x</div>`;
  html += `<div>devicemotion: <span class="${diag.dmFired ? 'ok' : 'err'}">${diag.dmFired ? '✅' : '❌'}</span></div>`;
  html += `<div style="font-size:5px;color:#444">${diag.dmCount}x</div>`;
  html += `<div>Magnetometer: <span class="${'Magnetometer' in window ? (diag.magFired ? 'ok' : 'warn') : 'err'}">${'Magnetometer' in window ? (diag.magFired ? '✅' : '⚠️') : '❌'}</span></div>`;
  html += `<div style="font-size:5px;color:#444">${diag.magCount}x</div>`;
  html += `</div><br>`;
  
  html += `<div>Active: <span class="ok">${activeStrategy}</span> | Source: <span class="ok">${sensorSource}</span></div>`;
  html += `<div>Has Data: <span class="${hasData ? 'ok' : 'err'}">${hasData ? '✅ LIVE' : '❌'}</span></div>`;
  html += `<div>Last Update: ${new Date(diag.lastUpdate).toLocaleTimeString()}</div>`;
  html += `<div style="margin-top:4px;color:#666;font-size:5px">💡 Tips: Buka Chrome → Setelan Situs → Gerak & Orientasi → Izinkan</div>`;
  
  diagPanel.innerHTML = html;
}

// ============================================================
// TOAST NOTIFICATION
// ============================================================
let toastTimeout = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2500);
}

// ============================================================
// CALIBRATION
// ============================================================
function startCalibration() {
  if (isManual) {
    showToast('Kalibrasi tidak tersedia dalam mode manual');
    return;
  }
  
  if (isCalibrating) {
    stopCalibration();
    return;
  }
  
  isCalibrating = true;
  calTotal = 0;
  calLastHeading = heading;
  calBar.style.width = '0%';
  calDone.style.display = 'none';
  calClose.style.display = 'none';
  calOverlay.classList.add('show');
  btnCalibrate.classList.add('calibrating');
  btnCalibrate.textContent = '⏳ KALIBRASI';
  showToast('Putar HP membentuk angka 8');
  
  calInterval = setInterval(() => {
    const change = Math.abs(angleDiff(heading, calLastHeading));
    calTotal += change;
    calLastHeading = heading;
    
    const progress = Math.min(100, (calTotal / 2000) * 100);
    calBar.style.width = progress + '%';
    
    if (progress >= 100) {
      stopCalibration();
      calDone.style.display = 'block';
      calClose.style.display = 'block';
      showToast('✅ Kalibrasi selesai!');
    }
  }, 100);
}

function stopCalibration() {
  isCalibrating = false;
  clearInterval(calInterval);
  calInterval = null;
  btnCalibrate.classList.remove('calibrating');
  btnCalibrate.textContent = '⚡ KALIBRASI';
}

// ============================================================
// BUTTON HANDLERS
// ============================================================
btnCalibrate.addEventListener('click', startCalibration);
calClose.addEventListener('click', function() {
  calOverlay.classList.remove('show');
  stopCalibration();
});

btnLock.addEventListener('click', function() {
  isLocked = !isLocked;
  if (isLocked) {
    lockedHeading = Math.round(heading);
    btnLock.classList.add('active');
    btnLock.textContent = '🔓 LEPAS';
    showToast('🔒 Terkunci di ' + lockedHeading + '°');
  } else {
    btnLock.classList.remove('active');
    btnLock.textContent = '🔒 KUNCI';
    showToast('🔓 Bebas');
  }
  updateStatus();
});

btnSmooth.addEventListener('click', function() {
  isSmooth = !isSmooth;
  smoothInitialized = false;
  if (isSmooth) {
    btnSmooth.classList.add('active');
    btnSmooth.textContent = '🌀 RAW';
    showToast('Smooth filter ON');
  } else {
    btnSmooth.classList.remove('active');
    btnSmooth.textContent = '🌀 HALUS';
    showToast('Smooth filter OFF');
  }
  updateStatus();
});

btnManual.addEventListener('click', function() {
  isManual = !isManual;
  if (isManual) {
    btnManual.classList.add('active');
    btnManual.textContent = '✋ AUTO';
    manualBadge.classList.add('show');
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'TOUCH';
    showToast('✋ Mode manual aktif - geser kompas!');
  } else {
    btnManual.classList.remove('active');
    btnManual.textContent = '✋ MANUAL';
    manualBadge.classList.remove('show');
    if (!hasData) {
      activeStrategy = 'NONE';
      sensorSource = 'NONE';
    }
    showToast('🤖 Kembali ke mode sensor');
  }
  updateStatus();
});

btnReset.addEventListener('click', function() {
  // Reset heading to 0
  heading = 0;
  smoothHeading = 0;
  smoothInitialized = false;
  history.fill(0);
  showToast('↺ Reset ke 0°');
});

diagToggle.addEventListener('click', function() {
  diagPanel.classList.toggle('open');
  if (diagPanel.classList.contains('open')) {
    updateDiag();
  }
});

// ============================================================
// AUTO-START
// ============================================================
async function startApp() {
  // iOS permission
  if (typeof DeviceOrientationEvent !== 'undefined' && 
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== 'granted') {
        showToast('⚠️ Izin sensor diperlukan untuk kompas akurat');
      }
    } catch(e) {}
  }
  
  generateTicks();
  initSensors();
  initManualMode();
  
  // Initial status
  setTimeout(() => {
    updateStatus();
    updateDiag();
    
    // Check if we have data after 3 seconds
    setTimeout(() => {
      if (!hasData && !isManual) {
        showToast('💡 Tidak ada data sensor? Coba mode MANUAL');
        btnManual.style.animation = 'pulse 0.6s ease-in-out 3';
        setTimeout(() => {
          btnManual.style.animation = '';
        }, 2000);
      }
    }, 3000);
  }, 500);
  
  // Start render loop
  render();
  
  // Periodic diag update
  setInterval(updateDiag, 3000);
}

// ============================================================
// BOOT
// ============================================================
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}

// Handle resize
window.addEventListener('resize', () => {
  drawGraph();
});

})();
</script>
