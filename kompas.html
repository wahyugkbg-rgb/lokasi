<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kompas 8 Mata Angin - OPPO A9</title>

    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b0e1a, #05070c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(10, 14, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 48px 48px 32px 32px;
            padding: 20px 16px 24px;
            box-shadow: 0 20px 60px rgba(0, 180, 255, 0.15), inset 0 0 30px rgba(0, 255, 255, 0.05);
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.15);
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 16px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .header h1 i {
            -webkit-text-fill-color: initial;
            color: #00f0ff;
            margin-right: 6px;
        }
        .header .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #4ade80;
        }
        .header .status-dot i {
            font-size: 12px;
        }

        /* KOMPAS UTAMA */
        .compass-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 350px;
            margin: 0 auto 8px;
        }

        .compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 180, 255, 0.15), inset 0 0 40px rgba(0, 255, 255, 0.05);
            background: radial-gradient(circle at 30% 30%, #12162b, #070a14);
        }

        /* 8 MATA ANGIN pada ring */
        .wind-rose {
            position: absolute;
            inset: 8px;
            border-radius: 50%;
        }
        .wind-rose .dir-label {
            position: absolute;
            font-size: 12px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.3);
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
            transform-origin: center;
            transition: all 0.3s;
        }
        .wind-rose .dir-label.active {
            color: #00f0ff;
            text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
            transform: scale(1.2);
        }
        .wind-rose .dir-label.primary {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        /* Jarum */
        .needle-container {
            position: absolute;
            inset: 28px;
            border-radius: 50%;
            transition: transform 0.05s linear;
            will-change: transform;
        }

        .needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 48%;
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 10px;
            background: linear-gradient(to top, #ff2d75, #ff6b9d);
            box-shadow: 0 0 30px #ff2d75, 0 0 60px rgba(255, 45, 117, 0.3);
            z-index: 10;
            transition: transform 0.05s linear;
        }
        .needle::after {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 18px solid #ff2d75;
            filter: drop-shadow(0 0 20px #ff2d75);
        }
        .needle-south {
            height: 38%;
            background: linear-gradient(to top, #a0aec0, #e2e8f0);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            top: 50%;
            transform-origin: top center;
            transform: translate(-50%, 0%) rotate(0deg);
            border-radius: 10px;
        }
        .needle-south::after { display: none; }

        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f0ff, #0070a0);
            box-shadow: 0 0 30px #00f0ff, 0 0 60px rgba(0, 240, 255, 0.3);
            z-index: 20;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* ARAH UTAMA (besar) */
        .direction-main {
            text-align: center;
            margin: -4px 0 2px;
        }
        .direction-main .angle {
            font-size: 32px;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 30px #00f0ff, 0 0 60px #00a0ff;
            letter-spacing: 2px;
        }
        .direction-main .dir-name {
            font-size: 18px;
            font-weight: 700;
            color: #a855f7;
            text-shadow: 0 0 20px #a855f7;
            margin-left: 12px;
        }

        /* 8 MATA ANGIN (horizontal) */
        .windrose-horizontal {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px;
            margin: 4px 0 10px;
            background: rgba(0, 255, 255, 0.04);
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 255, 0.08);
        }
        .windrose-horizontal .wd {
            text-align: center;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.25);
            padding: 4px 2px;
            flex: 1;
            transition: all 0.3s;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .windrose-horizontal .wd i {
            display: block;
            font-size: 14px;
            margin-bottom: 2px;
            color: rgba(255, 255, 255, 0.15);
        }
        .windrose-horizontal .wd.active {
            color: #00f0ff;
            background: rgba(0, 255, 255, 0.1);
            text-shadow: 0 0 20px #00f0ff;
        }
        .windrose-horizontal .wd.active i {
            color: #00f0ff;
        }
        .windrose-horizontal .wd.primary-active {
            color: #facc15;
            background: rgba(250, 204, 21, 0.12);
            text-shadow: 0 0 20px #facc15;
        }
        .windrose-horizontal .wd.primary-active i {
            color: #facc15;
        }

        /* TOMBOL */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 10px 0 8px;
        }
        .actions button {
            background: rgba(0, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 30px;
            padding: 8px 14px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 10px;
            color: #c0d0e0;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.25s;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.05);
            flex: 1 0 auto;
            justify-content: center;
            cursor: pointer;
            min-height: 40px;
        }
        .actions button i {
            color: #00f0ff;
            font-size: 13px;
        }
        .actions button.active {
            background: rgba(0, 255, 255, 0.15);
            border-color: #00f0ff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2);
        }
        .actions button:active { transform: scale(0.95); }
        .actions button.btn-danger.active {
            border-color: #ff2d75;
            background: rgba(255, 45, 117, 0.15);
            box-shadow: 0 0 25px rgba(255, 45, 117, 0.2);
        }

        /* SLIDER MANUAL */
        .manual-slider {
            width: 100%;
            margin: 4px 0 8px;
            display: none;
            align-items: center;
            gap: 12px;
            padding: 0 2px;
        }
        .manual-slider input[type="range"] {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            border-radius: 20px;
            outline: none;
        }
        .manual-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f0ff, #0080aa);
            cursor: pointer;
            box-shadow: 0 0 25px #00f0ff;
            border: 2px solid #fff;
        }
        .manual-slider span {
            color: #a855f7;
            font-weight: 700;
            font-size: 13px;
            min-width: 44px;
            text-shadow: 0 0 15px #a855f7;
        }

        /* INFO */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0 6px;
        }
        .info-card {
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 16px;
            padding: 10px 10px;
            backdrop-filter: blur(4px);
        }
        .info-card .label {
            font-size: 8px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .info-card .value {
            font-size: 12px;
            font-weight: 700;
            color: #b0e0ff;
            word-break: break-word;
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.2);
            margin-top: 2px;
            line-height: 1.3;
        }
        .info-card .value i {
            color: #00f0ff;
            margin-right: 4px;
        }
        .info-card.full {
            grid-column: 1 / -1;
        }

        .calib-status {
            text-align: center;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }
        .calib-status i {
            margin-right: 5px;
        }
        .calib-status .highlight {
            color: #facc15;
        }

        @media (max-width: 400px) {
            .container { padding: 12px 10px; }
            .actions button { font-size: 9px; padding: 6px 10px; min-height: 34px; }
            .info-card .value { font-size: 11px; }
            .direction-main .angle { font-size: 26px; }
            .windrose-horizontal .wd { font-size: 8px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- HEADER -->
    <div class="header">
        <h1><i class="fas fa-compass"></i> AZIMUTH</h1>
        <div class="status-dot">
            <i class="fas fa-circle" style="color:#4ade80;"></i>
            <span>LIVE</span>
        </div>
    </div>

    <!-- KOMPAS -->
    <div class="compass-wrapper">
        <div class="compass-ring"></div>

        <!-- 8 Mata Angin di Ring -->
        <div class="wind-rose" id="windRose">
            <!-- diisi JS -->
        </div>

        <div class="needle-container" id="needleContainer">
            <div class="needle" id="needleNorth"></div>
            <div class="needle needle-south" id="needleSouth"></div>
        </div>
        <div class="center-dot"></div>
    </div>

    <!-- ARAH UTAMA -->
    <div class="direction-main">
        <span class="angle" id="mainAngle">0°</span>
        <span class="dir-name" id="mainDirName">UTARA</span>
    </div>

    <!-- 8 MATA ANGIN HORIZONTAL -->
    <div class="windrose-horizontal" id="windroseHorizontal">
        <!-- diisi JS -->
    </div>

    <!-- TOMBOL -->
    <div class="actions">
        <button id="btnCalibrate"><i class="fas fa-sync-alt"></i> Kalibrasi</button>
        <button id="btnLock" class=""><i class="fas fa-lock"></i> Lock</button>
        <button id="btnManualToggle"><i class="fas fa-sliders-h"></i> Manual</button>
        <button id="btnReset" class=""><i class="fas fa-undo"></i> Reset</button>
    </div>

    <!-- SLIDER MANUAL -->
    <div class="manual-slider" id="manualSlider">
        <i class="fas fa-arrow-left" style="color:#00f0ff; font-size:12px;"></i>
        <input type="range" id="manualAngle" min="0" max="360" value="0" step="0.5" />
        <span id="manualAngleDisplay">0°</span>
    </div>

    <!-- INFO -->
    <div class="info-grid">
        <div class="info-card">
            <div class="label"><i class="fas fa-map-pin"></i> Koordinat</div>
            <div class="value" id="coordDisplay">-6.2088, 106.8456</div>
        </div>
        <div class="info-card">
            <div class="label"><i class="fas fa-thermometer-half"></i> Suhu</div>
            <div class="value" id="tempDisplay">-- °C</div>
        </div>
        <div class="info-card full">
            <div class="label"><i class="fas fa-location-dot"></i> Alamat</div>
            <div class="value" id="addressDisplay">Jl. Contoh No. 123, RT 01/RW 02</div>
        </div>
    </div>

    <div class="calib-status" id="calibStatus">
        <i class="fas fa-circle-check" style="color:#4ade80;"></i> Siap · Sensor aktif
    </div>
</div>

<script>
(function() {
    // ---------- DOM ----------
    const needleContainer = document.getElementById('needleContainer');
    const needleNorth = document.getElementById('needleNorth');
    const needleSouth = document.getElementById('needleSouth');
    const mainAngle = document.getElementById('mainAngle');
    const mainDirName = document.getElementById('mainDirName');
    const coordDisplay = document.getElementById('coordDisplay');
    const tempDisplay = document.getElementById('tempDisplay');
    const addressDisplay = document.getElementById('addressDisplay');
    const calibStatus = document.getElementById('calibStatus');
    const windRose = document.getElementById('windRose');
    const windroseHorizontal = document.getElementById('windroseHorizontal');

    const btnCalibrate = document.getElementById('btnCalibrate');
    const btnLock = document.getElementById('btnLock');
    const btnManualToggle = document.getElementById('btnManualToggle');
    const btnReset = document.getElementById('btnReset');
    const manualSlider = document.getElementById('manualSlider');
    const manualAngle = document.getElementById('manualAngle');
    const manualAngleDisplay = document.getElementById('manualAngleDisplay');

    // ---------- DATA MATA ANGIN ----------
    const WINDS = [
        { name: 'U', full: 'UTARA', angle: 0, icon: 'fa-arrow-up' },
        { name: 'TL', full: 'TIMUR LAUT', angle: 45, icon: 'fa-arrow-up-right' },
        { name: 'T', full: 'TIMUR', angle: 90, icon: 'fa-arrow-right' },
        { name: 'TG', full: 'TENGGARA', angle: 135, icon: 'fa-arrow-down-right' },
        { name: 'S', full: 'SELATAN', angle: 180, icon: 'fa-arrow-down' },
        { name: 'BD', full: 'BARAT DAYA', angle: 225, icon: 'fa-arrow-down-left' },
        { name: 'B', full: 'BARAT', angle: 270, icon: 'fa-arrow-left' },
        { name: 'BL', full: 'BARAT LAUT', angle: 315, icon: 'fa-arrow-up-left' }
    ];

    // ---------- STATE ----------
    let currentHeading = 0;
    let targetHeading = 0;
    let isLocked = false;
    let lockedBearing = 0;
    let isManual = false;
    let manualValue = 0;
    let isCalibrating = false;

    let lastCoords = { lat: -6.2088, lng: 106.8456 };
    let watchId = null;

    // ---------- BUILD WIND ROSE (di ring) ----------
    function buildWindRose() {
        windRose.innerHTML = '';
        WINDS.forEach(w => {
            const div = document.createElement('div');
            div.className = 'dir-label primary';
            div.dataset.angle = w.angle;
            div.dataset.name = w.name;
            div.textContent = w.name;
            // posisi di lingkaran
            const rad = (w.angle - 90) * Math.PI / 180;
            const r = 42; // persen
            const cx = 50 + r * Math.cos(rad);
            const cy = 50 + r * Math.sin(rad);
            div.style.left = `calc(${cx}% - 10px)`;
            div.style.top = `calc(${cy}% - 10px)`;
            div.style.transform = 'translate(-50%, -50%)';
            windRose.appendChild(div);
        });
    }
    buildWindRose();

    // ---------- BUILD HORIZONTAL 8 MATA ANGIN ----------
    function buildHorizontal() {
        windroseHorizontal.innerHTML = '';
        WINDS.forEach(w => {
            const div = document.createElement('div');
            div.className = 'wd';
            div.dataset.angle = w.angle;
            div.dataset.name = w.name;
            div.innerHTML = `<i class="fas ${w.icon}"></i>${w.name}`;
            windroseHorizontal.appendChild(div);
        });
    }
    buildHorizontal();

    // ---------- UPDATE MATA ANGIN ----------
    function updateWindRose(deg) {
        // Cari arah terdekat
        let minDiff = 999;
        let closest = WINDS[0];
        WINDS.forEach(w => {
            let diff = Math.abs(deg - w.angle);
            if (diff > 180) diff = 360 - diff;
            if (diff < minDiff) {
                minDiff = diff;
                closest = w;
            }
        });

        // Update ring labels
        const labels = windRose.querySelectorAll('.dir-label');
        labels.forEach(el => {
            const a = parseFloat(el.dataset.angle);
            let diff = Math.abs(deg - a);
            if (diff > 180) diff = 360 - diff;
            el.classList.toggle('active', diff < 25);
        });

        // Update horizontal
        const items = windroseHorizontal.querySelectorAll('.wd');
        items.forEach(el => {
            const a = parseFloat(el.dataset.angle);
            let diff = Math.abs(deg - a);
            if (diff > 180) diff = 360 - diff;
            el.classList.toggle('active', diff < 25);
            el.classList.toggle('primary-active', diff < 12);
        });

        // Update teks utama
        mainAngle.textContent = `${Math.round(deg)}°`;
        mainDirName.textContent = closest.full;
    }

    // ---------- UPDATE NEEDLE ----------
    function updateNeedle(deg) {
        const rotateDeg = deg;
        needleNorth.style.transform = `translate(-50%, -100%) rotate(${rotateDeg}deg)`;
        needleSouth.style.transform = `translate(-50%, 0%) rotate(${rotateDeg}deg)`;
        updateWindRose(deg);
    }

    // ---------- SET HEADING ----------
    function setHeading(deg) {
        targetHeading = ((deg % 360) + 360) % 360;
        if (!isManual && !isLocked) {
            currentHeading = targetHeading;
            updateNeedle(currentHeading);
        } else if (isLocked) {
            updateNeedle(lockedBearing);
        }
    }

    // ---------- ANIMASI LOOP (smooth) ----------
    function animateLoop() {
        if (!isManual && !isLocked) {
            let diff = targetHeading - currentHeading;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            currentHeading += diff * 0.2;
            if (Math.abs(diff) < 0.1) currentHeading = targetHeading;
            currentHeading = ((currentHeading % 360) + 360) % 360;
            updateNeedle(currentHeading);
        } else if (isLocked) {
            updateNeedle(lockedBearing);
        } else if (isManual) {
            updateNeedle(manualValue);
        }
        requestAnimationFrame(animateLoop);
    }
    animateLoop();

    // ---------- SENSOR ORIENTASI ----------
    function handleOrientation(event) {
        if (isCalibrating || isManual || isLocked) return;
        let alpha = event.alpha || 0;
        if (event.webkitCompassHeading !== undefined) {
            alpha = event.webkitCompassHeading;
        }
        if (alpha === null || isNaN(alpha)) {
            if (lastCoords.course) alpha = lastCoords.course;
            else alpha = 0;
        }
        setHeading(alpha);
    }

    if (window.DeviceOrientationEvent) {
        window.addEventListener('deviceorientation', handleOrientation, true);
    } else {
        calibStatus.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#facc15;"></i> Sensor tidak tersedia';
    }

    // ---------- GPS ----------
    function updatePosition(pos) {
        const coords = pos.coords;
        lastCoords = {
            lat: coords.latitude,
            lng: coords.longitude,
            course: coords.heading || null
        };
        coordDisplay.textContent = `${lastCoords.lat.toFixed(5)}, ${lastCoords.lng.toFixed(5)}`;

        // Reverse geocoding
        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lastCoords.lat}&lon=${lastCoords.lng}&zoom=18&addressdetails=1`)
            .then(res => res.json())
            .then(data => {
                if (data && data.address) {
                    const a = data.address;
                    const road = a.road || a.pedestrian || '';
                    const suburb = a.suburb || a.neighbourhood || '';
                    const rt = a.rt || '';
                    const rw = a.rw || '';
                    const city = a.city || a.town || a.village || a.municipality || '';
                    let parts = [];
                    if (road) parts.push(road);
                    if (suburb) parts.push(suburb);
                    if (rt || rw) parts.push(`RT ${rt || '--'}/RW ${rw || '--'}`);
                    if (city) parts.push(city);
                    addressDisplay.textContent = parts.join(', ') || data.display_name || 'Alamat tidak ditemukan';
                } else {
                    addressDisplay.textContent = 'Alamat tidak ditemukan';
                }
            })
            .catch(() => { addressDisplay.textContent = 'Gagal reverse geocode'; });

        // Suhu (mock karena tanpa API key)
        const mockTemp = (27 + Math.random() * 6).toFixed(1);
        tempDisplay.textContent = `${mockTemp} °C`;
    }

    if (navigator.geolocation) {
        watchId = navigator.geolocation.watchPosition(updatePosition, (e) => {
            calibStatus.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#facc15;"></i> GPS error: ${e.message}`;
        }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 5000 });
    }

    // ---------- KALIBRASI ----------
    btnCalibrate.addEventListener('click', function() {
        if (isCalibrating) return;
        isCalibrating = true;
        calibStatus.innerHTML = '<i class="fas fa-spinner fa-spin" style="color:#facc15;"></i> Kalibrasi: gerakkan HP angka 8...';
        let count = 0;
        const interval = setInterval(() => {
            count++;
            if (count >= 5) {
                clearInterval(interval);
                isCalibrating = false;
                calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Kalibrasi selesai';
                isLocked = false;
                isManual = false;
                manualSlider.style.display = 'none';
                btnLock.classList.remove('active');
                btnManualToggle.classList.remove('active');
                btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
                btnManualToggle.innerHTML = '<i class="fas fa-sliders-h"></i> Manual';
                setTimeout(() => {
                    calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Siap · Sensor aktif';
                }, 1500);
            }
        }, 1000);
    });

    // ---------- LOCK ----------
    btnLock.addEventListener('click', function() {
        if (isCalibrating) return;
        isLocked = !isLocked;
        if (isLocked) {
            lockedBearing = currentHeading;
            btnLock.classList.add('active');
            btnLock.innerHTML = '<i class="fas fa-lock-open"></i> Unlock';
            calibStatus.innerHTML = `<i class="fas fa-lock" style="color:#facc15;"></i> Locked: ${Math.round(lockedBearing)}°`;
            if (isManual) {
                isManual = false;
                manualSlider.style.display = 'none';
                btnManualToggle.classList.remove('active');
                btnManualToggle.innerHTML = '<i class="fas fa-sliders-h"></i> Manual';
            }
        } else {
            btnLock.classList.remove('active');
            btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
            calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Siap · Sensor aktif';
        }
    });

    // ---------- MANUAL ----------
    btnManualToggle.addEventListener('click', function() {
        if (isCalibrating) return;
        isManual = !isManual;
        if (isManual) {
            manualSlider.style.display = 'flex';
            btnManualToggle.classList.add('active');
            btnManualToggle.innerHTML = '<i class="fas fa-check"></i> ON';
            if (isLocked) {
                isLocked = false;
                btnLock.classList.remove('active');
                btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
            }
            manualValue = currentHeading;
            manualAngle.value = manualValue;
            manualAngleDisplay.textContent = `${Math.round(manualValue)}°`;
            updateNeedle(manualValue);
            calibStatus.innerHTML = '<i class="fas fa-sliders-h" style="color:#a855f7;"></i> Mode Manual';
        } else {
            manualSlider.style.display = 'none';
            btnManualToggle.classList.remove('active');
            btnManualToggle.innerHTML = '<i class="fas fa-sliders-h"></i> Manual';
            calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Siap · Sensor aktif';
        }
    });

    manualAngle.addEventListener('input', function() {
        if (!isManual) return;
        manualValue = parseFloat(this.value);
        manualAngleDisplay.textContent = `${Math.round(manualValue)}°`;
        updateNeedle(manualValue);
    });

    // ---------- RESET ----------
    btnReset.addEventListener('click', function() {
        if (isCalibrating) return;
        isLocked = false;
        isManual = false;
        manualSlider.style.display = 'none';
        btnLock.classList.remove('active');
        btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
        btnManualToggle.classList.remove('active');
        btnManualToggle.innerHTML = '<i class="fas fa-sliders-h"></i> Manual';
        calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Reset · Sensor aktif';
        // Kembali ke sensor
        if (window.DeviceOrientationEvent) {
            // force
        }
        setTimeout(() => {
            calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Siap · Sensor aktif';
        }, 1200);
    });

    // ---------- FALLBACK DEMO (jika tidak ada sensor) ----------
    let mockInterval = null;
    if (!window.DeviceOrientationEvent) {
        mockInterval = setInterval(() => {
            if (isManual || isLocked || isCalibrating) return;
            const mock = (Date.now() / 25) % 360;
            setHeading(mock);
        }, 150);
    }

    window.addEventListener('beforeunload', function() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
        if (mockInterval) clearInterval(mockInterval);
    });

})();
</script>
</body>
</html>
