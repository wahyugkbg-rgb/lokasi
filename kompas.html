<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kompas Futuristik OPPO A9</title>

    <!-- Font & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"/>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0b0e1a, #05070c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .container {
            max-width: 460px;
            width: 100%;
            background: rgba(10, 14, 30, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 255, 0.25);
            border-radius: 48px 48px 32px 32px;
            padding: 24px 20px 28px;
            box-shadow: 0 20px 60px rgba(0, 180, 255, 0.2), inset 0 0 30px rgba(0, 255, 255, 0.05);
            transition: all 0.2s;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .header i {
            color: #00f0ff;
            font-size: 22px;
            filter: drop-shadow(0 0 8px #00f0ff);
        }

        /* KOMPAS */
        .compass-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            max-width: 340px;
            margin: 0 auto 10px;
        }

        .compass-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid rgba(0, 255, 255, 0.5);
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.25), inset 0 0 40px rgba(0, 255, 255, 0.05);
            background: radial-gradient(circle at 30% 30%, #12162b, #070a14);
        }

        .compass-ring::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 255, 255, 0.2);
        }

        /* Skala derajat */
        .degree-marks {
            position: absolute;
            inset: 12px;
            border-radius: 50%;
        }
        .degree-marks span {
            position: absolute;
            left: 50%;
            top: -6px;
            transform-origin: bottom center;
            font-size: 11px;
            font-weight: 700;
            color: rgba(0, 255, 255, 0.7);
            text-shadow: 0 0 10px #00f0ff;
            width: 20px;
            margin-left: -10px;
            text-align: center;
        }
        .degree-marks span::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 10px;
            background: rgba(0, 255, 255, 0.3);
        }
        .degree-marks span:nth-child(4n)::before { height: 16px; background: #00f0ff; }

        /* Jarum */
        .needle-container {
            position: absolute;
            inset: 30px;
            border-radius: 50%;
            transition: transform 0.08s linear;
            will-change: transform;
        }

        .needle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 6px;
            height: 50%;
            transform-origin: bottom center;
            transform: translate(-50%, -100%) rotate(0deg);
            border-radius: 12px;
            background: linear-gradient(to top, #ff2d75, #ff6b9d);
            box-shadow: 0 0 30px #ff2d75, 0 0 60px rgba(255, 45, 117, 0.4);
            z-index: 10;
            transition: transform 0.05s linear;
        }
        .needle::after {
            content: '';
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid #ff2d75;
            filter: drop-shadow(0 0 20px #ff2d75);
        }
        /* Jarum selatan (putih) */
        .needle-south {
            height: 40%;
            background: linear-gradient(to top, #a0aec0, #e2e8f0);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            top: 50%;
            transform-origin: top center;
            transform: translate(-50%, 0%) rotate(0deg);
            border-radius: 12px;
        }
        .needle-south::after {
            display: none;
        }

        /* Center dot */
        .center-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f0ff, #0070a0);
            box-shadow: 0 0 30px #00f0ff;
            z-index: 20;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* Info arah (angka) */
        .direction-text {
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 30px #00f0ff, 0 0 60px #00a0ff;
            letter-spacing: 4px;
            margin-top: -10px;
        }
        .direction-text small {
            font-size: 14px;
            color: #a855f7;
            text-shadow: 0 0 20px #a855f7;
            margin-left: 10px;
        }

        /* Tombol aksi */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 16px 0 12px;
        }
        .actions button {
            background: rgba(0, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 16px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: #e0f0ff;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.25s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            flex: 1 0 auto;
            justify-content: center;
            cursor: pointer;
        }
        .actions button i {
            color: #00f0ff;
            font-size: 14px;
        }
        .actions button.active {
            background: rgba(0, 255, 255, 0.2);
            border-color: #00f0ff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
        }
        .actions button:active { transform: scale(0.95); }

        /* Slider manual */
        .manual-slider {
            width: 100%;
            margin: 6px 0 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 4px;
        }
        .manual-slider input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00f0ff, #a855f7);
            border-radius: 20px;
            outline: none;
        }
        .manual-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: radial-gradient(circle, #00f0ff, #0080aa);
            cursor: pointer;
            box-shadow: 0 0 25px #00f0ff;
            border: 2px solid #fff;
        }
        .manual-slider span {
            color: #a855f7;
            font-weight: 700;
            font-size: 14px;
            min-width: 50px;
            text-shadow: 0 0 15px #a855f7;
        }

        /* Info posisi & suhu */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 14px 0 8px;
        }
        .info-card {
            background: rgba(0, 255, 255, 0.04);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 20px;
            padding: 12px 12px;
            backdrop-filter: blur(4px);
        }
        .info-card .label {
            font-size: 9px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .info-card .value {
            font-size: 14px;
            font-weight: 700;
            color: #b0e0ff;
            word-break: break-word;
            text-shadow: 0 0 12px rgba(0, 200, 255, 0.3);
            margin-top: 2px;
            line-height: 1.3;
        }
        .info-card .value i {
            color: #00f0ff;
            margin-right: 4px;
        }
        .info-card.full {
            grid-column: 1 / -1;
        }

        /* Status kalibrasi */
        .calib-status {
            text-align: center;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        .calib-status i {
            color: #facc15;
            margin-right: 6px;
        }

        /* animasi pulse */
        .pulse {
            animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.7; text-shadow: 0 0 10px #00f0ff; }
            50% { opacity: 1; text-shadow: 0 0 30px #00f0ff, 0 0 60px #a855f7; }
            100% { opacity: 0.7; text-shadow: 0 0 10px #00f0ff; }
        }

        /* responsif */
        @media (max-width: 400px) {
            .container { padding: 16px 12px; }
            .actions button { font-size: 9px; padding: 8px 10px; }
            .info-card .value { font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <!-- Header -->
    <div class="header">
        <h1><i class="fas fa-satellite" style="margin-right:8px;"></i> AZIMUTH</h1>
        <i class="fas fa-bolt"></i>
    </div>

    <!-- Kompas -->
    <div class="compass-wrapper">
        <div class="compass-ring"></div>
        <div class="degree-marks" id="degreeMarks"></div>

        <div class="needle-container" id="needleContainer">
            <div class="needle" id="needleNorth"></div>
            <div class="needle needle-south" id="needleSouth"></div>
        </div>
        <div class="center-dot"></div>
    </div>

    <div class="direction-text" id="directionText">
        0° <small>UTARA</small>
    </div>

    <!-- Tombol aksi -->
    <div class="actions">
        <button id="btnCalibrate"><i class="fas fa-sync-alt"></i> Kalibrasi</button>
        <button id="btnLock" class=""><i class="fas fa-lock"></i> Lock</button>
        <button id="btnManualToggle"><i class="fas fa-sliders-h"></i> Manual</button>
    </div>

    <!-- Slider manual -->
    <div class="manual-slider" id="manualSlider" style="display:none;">
        <i class="fas fa-undo-alt" style="color:#00f0ff;"></i>
        <input type="range" id="manualAngle" min="0" max="360" value="0" step="0.5" />
        <span id="manualAngleDisplay">0°</span>
    </div>

    <!-- Info Grid -->
    <div class="info-grid">
        <div class="info-card">
            <div class="label"><i class="fas fa-map-pin"></i> Koordinat</div>
            <div class="value" id="coordDisplay">-6.2088, 106.8456</div>
        </div>
        <div class="info-card">
            <div class="label"><i class="fas fa-thermometer-half"></i> Suhu</div>
            <div class="value" id="tempDisplay">-- °C</div>
        </div>
        <div class="info-card full">
            <div class="label"><i class="fas fa-location-dot"></i> Alamat</div>
            <div class="value" id="addressDisplay">Jl. Contoh No. 123, RT 01/RW 02, Kel. Pusat, Kec. Kota, Jakarta</div>
        </div>
    </div>

    <div class="calib-status" id="calibStatus">
        <i class="fas fa-circle-check"></i> Siap · GPS aktif
    </div>
</div>

<script>
    (function() {
        // ---------- DOM refs ----------
        const needleContainer = document.getElementById('needleContainer');
        const needleNorth = document.getElementById('needleNorth');
        const needleSouth = document.getElementById('needleSouth');
        const directionText = document.getElementById('directionText');
        const coordDisplay = document.getElementById('coordDisplay');
        const tempDisplay = document.getElementById('tempDisplay');
        const addressDisplay = document.getElementById('addressDisplay');
        const calibStatus = document.getElementById('calibStatus');

        const btnCalibrate = document.getElementById('btnCalibrate');
        const btnLock = document.getElementById('btnLock');
        const btnManualToggle = document.getElementById('btnManualToggle');
        const manualSlider = document.getElementById('manualSlider');
        const manualAngle = document.getElementById('manualAngle');
        const manualAngleDisplay = document.getElementById('manualAngleDisplay');

        // ---------- State ----------
        let currentHeading = 0;              // derajat 0-360
        let targetHeading = 0;
        let isLocked = false;
        let lockedBearing = 0;
        let isManual = false;
        let manualValue = 0;
        let isCalibrating = false;

        // GPS
        let watchId = null;
        let lastCoords = { lat: -6.2088, lng: 106.8456 };

        // API Key OpenWeatherMap (ganti dengan key Anda, atau gunakan mock)
        const WEATHER_API_KEY = 'YOUR_OPENWEATHER_API_KEY'; // ganti dengan key asli

        // ---------- Generate degree marks ----------
        (function buildMarks() {
            const container = document.getElementById('degreeMarks');
            for (let i = 0; i < 36; i++) {
                const angle = i * 10;
                const span = document.createElement('span');
                span.textContent = angle;
                span.style.transform = `rotate(${angle}deg) translateY(-32px)`;
                container.appendChild(span);
            }
        })();

        // ---------- Helper: update jarum ----------
        function updateNeedle(deg) {
            // deg = 0 = utara (atas)
            const rotateDeg = deg;
            needleNorth.style.transform = `translate(-50%, -100%) rotate(${rotateDeg}deg)`;
            needleSouth.style.transform = `translate(-50%, 0%) rotate(${rotateDeg}deg)`;
            // update teks
            const dir = getDirection(deg);
            directionText.innerHTML = `${Math.round(deg)}° <small>${dir}</small>`;
        }

        function getDirection(deg) {
            const dirs = ['UTARA', 'TIMUR LAUT', 'TIMUR', 'TENGGARA', 'SELATAN', 'BARAT DAYA', 'BARAT', 'BARAT LAUT'];
            const idx = Math.round(((deg % 360) / 45)) % 8;
            return dirs[idx];
        }

        // ---------- Set heading (dengan smoothing) ----------
        function setHeading(deg) {
            targetHeading = deg % 360;
            if (targetHeading < 0) targetHeading += 360;
            if (!isManual && !isLocked) {
                currentHeading = targetHeading;
                updateNeedle(currentHeading);
            } else if (isLocked) {
                // locked: tetap di lockedBearing
                updateNeedle(lockedBearing);
            }
        }

        // ---------- Loop animasi (smooth) ----------
        function animateLoop() {
            if (!isManual && !isLocked) {
                // smooth follow
                let diff = targetHeading - currentHeading;
                if (diff > 180) diff -= 360;
                if (diff < -180) diff += 360;
                currentHeading += diff * 0.25; // smoothing
                if (Math.abs(diff) < 0.1) currentHeading = targetHeading;
                currentHeading = ((currentHeading % 360) + 360) % 360;
                updateNeedle(currentHeading);
            } else if (isLocked) {
                updateNeedle(lockedBearing);
            } else if (isManual) {
                updateNeedle(manualValue);
            }
            requestAnimationFrame(animateLoop);
        }
        animateLoop();

        // ---------- Sensor: Device Orientation ----------
        function handleOrientation(event) {
            if (isCalibrating) return;
            if (isManual) return;
            if (isLocked) return;

            let alpha = event.alpha || 0; // 0-360, arah kompas
            // pada OPPO A9 (Android) biasanya alpha sudah kompas
            // webkitCompassHeading untuk iOS, tapi kita pakai alpha
            if (event.webkitCompassHeading !== undefined) {
                alpha = event.webkitCompassHeading;
            }
            // Jika alpha null, gunakan GPS heading (jika ada)
            if (alpha === null || isNaN(alpha)) {
                // fallback ke GPS course
                if (lastCoords.course !== undefined && lastCoords.course !== null) {
                    alpha = lastCoords.course;
                } else {
                    alpha = 0;
                }
            }
            setHeading(alpha);
        }

        // Cek dukungan sensor
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', handleOrientation, true);
        } else {
            calibStatus.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#facc15;"></i> Sensor tidak tersedia, gunakan GPS course';
        }

        // ---------- GPS Position ----------
        function updatePosition(pos) {
            const coords = pos.coords;
            lastCoords = {
                lat: coords.latitude,
                lng: coords.longitude,
                course: coords.heading || null
            };
            coordDisplay.textContent = `${lastCoords.lat.toFixed(5)}, ${lastCoords.lng.toFixed(5)}`;

            // Reverse geocoding (Nominatim)
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lastCoords.lat}&lon=${lastCoords.lng}&zoom=18&addressdetails=1`)
                .then(res => res.json())
                .then(data => {
                    if (data && data.display_name) {
                        let addr = data.display_name;
                        // coba ekstrak RT/RW
                        const road = data.address?.road || '';
                        const suburb = data.address?.suburb || '';
                        const city = data.address?.city || data.address?.town || data.address?.village || '';
                        const rt = data.address?.rt || '';
                        const rw = data.address?.rw || '';
                        let detail = `${road}, ${suburb}`;
                        if (rt || rw) detail += `, RT ${rt || '--'}/RW ${rw || '--'}`;
                        if (city) detail += `, ${city}`;
                        addressDisplay.textContent = detail || addr;
                    } else {
                        addressDisplay.textContent = 'Alamat tidak ditemukan';
                    }
                })
                .catch(() => {
                    addressDisplay.textContent = 'Gagal reverse geocode';
                });

            // Suhu dari OpenWeatherMap
            if (WEATHER_API_KEY && WEATHER_API_KEY !== 'YOUR_OPENWEATHER_API_KEY') {
                fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${lastCoords.lat}&lon=${lastCoords.lng}&appid=${WEATHER_API_KEY}&units=metric`)
                    .then(r => r.json())
                    .then(data => {
                        if (data.main && data.main.temp !== undefined) {
                            tempDisplay.textContent = `${data.main.temp.toFixed(1)} °C`;
                        }
                    })
                    .catch(() => {});
            } else {
                // Mock suhu (karena tidak ada API key)
                const mockTemp = (28 + Math.random() * 5).toFixed(1);
                tempDisplay.textContent = `${mockTemp} °C`;
            }
        }

        function gpsError(err) {
            calibStatus.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:#facc15;"></i> GPS error: ${err.message}`;
        }

        if (navigator.geolocation) {
            watchId = navigator.geolocation.watchPosition(updatePosition, gpsError, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 5000
            });
        } else {
            calibStatus.innerHTML = '<i class="fas fa-exclamation-triangle" style="color:#facc15;"></i> GPS tidak didukung';
        }

        // ---------- Kalibrasi ----------
        btnCalibrate.addEventListener('click', function() {
            if (isCalibrating) return;
            isCalibrating = true;
            calibStatus.innerHTML = '<i class="fas fa-spinner fa-spin" style="color:#facc15;"></i> Kalibrasi: gerakkan HP membentuk angka 8...';
            let count = 0;
            // Simulasi kalibrasi: setelah 5 detik selesai
            const interval = setInterval(() => {
                count++;
                if (count >= 5) {
                    clearInterval(interval);
                    isCalibrating = false;
                    calibStatus.innerHTML = '<i class="fas fa-circle-check" style="color:#4ade80;"></i> Kalibrasi selesai';
                    // Reset lock/manual
                    isLocked = false;
                    isManual = false;
                    manualSlider.style.display = 'none';
                    btnLock.classList.remove('active');
                    // forced refresh heading
                    if (window.DeviceOrientationEvent) {
                        // trigger ulang
                    }
                    setTimeout(() => {
                        calibStatus.innerHTML = '<i class="fas fa-circle-check"></i> Siap · GPS aktif';
                    }, 2000);
                }
            }, 1000);
        });

        // ---------- Lock ----------
        btnLock.addEventListener('click', function() {
            if (isCalibrating) return;
            isLocked = !isLocked;
            if (isLocked) {
                lockedBearing = currentHeading;
                btnLock.classList.add('active');
                btnLock.innerHTML = '<i class="fas fa-lock-open"></i> Unlock';
                calibStatus.innerHTML = `<i class="fas fa-lock" style="color:#facc15;"></i> Locked: ${Math.round(lockedBearing)}°`;
                if (isManual) {
                    isManual = false;
                    manualSlider.style.display = 'none';
                    btnManualToggle.classList.remove('active');
                }
            } else {
                btnLock.classList.remove('active');
                btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
                calibStatus.innerHTML = '<i class="fas fa-circle-check"></i> Siap · GPS aktif';
            }
        });

        // ---------- Manual Toggle ----------
        btnManualToggle.addEventListener('click', function() {
            if (isCalibrating) return;
            isManual = !isManual;
            if (isManual) {
                manualSlider.style.display = 'flex';
                btnManualToggle.classList.add('active');
                btnManualToggle.innerHTML = '<i class="fas fa-check"></i> Manual ON';
                // jika lock aktif, nonaktifkan lock
                if (isLocked) {
                    isLocked = false;
                    btnLock.classList.remove('active');
                    btnLock.innerHTML = '<i class="fas fa-lock"></i> Lock';
                }
                // set slider ke heading saat ini
                manualValue = currentHeading;
                manualAngle.value = manualValue;
                manualAngleDisplay.textContent = `${Math.round(manualValue)}°`;
                updateNeedle(manualValue);
                calibStatus.innerHTML = '<i class="fas fa-sliders-h" style="color:#a855f7;"></i> Mode Manual';
            } else {
                manualSlider.style.display = 'none';
                btnManualToggle.classList.remove('active');
                btnManualToggle.innerHTML = '<i class="fas fa-sliders-h"></i> Manual';
                calibStatus.innerHTML = '<i class="fas fa-circle-check"></i> Siap · GPS aktif';
                // kembali ke sensor
                if (window.DeviceOrientationEvent) {
                    // force refresh
                }
            }
        });

        // Slider manual
        manualAngle.addEventListener('input', function() {
            if (!isManual) return;
            manualValue = parseFloat(this.value);
            manualAngleDisplay.textContent = `${Math.round(manualValue)}°`;
            updateNeedle(manualValue);
        });

        // ---------- Simulasi / fallback jika tidak ada sensor (untuk demo di desktop) ----------
        // Jika tidak ada sensor, kita gunakan mock random (hanya untuk demo)
        let mockInterval = null;
        if (!window.DeviceOrientationEvent) {
            // tidak ada sensor sama sekali
            mockInterval = setInterval(() => {
                if (isManual || isLocked || isCalibrating) return;
                const mock = (Date.now() / 30) % 360;
                setHeading(mock);
            }, 200);
        }

        // cleanup
        window.addEventListener('beforeunload', function() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            if (mockInterval) clearInterval(mockInterval);
        });

    })();
</script>
</body>
</html>
