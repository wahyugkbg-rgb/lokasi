<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ KOMPAS AGGRESSIVE ⚡</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  
  body {
    background: #0a0a0c;
    color: #e8e6e1;
    font-family: 'Courier New', monospace;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    touch-action: none;
    user-select: none;
  }

  #app {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }

  /* === PERMISSION OVERLAY === */
  #permOverlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #0a0a0c;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 15px;
    padding: 30px;
    text-align: center;
  }
  #permOverlay.hidden { display: none; }
  #permOverlay .icon { font-size: 60px; color: #ff3d00; animation: pulse 1.5s infinite; }
  #permOverlay h1 { font-size: 20px; font-weight: 900; letter-spacing: 4px; color: #ff3d00; }
  #permOverlay p { font-size: 13px; color: #666; line-height: 1.6; max-width: 300px; }
  #permBtn {
    background: #ff3d00;
    color: #000;
    border: none;
    padding: 14px 40px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 40px rgba(255,61,0,0.4);
  }
  #permBtn:active { transform: scale(0.95); }
  #permBtn:disabled { opacity: 0.5; }

  @keyframes pulse {
    0%,100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.1); }
  }

  /* === COMPASS === */
  .compass-container {
    position: relative;
    width: min(85vw, 350px);
    height: min(85vw, 350px);
    flex-shrink: 0;
  }

  canvas#compassCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(255,61,0,0.1), inset 0 0 60px rgba(255,61,0,0.05);
  }

  .center-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  .center-display .deg {
    font-size: clamp(40px, 14vw, 60px);
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,255,255,0.1);
  }
  .center-display .label {
    font-size: clamp(18px, 5vw, 26px);
    font-weight: 900;
    color: #ffab00;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,171,0,0.3);
    min-height: 30px;
  }
  .center-display .sub {
    font-size: 10px;
    color: #666;
    letter-spacing: 2px;
  }

  .fixed-pointer {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 26px solid #ff3d00;
    filter: drop-shadow(0 0 20px rgba(255,61,0,0.8));
  }

  /* === STATUS BAR === */
  .status-bar {
    width: 100%;
    max-width: 400px;
    display: flex;
    justify-content: space-between;
    padding: 6px 10px;
    margin-top: 8px;
    background: rgba(18,18,22,0.9);
    border: 1px solid rgba(255,61,0,0.2);
    border-radius: 6px;
    font-size: 9px;
    letter-spacing: 1px;
  }
  .status-bar .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .status-bar .dot.green { background: #00e676; box-shadow: 0 0 10px #00e676; }
  .status-bar .dot.red { background: #ff1744; box-shadow: 0 0 10px #ff1744; }
  .status-bar .dot.yellow { background: #ffab00; box-shadow: 0 0 10px #ffab00; }

  /* === INFO GRID === */
  .info-grid {
    width: 100%;
    max-width: 400px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .info-cell {
    background: rgba(18,18,22,0.9);
    border: 1px solid rgba(255,61,0,0.15);
    border-radius: 4px;
    padding: 4px 2px;
    text-align: center;
  }
  .info-cell .lbl { font-size: 7px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
  .info-cell .val { font-size: 12px; font-weight: 700; color: #e8e6e1; font-variant-numeric: tabular-nums; }
  .info-cell .val.accent { color: #ff3d00; }
  .info-cell .val.cyan { color: #00e5ff; }
  .info-cell .val.green { color: #00e676; }

  /* === BUTTONS === */
  .actions {
    width: 100%;
    max-width: 400px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 6px;
  }
  .btn {
    background: rgba(18,18,22,0.9);
    border: 1px solid rgba(255,61,0,0.25);
    border-radius: 6px;
    color: #e8e6e1;
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .btn:active {
    background: #ff3d00;
    color: #000;
    transform: scale(0.96);
  }
  .btn.active {
    background: #ff3d00;
    color: #000;
    border-color: #ff3d00;
    box-shadow: 0 0 30px rgba(255,61,0,0.3);
  }

  /* === TOAST === */
  #toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(18,18,22,0.95);
    border: 1px solid #ff3d00;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* === GRAPH === */
  .graph-container {
    width: 100%;
    max-width: 400px;
    height: 30px;
    margin-top: 6px;
    background: rgba(18,18,22,0.9);
    border: 1px solid rgba(255,61,0,0.15);
    border-radius: 4px;
    overflow: hidden;
  }
  canvas#graphCanvas {
    width: 100%;
    height: 100%;
  }

  /* === RESPONSIVE === */
  @media (max-width: 400px) {
    .info-grid { grid-template-columns: repeat(4, 1fr); }
    .info-cell .val { font-size: 10px; }
  }

  .fps {
    position: fixed;
    top: 4px;
    right: 6px;
    font-size: 8px;
    color: #333;
    z-index: 50;
  }
</style>
</head>
<body>

<div id="app">
  <!-- Permission Overlay -->
  <div id="permOverlay">
    <div class="icon">🧭</div>
    <h1>AKSES SENSOR</h1>
    <p>Kompas membutuhkan akses ke sensor orientasi. Aktifkan untuk navigasi real-time.</p>
    <button id="permBtn">AKTIFKAN</button>
    <p style="font-size:10px;color:#444;margin-top:5px;" id="debugInfo">Oppo A9 • Sensor Ready</p>
  </div>

  <!-- Compass -->
  <div class="compass-container">
    <div class="fixed-pointer"></div>
    <canvas id="compassCanvas"></canvas>
    <div class="center-display">
      <div class="deg" id="degDisplay">---</div>
      <div class="label" id="dirDisplay">---</div>
      <div class="sub" id="subDisplay">⚡ AGGRESSIVE MODE</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span><span class="dot red" id="statusDot"></span><span id="statusText">MENUNGGU</span></span>
    <span id="freqDisplay">0 Hz</span>
    <span id="lockStatus">🔓 BEBAS</span>
  </div>

  <!-- Info -->
  <div class="info-grid">
    <div class="info-cell"><div class="lbl">RAW</div><div class="val accent" id="rawVal">---</div></div>
    <div class="info-cell"><div class="lbl">DELTA</div><div class="val" id="deltaVal">---</div></div>
    <div class="info-cell"><div class="lbl">PITCH</div><div class="val cyan" id="pitchVal">---</div></div>
    <div class="info-cell"><div class="lbl">ROLL</div><div class="val cyan" id="rollVal">---</div></div>
  </div>

  <!-- Graph -->
  <div class="graph-container">
    <canvas id="graphCanvas"></canvas>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn" id="btnCal">📡 KALIBRASI</button>
    <button class="btn" id="btnLock">🔒 KUNCI</button>
  </div>
</div>

<div id="toast"></div>
<div class="fps" id="fps">--</div>

<script>
// ============================================================
// KOMPAS AGGRESSIVE - OPTIMIZED FOR OPPO A9
// ============================================================

(function() {
  'use strict';

  // === DOM REFS ===
  const $ = id => document.getElementById(id);
  const permOverlay = $('permOverlay');
  const permBtn = $('permBtn');
  const compassCanvas = $('compassCanvas');
  const ctx = compassCanvas.getContext('2d');
  const degDisplay = $('degDisplay');
  const dirDisplay = $('dirDisplay');
  const subDisplay = $('subDisplay');
  const rawVal = $('rawVal');
  const deltaVal = $('deltaVal');
  const pitchVal = $('pitchVal');
  const rollVal = $('rollVal');
  const statusDot = $('statusDot');
  const statusText = $('statusText');
  const freqDisplay = $('freqDisplay');
  const lockStatus = $('lockStatus');
  const graphCanvas = $('graphCanvas');
  const gctx = graphCanvas.getContext('2d');
  const toast = $('toast');
  const fps = $('fps');
  const btnCal = $('btnCal');
  const btnLock = $('btnLock');
  const debugInfo = $('debugInfo');

  // === STATE ===
  let heading = 0;
  let rawHeading = 0;
  let pitch = 0;
  let roll = 0;
  let prevHeading = 0;
  let isLocked = false;
  let lockedValue = 0;
  let isCalibrating = false;
  let sensorActive = false;
  let firstData = true;
  let updateCount = 0;
  let lastFreqTime = performance.now();

  // History for graph
  const history = new Array(100).fill(0);
  let histIdx = 0;

  // === DIRECTIONS ===
  const dirs = [
    { min: 348.75, max: 360, label: 'U', full: 'UTARA' },
    { min: 0, max: 11.25, label: 'U', full: 'UTARA' },
    { min: 11.25, max: 33.75, label: 'UTL', full: 'UTARA TIMUR LAUT' },
    { min: 33.75, max: 56.25, label: 'TL', full: 'TIMUR LAUT' },
    { min: 56.25, max: 78.75, label: 'TLT', full: 'TIMUR LAUT TIMUR' },
    { min: 78.75, max: 101.25, label: 'T', full: 'TIMUR' },
    { min: 101.25, max: 123.75, label: 'TTG', full: 'TIMUR TENGGARA' },
    { min: 123.75, max: 146.25, label: 'TG', full: 'TENGGARA' },
    { min: 146.25, max: 168.75, label: 'TGS', full: 'TENGGARA SELATAN' },
    { min: 168.75, max: 191.25, label: 'S', full: 'SELATAN' },
    { min: 191.25, max: 213.75, label: 'SBD', full: 'SELATAN BARAT DAYA' },
    { min: 213.75, max: 236.25, label: 'BD', full: 'BARAT DAYA' },
    { min: 236.25, max: 258.75, label: 'BDB', full: 'BARAT DAYA BARAT' },
    { min: 258.75, max: 281.25, label: 'B', full: 'BARAT' },
    { min: 281.25, max: 303.75, label: 'BBL', full: 'BARAT BARAT LAUT' },
    { min: 303.75, max: 326.25, label: 'BL', full: 'BARAT LAUT' },
    { min: 326.25, max: 348.75, label: 'BLU', full: 'BARAT LAUT UTARA' },
  ];

  function getDir(deg) {
    for (const d of dirs) {
      if (d.min <= d.max) {
        if (deg >= d.min && deg < d.max) return d;
      } else {
        if (deg >= d.min || deg < d.max) return d;
      }
    }
    return dirs[0];
  }

  function angleDiff(a, b) {
    let d = a - b;
    while (d > 180) d -= 360;
    while (d < -180) d += 360;
    return d;
  }

  // === TOAST ===
  let toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // === DRAW COMPASS ===
  function drawCompass(deg) {
    const w = compassCanvas.width;
    const h = compassCanvas.height;
    const cx = w / 2;
    const cy = h / 2;
    const r = w / 2 - 4;

    ctx.clearRect(0, 0, w, h);

    // Background glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, 'rgba(255,61,0,0.05)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    // Outer ring
    ctx.strokeStyle = 'rgba(255,61,0,0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.85, 0, Math.PI * 2);
    ctx.stroke();

    // Ticks
    const dialRot = -deg * Math.PI / 180;
    for (let i = 0; i < 72; i++) {
      const angle = (i / 72) * Math.PI * 2 + dialRot;
      const isMain = i % 6 === 0;
      const isSub = i % 2 === 0;
      const r1 = isMain ? r * 0.88 : (isSub ? r * 0.91 : r * 0.93);
      const r2 = r * 0.96;
      const x1 = cx + r1 * Math.cos(angle);
      const y1 = cy + r1 * Math.sin(angle);
      const x2 = cx + r2 * Math.cos(angle);
      const y2 = cy + r2 * Math.sin(angle);

      ctx.strokeStyle = isMain ? 'rgba(255,61,0,0.7)' : 'rgba(255,255,255,0.15)';
      ctx.lineWidth = isMain ? 2 : 0.5;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      // Labels
      if (isMain) {
        const lr = r * 0.78;
        const lx = cx + lr * Math.cos(angle);
        const ly = cy + lr * Math.sin(angle) + 3;
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.font = '8px "Courier New"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const val = (i / 72 * 360) % 360;
        ctx.fillText(Math.round(val) + '°', lx, ly);
      }
    }

    // Cardinal directions
    const cardLabels = ['U', 'T', 'S', 'B'];
    const cardAngles = [-90, 0, 90, 180];
    for (let i = 0; i < 4; i++) {
      const angle = (cardAngles[i] + deg) * Math.PI / 180;
      const lr = r * 0.75;
      const lx = cx + lr * Math.cos(angle);
      const ly = cy + lr * Math.sin(angle) + 4;
      ctx.fillStyle = i === 0 ? '#ff3d00' : 'rgba(255,255,255,0.4)';
      ctx.font = i === 0 ? 'bold 18px "Courier New"' : '14px "Courier New"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(cardLabels[i], lx, ly);
    }

    // Intercardinal
    const interLabels = ['TL', 'TG', 'BD', 'BL'];
    const interAngles = [-45, 45, 135, 225];
    for (let i = 0; i < 4; i++) {
      const angle = (interAngles[i] + deg) * Math.PI / 180;
      const lr = r * 0.82;
      const lx = cx + lr * Math.cos(angle);
      const ly = cy + lr * Math.sin(angle) + 3;
      ctx.fillStyle = 'rgba(255,171,0,0.3)';
      ctx.font = '9px "Courier New"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(interLabels[i], lx, ly);
    }

    // Needle
    ctx.save();
    ctx.translate(cx, cy);

    // North needle
    ctx.shadowColor = 'rgba(255,61,0,0.6)';
    ctx.shadowBlur = 20;
    const grad2 = ctx.createLinearGradient(0, -r * 0.85, 0, 0);
    grad2.addColorStop(0, '#ff3d00');
    grad2.addColorStop(1, '#ff6e40');
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.85);
    ctx.lineTo(-5, 0);
    ctx.lineTo(0, -r * 0.7);
    ctx.lineTo(5, 0);
    ctx.closePath();
    ctx.fill();

    // South needle
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#37474f';
    ctx.beginPath();
    ctx.moveTo(0, r * 0.75);
    ctx.lineTo(-4, 0);
    ctx.lineTo(0, r * 0.6);
    ctx.lineTo(4, 0);
    ctx.closePath();
    ctx.fill();

    // Center
    ctx.shadowColor = 'rgba(255,61,0,0.4)';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff3d00';
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(0, 0, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // Crosshair
    ctx.strokeStyle = 'rgba(255,61,0,0.06)';
    ctx.lineWidth = 0.5;
    ctx.setLineDash([3, 5]);
    ctx.beginPath();
    ctx.moveTo(cx, cy - r * 0.5);
    ctx.lineTo(cx, cy + r * 0.5);
    ctx.moveTo(cx - r * 0.5, cy);
    ctx.lineTo(cx + r * 0.5, cy);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // === DRAW GRAPH ===
  function drawGraph() {
    const w = graphCanvas.width;
    const h = graphCanvas.height;
    gctx.clearRect(0, 0, w, h);

    // Center line
    gctx.strokeStyle = 'rgba(255,61,0,0.1)';
    gctx.lineWidth = 0.5;
    gctx.setLineDash([2, 3]);
    gctx.beginPath();
    gctx.moveTo(0, h / 2);
    gctx.lineTo(w, h / 2);
    gctx.stroke();
    gctx.setLineDash([]);

    // Data
    gctx.strokeStyle = 'rgba(255,61,0,0.7)';
    gctx.lineWidth = 1.5;
    gctx.beginPath();
    for (let i = 0; i < history.length; i++) {
      const idx = (histIdx + i) % history.length;
      const val = history[idx];
      const x = (i / history.length) * w;
      const y = h / 2 - (val - 180) / 180 * (h / 2 - 2);
      if (i === 0) gctx.moveTo(x, y);
      else gctx.lineTo(x, y);
    }
    gctx.stroke();

    // Last point
    const lastVal = history[(histIdx - 1 + history.length) % history.length];
    const lx = w - 1;
    const ly = h / 2 - (lastVal - 180) / 180 * (h / 2 - 2);
    gctx.fillStyle = '#ff3d00';
    gctx.shadowColor = '#ff3d00';
    gctx.shadowBlur = 10;
    gctx.beginPath();
    gctx.arc(lx, ly, 2.5, 0, Math.PI * 2);
    gctx.fill();
    gctx.shadowBlur = 0;
  }

  // === UPDATE UI ===
  function updateUI(deg) {
    const displayDeg = isLocked ? lockedValue : Math.round(deg);
    degDisplay.textContent = String(displayDeg).padStart(3, '0');

    const dir = getDir(deg);
    dirDisplay.textContent = isLocked ? '🔒' : dir.label;

    rawVal.textContent = rawHeading.toFixed(0) + '°';

    const delta = Math.abs(angleDiff(deg, prevHeading));
    deltaVal.textContent = delta.toFixed(1) + '°';
    deltaVal.style.color = delta > 10 ? '#ff1744' : delta > 3 ? '#ffab00' : '#00e676';

    pitchVal.textContent = pitch.toFixed(1) + '°';
    rollVal.textContent = roll.toFixed(1) + '°';

    prevHeading = deg;

    // Graph
    history[histIdx] = deg;
    histIdx = (histIdx + 1) % history.length;
    drawGraph();

    // FPS / Frequency
    updateCount++;
    const now = performance.now();
    if (now - lastFreqTime >= 1000) {
      freqDisplay.textContent = updateCount + ' Hz';
      fps.textContent = updateCount + ' FPS';
      updateCount = 0;
      lastFreqTime = now;
    }
  }

  // === SENSOR HANDLER ===
  function handleOrientation(e) {
    let az = e.alpha || 0;
    const beta = e.beta || 0;
    const gamma = e.gamma || 0;

    // Konversi ke compass heading
    // Untuk Android standard: alpha adalah rotasi terhadap sumbu Z
    // Tapi perlu dikalibrasi dengan beta/gamma untuk akurasi
    // Pendekatan agresif: gunakan alpha langsung dan kompensasi dengan beta/gamma

    // Kompensasi tilt (sederhana)
    const tiltComp = Math.sin(beta * Math.PI / 180) * 5;
    const rollComp = Math.sin(gamma * Math.PI / 180) * 3;

    // Heading dari alpha (0° = north)
    let heading = (360 - az + tiltComp + rollComp) % 360;
    if (heading < 0) heading += 360;

    // Raw untuk display
    rawHeading = heading;

    // Smoothing agresif - hanya jika bergerak sedikit
    if (firstData) {
      heading = heading;
      firstData = false;
    } else {
      // Filter low-pass agresif dengan alpha tinggi untuk respon cepat
      const diff = angleDiff(heading, heading);
      // Gunakan filter EMA dengan alpha 0.7 untuk respon cepat
      heading = smoothAngle(heading, heading, 0.7);
    }

    // Update state
    heading = heading;
    pitch = beta;
    roll = gamma;

    // Update UI
    updateUI(heading);
    drawCompass(heading);

    // Update status
    statusDot.className = 'dot green';
    statusText.textContent = 'AKTIF';
    sensorActive = true;
  }

  function smoothAngle(raw, prev, alpha) {
    const diff = angleDiff(raw, prev);
    let result = prev + diff * alpha;
    if (result < 0) result += 360;
    if (result >= 360) result -= 360;
    return result;
  }

  // === FALLBACK: Gyroscope + Accelerometer untuk device tanpa orientation ===
  let gyroHeading = 0;
  let lastGyroTime = 0;

  function handleMotion(e) {
    if (sensorActive) return;

    const accel = e.accelerationIncludingGravity || {};
    const gyro = e.rotationRate || {};

    // Coba estimasi heading dari gyro
    if (gyro.alpha !== undefined && gyro.alpha !== null) {
      const now = performance.now();
      const dt = (now - lastGyroTime) / 1000;
      lastGyroTime = now;

      // Integrasi gyro
      gyroHeading += gyro.alpha * dt * 3; // scale untuk respons lebih agresif
      gyroHeading = ((gyroHeading % 360) + 360) % 360;

      // Gunakan accelerometer untuk pitch/roll
      if (accel.x !== undefined && accel.y !== undefined && accel.z !== undefined) {
        pitch = Math.atan2(accel.y, accel.z) * 180 / Math.PI;
        roll = Math.atan2(-accel.x, Math.sqrt(accel.y * accel.y + accel.z * accel.z)) * 180 / Math.PI;
      }

      heading = gyroHeading;
      rawHeading = heading;

      updateUI(heading);
      drawCompass(heading);

      statusDot.className = 'dot yellow';
      statusText.textContent = 'GYRO MODE';
      sensorActive = true;
      showToast('🔄 Mode Gyro aktif');
    }
  }

  // === INIT SENSORS ===
  async function initSensors() {
    try {
      // Coba permission API (iOS 13+)
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm !== 'granted') {
          showToast('❌ Permission ditolak');
          return false;
        }
      }

      // Daftarkan listener
      window.addEventListener('deviceorientation', handleOrientation, { passive: true });
      window.addEventListener('devicemotion', handleMotion, { passive: true });

      // Cek apakah data datang
      return new Promise((resolve) => {
        let attempts = 0;
        const maxAttempts = 30;
        const checker = setInterval(() => {
          attempts++;
          if (heading > 0 || heading < 0) { // heading bisa 0, jadi cek undefined
            clearInterval(checker);
            resolve(true);
          } else if (attempts >= maxAttempts) {
            clearInterval(checker);
            // Coba fallback ke gyro
            if (window.DeviceMotionEvent) {
              showToast('🔄 Menggunakan mode fallback');
              resolve(true);
            } else {
              resolve(false);
            }
          }
        }, 200);
      });

    } catch (err) {
      console.error('Sensor init error:', err);
      showToast('⚠️ Error: ' + err.message);
      return false;
    }
  }

  // === CALIBRATION ===
  function startCalibration() {
    if (isCalibrating) return;
    isCalibrating = true;
    btnCal.textContent = '⏳ KALIBRASI...';
    showToast('🔁 Putar HP membentuk angka 8');

    let totalChange = 0;
    let lastVal = heading;
    let progress = 0;

    const interval = setInterval(() => {
      const change = Math.abs(angleDiff(heading, lastVal));
      totalChange += change;
      lastVal = heading;

      // Butuh ~2000° total rotasi
      progress = Math.min(100, (totalChange / 2000) * 100);

      if (progress >= 100) {
        clearInterval(interval);
        isCalibrating = false;
        btnCal.textContent = '✅ KALIBRASI';
        showToast('✅ Kalibrasi selesai!');
        // Reset offset
        firstData = true;
      }
    }, 100);

    // Safety timeout
    setTimeout(() => {
      if (isCalibrating) {
        clearInterval(interval);
        isCalibrating = false;
        btnCal.textContent = '📡 KALIBRASI';
        showToast('⏱️ Timeout kalibrasi');
      }
    }, 15000);
  }

  // === EVENTS ===
  permBtn.addEventListener('click', async () => {
    permBtn.disabled = true;
    permBtn.textContent = '⏳ MENGINISIALISASI...';
    showToast('🔄 Mengaktifkan sensor...');

    const ok = await initSensors();

    if (ok) {
      permOverlay.classList.add('hidden');
      statusDot.className = 'dot green';
      statusText.textContent = 'AKTIF';
      showToast('✅ Kompas aktif!');
    } else {
      permBtn.disabled = false;
      permBtn.textContent = '🔄 COBA LAGI';
      showToast('❌ Gagal akses sensor. Coba restart HP.');
      debugInfo.textContent = '⚠️ Sensor tidak merespons. Coba restart.';
    }
  });

  btnCal.addEventListener('click', startCalibration);

  btnLock.addEventListener('click', () => {
    isLocked = !isLocked;
    if (isLocked) {
      lockedValue = Math.round(heading);
      btnLock.classList.add('active');
      btnLock.textContent = '🔓 LEPAS';
      lockStatus.textContent = '🔒 TERKUNCI';
      showToast('🔒 Dikunci di ' + lockedValue + '°');
    } else {
      btnLock.classList.remove('active');
      btnLock.textContent = '🔒 KUNCI';
      lockStatus.textContent = '🔓 BEBAS';
      showToast('🔓 Bebas');
    }
  });

  // === RESIZE CANVAS ===
  function resizeCanvas() {
    const container = compassCanvas.parentElement;
    const rect = container.getBoundingClientRect();
    const size = Math.floor(rect.width);
    compassCanvas.width = size * 2;
    compassCanvas.height = size * 2;
    compassCanvas.style.width = size + 'px';
    compassCanvas.style.height = size + 'px';
    ctx.scale(2, 2);

    // Graph
    const gRect = graphCanvas.parentElement.getBoundingClientRect();
    graphCanvas.width = gRect.width * 2;
    graphCanvas.height = gRect.height * 2;
    graphCanvas.style.width = gRect.width + 'px';
    graphCanvas.style.height = gRect.height + 'px';
    gctx.scale(2, 2);

    drawCompass(heading);
    drawGraph();
  }

  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 300));

  // === ANIMATION LOOP ===
  function animate() {
    if (sensorActive) {
      // Redraw terus untuk animasi smooth
      drawCompass(heading);
    }
    requestAnimationFrame(animate);
  }

  // === INIT ===
  resizeCanvas();
  animate();

  // Cek support sensor
  if (!window.DeviceOrientationEvent && !window.DeviceMotionEvent) {
    showToast('⚠️ Device tidak support sensor orientasi');
    debugInfo.textContent = '❌ No sensor support';
  }

  // Fallback: coba akses langsung setelah 5 detik jika belum aktif
  setTimeout(() => {
    if (!sensorActive) {
      showToast('🔄 Goyangkan HP untuk aktivasi sensor');
    }
  }, 3000);

  // === MAGNETOMETER FALLBACK via Generic Sensor API ===
  try {
    if ('Magnetometer' in window) {
      const mag = new Magnetometer({ frequency: 30 });
      mag.addEventListener('reading', () => {
        // Gunakan untuk kalibrasi jika tersedia
        console.log('Mag:', mag.x, mag.y, mag.z);
      });
      mag.start();
    }
  } catch(e) {}

  console.log('🧭 Kompas Aggressive loaded for Oppo A9');

})();
</script>
