<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOMPAS GPS LIVE - OPPO A9</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0c10;--fg:#e8e6e1;--red:#ff1744;--green:#00e676;--cyan:#00e5ff;--gold:#ffab00;--white:#ffffff;--bright-yellow:#fff176;--bright-white:#f5f5f5;--glow:rgba(255,23,68,0.8)}
body{background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw;touch-action:none}
#app{height:100vh;display:flex;flex-direction:column;padding:4px;position:relative;background:radial-gradient(ellipse at center, rgba(255,23,68,0.02) 0%, transparent 70%)}
.header{text-align:center;padding:2px 0;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.03)}
.header h1{font-size:10px;font-weight:900;letter-spacing:2px;color:var(--red);text-shadow:0 0 30px var(--glow)}
.header .status{font-size:6px;color:#555;display:flex;gap:4px;align-items:center}
.status .dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.dot.green{background:var(--green);box-shadow:0 0 12px var(--green);animation:blink 0.6s ease-in-out infinite}
.dot.red{background:var(--red);box-shadow:0 0 12px var(--red)}
.dot.cyan{background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

.compass-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;position:relative;padding:2px 0}
.compass-wrap svg{width:min(60vw,260px);height:min(60vw,260px);filter:drop-shadow(0 0 30px rgba(255,23,68,0.05))}
#compassDisplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10}
#compassDisplay .deg{font-size:clamp(32px,10vw,52px);font-weight:900;font-variant-numeric:tabular-nums;color:#ffffff;text-shadow:0 0 40px rgba(255,255,255,0.15),0 0 80px rgba(255,255,255,0.05);letter-spacing:-1px}
#compassDisplay .dir{font-size:clamp(16px,5vw,26px);font-weight:900;color:#fff176;letter-spacing:4px;text-shadow:0 0 40px rgba(255,235,59,0.3),0 0 80px rgba(255,235,59,0.1);margin-top:-2px}
#compassDisplay .subdir{font-size:8px;color:#ffab00;letter-spacing:2px;margin-top:1px;text-shadow:0 0 20px rgba(255,171,0,0.2);font-weight:700}

.gps-section{background:rgba(20,22,28,0.92);border:1px solid rgba(255,255,255,0.06);border-radius:4px;padding:4px 6px;margin:2px 0}
.gps-section .title{font-size:6px;color:#888;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.gps-section .coord{font-size:10px;font-weight:700;color:#00e5ff;font-variant-numeric:tabular-nums;display:flex;gap:12px;flex-wrap:wrap;text-shadow:0 0 30px rgba(0,229,255,0.15)}
.gps-section .coord span{display:flex;align-items:center;gap:4px}
.gps-section .coord .label{font-size:6px;color:#888;font-weight:400}
.gps-section .addr{font-size:11px;color:#fff176;line-height:1.6;margin-top:3px;word-break:break-word;text-shadow:0 0 30px rgba(255,235,59,0.15);font-weight:700;letter-spacing:0.5px}
.gps-section .addr .rt{color:#00e676;font-weight:900;text-shadow:0 0 30px rgba(0,230,118,0.3)}
.gps-section .addr .highlight{color:#ffffff;font-weight:900;text-shadow:0 0 30px rgba(255,255,255,0.2)}
.gps-section .update-time{font-size:5px;color:#666;text-align:right;margin-top:2px}

.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin:2px 0}
.info-cell{background:rgba(20,22,28,0.9);border:1px solid rgba(255,255,255,0.03);border-radius:3px;padding:2px 1px;text-align:center}
.info-cell .label{font-size:4px;color:#666;text-transform:uppercase;letter-spacing:0.5px}
.info-cell .value{font-size:8px;font-weight:700;margin-top:1px;font-variant-numeric:tabular-nums}
.value.red{color:#ff1744;text-shadow:0 0 20px rgba(255,23,68,0.2)}
.value.cyan{color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,0.2)}
.value.green{color:#00e676;text-shadow:0 0 20px rgba(0,230,118,0.2)}
.value.gold{color:#ffab00;text-shadow:0 0 20px rgba(255,171,0,0.2)}
.value.white{color:#ffffff;text-shadow:0 0 20px rgba(255,255,255,0.15)}

.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:2px;padding:2px 0}
.actions button{background:rgba(20,22,28,0.9);border:1px solid rgba(255,255,255,0.04);border-radius:4px;color:var(--fg);font-family:inherit;font-size:5px;font-weight:700;padding:6px 1px;cursor:pointer;transition:all 0.06s;text-transform:uppercase;letter-spacing:0.5px}
.actions button:active{transform:scale(0.92);background:var(--red);color:#000;border-color:var(--red)}
.actions button.active{background:var(--red);color:#000;border-color:var(--red);box-shadow:0 0 20px var(--glow)}
.actions button.calibrating{animation:pulse 0.4s ease-in-out infinite alternate;border-color:var(--gold)}
@keyframes pulse{from{box-shadow:0 0 8px var(--gold)}to{box-shadow:0 0 25px var(--gold)}}

#graph{width:100%;height:20px;background:rgba(20,22,28,0.9);border:1px solid rgba(255,255,255,0.03);border-radius:3px;margin:1px 0;overflow:hidden}
#graph canvas{width:100%;height:100%}
#fps{position:fixed;top:2px;right:4px;font-size:4px;color:#222;z-index:50}
#manualBadge{position:absolute;top:4px;right:4px;background:rgba(0,229,255,0.15);border:1px solid #00e5ff;color:#00e5ff;font-size:4px;font-weight:700;padding:2px 5px;border-radius:2px;display:none;letter-spacing:1px;animation:blink 0.6s ease-in-out infinite;text-shadow:0 0 20px rgba(0,229,255,0.3)}
#manualBadge.show{display:block}
.diag-toggle{background:rgba(20,22,28,0.9);border:1px solid rgba(255,255,255,0.03);border-radius:2px;color:#444;font-size:4px;padding:2px;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;margin:1px 0;font-family:inherit;width:100%}
.diag-panel{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.03);border-radius:2px;font-size:5px;line-height:1.6}
.diag-panel.open{max-height:400px;overflow-y:auto;padding:4px}
.diag-panel .ok{color:var(--green)}.diag-panel .err{color:var(--red)}.diag-panel .warn{color:var(--gold)}

#calOverlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px}
#calOverlay.show{display:flex}
#calOverlay .circle{width:100px;height:100px;border:3px solid var(--red);border-radius:50%;position:relative;animation:spin 1.5s linear infinite}
#calOverlay .circle::after{content:'';position:absolute;width:14px;height:14px;background:var(--red);border-radius:50%;top:-7px;left:50%;transform:translateX(-50%);box-shadow:0 0 25px var(--glow)}
@keyframes spin{to{transform:rotate(360deg)}}
#calOverlay .text{font-size:10px;color:var(--red);font-weight:700;letter-spacing:1px;text-align:center;line-height:1.8}
#calOverlay .progress{width:160px;height:3px;background:#222;border-radius:2px;overflow:hidden}
#calOverlay .bar{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));width:0%;transition:width 0.15s}
#calOverlay .done{display:none;color:var(--green);font-size:14px;font-weight:900;letter-spacing:2px;animation:popIn 0.4s ease-out}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
#calOverlay .closeBtn{background:var(--red);color:#000;border:none;padding:6px 20px;border-radius:4px;font-family:inherit;font-size:9px;font-weight:900;cursor:pointer;display:none;letter-spacing:1px}

.toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(0,0,0,0.95);color:#fff;padding:5px 14px;border-radius:4px;font-size:7px;font-family:'Courier New',monospace;z-index:999;border:1px solid rgba(255,23,68,0.15);box-shadow:0 4px 20px rgba(0,0,0,0.5);opacity:0;transition:all 0.25s ease;pointer-events:none;font-weight:700;letter-spacing:0.5px;max-width:90%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🧭 KOMPAS GPS LIVE</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">INIT</span>
    </div>
  </div>

  <button class="diag-toggle" id="diagToggle">🔍 DIAGNOSTIK</button>
  <div class="diag-panel" id="diagPanel"></div>

  <!-- KOMPAS -->
  <div class="compass-wrap" id="compassWrap">
    <svg viewBox="0 0 400 400" id="compassSvg">
      <defs>
        <filter id="glowFilter"><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#ff1744"/>
          <stop offset="45%" stop-color="#ff5252"/>
          <stop offset="55%" stop-color="#455a64"/>
          <stop offset="100%" stop-color="#263238"/>
        </linearGradient>
      </defs>
      <circle cx="200" cy="200" r="195" fill="none" stroke="rgba(255,23,68,0.05)" stroke-width="0.5"/>
      <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>
      
      <!-- PERBAIKAN: Dial diputar 45° agar Utara di posisi Timur Laut (mudah dibaca di HP) -->
      <g id="dialGroup" transform="rotate(45, 200, 200)">
        <g id="tickContainer"></g>
        <text x="200" y="28" text-anchor="middle" fill="#ff1744" font-size="20" font-weight="900" font-family="Courier New">U</text>
        <text x="376" y="206" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Courier New">T</text>
        <text x="200" y="384" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Courier New">S</text>
        <text x="24" y="206" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700" font-family="Courier New">B</text>
        <text x="330" y="64" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="8" font-weight="700">TL</text>
        <text x="330" y="350" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="8" font-weight="700">TG</text>
        <text x="70" y="350" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="8" font-weight="700">BD</text>
        <text x="70" y="64" text-anchor="middle" fill="rgba(255,171,0,0.3)" font-size="8" font-weight="700">BL</text>
      </g>
      
      <g id="needleGroup" filter="url(#glowFilter)">
        <!-- Jarum Utara (MERAH) -->
        <polygon points="200,45 192,195 200,185 208,195" fill="url(#needleGrad)" opacity="0.95"/>
        <!-- Jarum Selatan (ABU-ABU) -->
        <polygon points="200,355 192,205 200,215 208,205" fill="#37474f" opacity="0.4"/>
        <circle cx="200" cy="200" r="9" fill="#ff1744" stroke="#0a0c10" stroke-width="2"/>
        <circle cx="200" cy="200" r="3" fill="#ffffff"/>
      </g>
    </svg>
    <div id="compassDisplay">
      <div class="deg" id="degDisplay">---</div>
      <div class="dir" id="dirDisplay">---</div>
      <div class="subdir" id="subDirDisplay">Menunggu data...</div>
    </div>
    <div id="manualBadge">✋ MANUAL</div>
  </div>

  <!-- GPS SECTION -->
  <div class="gps-section">
    <div class="title">📍 LOKASI REAL-TIME</div>
    <div class="coord" id="coordDisplay">
      <span><span class="label">LAT</span> <span id="latDisplay">--.------</span></span>
      <span><span class="label">LNG</span> <span id="lngDisplay">--.------</span></span>
      <span><span class="label">AKURASI</span> <span id="accDisplay">--</span></span>
    </div>
    <div class="addr" id="addrDisplay">
      <span style="color:#888">Mengambil alamat...</span>
    </div>
    <div class="update-time" id="gpsTime">⏱ --:--:--</div>
  </div>

  <!-- INFO GRID -->
  <div class="info-grid">
    <div class="info-cell"><div class="label">ARAH</div><div class="value white" id="infoAz">---°</div></div>
    <div class="info-cell"><div class="label">MAGNET</div><div class="value cyan" id="infoMag">---</div></div>
    <div class="info-cell"><div class="label">UPDATE</div><div class="value green" id="infoUpd">0/dtk</div></div>
    <div class="info-cell"><div class="label">SUMBER</div><div class="value" id="infoSensor" style="font-size:5px;color:#888">---</div></div>
  </div>

  <div id="graph"><canvas id="graphCanvas"></canvas></div>

  <div class="actions">
    <button id="btnCalibrate">⚡ KALIBRASI</button>
    <button id="btnLock">🔒 KUNCI</button>
    <button id="btnSmooth">🌀 HALUS</button>
    <button id="btnManual">✋ MANUAL</button>
  </div>
</div>
<div id="fps">0 FPS</div>

<div id="calOverlay">
  <div class="circle"></div>
  <div class="text">PUTAR HP ANGKA 8<br><span style="font-size:7px;color:#555">Ulangi hingga progress penuh</span></div>
  <div class="progress"><div class="bar" id="calBar"></div></div>
  <div class="done" id="calDone">✅ KALIBRASI SELESAI</div>
  <button class="closeBtn" id="calClose">SELESAI</button>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
'use strict';

// ============================================================
// DOM REFS
// ============================================================
const $ = id => document.getElementById(id);
const compassSvg = $('compassSvg');
const dialGroup = $('dialGroup');
const tickContainer = $('tickContainer');
const degDisplay = $('degDisplay');
const dirDisplay = $('dirDisplay');
const subDirDisplay = $('subDirDisplay');
const statusDot = $('statusDot');
const statusText = $('statusText');
const infoAz = $('infoAz');
const infoMag = $('infoMag');
const infoUpd = $('infoUpd');
const infoSensor = $('infoSensor');
const fpsEl = $('fps');
const graphCanvas = $('graphCanvas');
const ctx = graphCanvas.getContext('2d');
const diagToggle = $('diagToggle');
const diagPanel = $('diagPanel');
const btnCalibrate = $('btnCalibrate');
const btnLock = $('btnLock');
const btnSmooth = $('btnSmooth');
const btnManual = $('btnManual');
const manualBadge = $('manualBadge');
const compassWrap = $('compassWrap');
const toast = $('toast');
const calOverlay = $('calOverlay');
const calBar = $('calBar');
const calDone = $('calDone');
const calClose = $('calClose');
const latDisplay = $('latDisplay');
const lngDisplay = $('lngDisplay');
const accDisplay = $('accDisplay');
const addrDisplay = $('addrDisplay');
const gpsTime = $('gpsTime');

// ============================================================
// STATE
// ============================================================
let heading = 0;
let lockedHeading = 0;
let isLocked = false;
let isSmooth = false;
let isManual = false;
let isCalibrating = false;
let lastHeading = 0;
let updateCount = 0;
let lastUpdateTime = performance.now();
let hasData = false;
let activeStrategy = 'NONE';
let sensorSource = 'NONE';

// GPS
let currentLat = null;
let currentLng = null;
let currentAcc = null;
let currentAddress = 'Mengambil alamat...';
let gpsWatchId = null;
let addressFetching = false;
let lastAddressFetch = 0;

// Sensor raw
let rawMX = 0, rawMY = 0, rawMZ = 0;
let rawAX = 0, rawAY = 0, rawAZ = 0;

// Smoothing
let smoothHeading = 0;
let smoothInitialized = false;
const SMOOTH_ALPHA = 0.15;

// FPS
let fpsCount = 0;
let fpsTime = performance.now();

// History
const history = new Array(60).fill(0);
let historyIndex = 0;

// Diag
let diag = {
  doaFired: false, doFired: false, dmFired: false, magFired: false,
  doaData: false, doData: false,
  doaCount: 0, doCount: 0, dmCount: 0, magCount: 0,
  lastUpdate: Date.now()
};

// Calibration
let calTotal = 0;
let calLastHeading = 0;
let calInterval = null;

// ============================================================
// ARAH MATA ANGIN BAHASA INDONESIA (BENAR)
// ============================================================
const directions = [
  {min:348.75, max:360, short:'U', long:'UTARA', emoji:'⬆️', desc:'Utara'},
  {min:0, max:11.25, short:'U', long:'UTARA', emoji:'⬆️', desc:'Utara'},
  {min:11.25, max:33.75, short:'UTL', long:'UTARA TIMUR LAUT', emoji:'↗️', desc:'Utara - Timur Laut'},
  {min:33.75, max:56.25, short:'TL', long:'TIMUR LAUT', emoji:'↗️', desc:'Timur Laut'},
  {min:56.25, max:78.75, short:'TLT', long:'TIMUR LAUT TIMUR', emoji:'↗️', desc:'Timur Laut - Timur'},
  {min:78.75, max:101.25, short:'T', long:'TIMUR', emoji:'➡️', desc:'Timur'},
  {min:101.25, max:123.75, short:'TTG', long:'TIMUR TENGGARA', emoji:'↘️', desc:'Timur - Tenggara'},
  {min:123.75, max:146.25, short:'TG', long:'TENGGARA', emoji:'↘️', desc:'Tenggara'},
  {min:146.25, max:168.75, short:'TGS', long:'TENGGARA SELATAN', emoji:'↘️', desc:'Tenggara - Selatan'},
  {min:168.75, max:191.25, short:'S', long:'SELATAN', emoji:'⬇️', desc:'Selatan'},
  {min:191.25, max:213.75, short:'SBD', long:'SELATAN BARAT DAYA', emoji:'↙️', desc:'Selatan - Barat Daya'},
  {min:213.75, max:236.25, short:'BD', long:'BARAT DAYA', emoji:'↙️', desc:'Barat Daya'},
  {min:236.25, max:258.75, short:'BDB', long:'BARAT DAYA BARAT', emoji:'↙️', desc:'Barat Daya - Barat'},
  {min:258.75, max:281.25, short:'B', long:'BARAT', emoji:'⬅️', desc:'Barat'},
  {min:281.25, max:303.75, short:'BBL', long:'BARAT BARAT LAUT', emoji:'↖️', desc:'Barat - Barat Laut'},
  {min:303.75, max:326.25, short:'BL', long:'BARAT LAUT', emoji:'↖️', desc:'Barat Laut'},
  {min:326.25, max:348.75, short:'BLU', long:'BARAT LAUT UTARA', emoji:'↖️', desc:'Barat Laut - Utara'}
];

function getDirection(deg) {
  for (let d of directions) {
    if (deg >= d.min && deg < d.max) return d;
  }
  return directions[0];
}

function normalizeAngle(a) {
  a = a % 360;
  if (a < 0) a += 360;
  return a;
}

function angleDiff(a, b) {
  let d = a - b;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return d;
}

// ============================================================
// GENERATE TICKS
// ============================================================
function generateTicks() {
  for (let deg = 0; deg < 360; deg += 2) {
    const rad = (deg - 90) * Math.PI / 180;
    const is30 = deg % 30 === 0;
    const is10 = deg % 10 === 0;
    const is5 = deg % 5 === 0;
    
    let inner, stroke, width;
    if (is30) { inner = 152; stroke = 'rgba(255,23,68,0.6)'; width = '2'; }
    else if (is10) { inner = 162; stroke = 'rgba(255,255,255,0.15)'; width = '1.2'; }
    else if (is5) { inner = 170; stroke = 'rgba(255,255,255,0.06)'; width = '0.8'; }
    else { inner = 175; stroke = 'rgba(255,255,255,0.02)'; width = '0.5'; }
    
    const outer = 185;
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 200 + inner * Math.cos(rad));
    line.setAttribute('y1', 200 + inner * Math.sin(rad));
    line.setAttribute('x2', 200 + outer * Math.cos(rad));
    line.setAttribute('y2', 200 + outer * Math.sin(rad));
    line.setAttribute('stroke', stroke);
    line.setAttribute('stroke-width', width);
    tickContainer.appendChild(line);
    
    if (is30 && deg % 90 !== 0) {
      const labelR = 138;
      const lx = 200 + labelR * Math.cos(rad);
      const ly = 200 + labelR * Math.sin(rad);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lx);
      text.setAttribute('y', ly + 2);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', 'rgba(255,255,255,0.08)');
      text.setAttribute('font-size', '5');
      text.setAttribute('font-family', 'Courier New');
      text.textContent = deg + '°';
      tickContainer.appendChild(text);
    }
  }
}

// ============================================================
// COMPASS HEADING
// ============================================================
function computeHeading(mx, my, mz, ax, ay, az) {
  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  if (mag < 0.1) return null;
  
  const nax = ax / mag, nay = ay / mag, naz = az / mag;
  const pitchAngle = Math.asin(Math.max(-1, Math.min(1, -nax)));
  const rollAngle = Math.atan2(nay, naz);
  const cosP = Math.cos(pitchAngle), sinP = Math.sin(pitchAngle);
  const cosR = Math.cos(rollAngle), sinR = Math.sin(rollAngle);
  
  const Xh = mx * cosP + mz * sinP;
  const Yh = mx * sinR * sinP + my * cosR - mz * sinR * cosP;
  
  let h = Math.atan2(Yh, Xh) * 180 / Math.PI;
  if (h < 0) h += 360;
  return h;
}

// ============================================================
// SENSOR INIT
// ============================================================
function initSensors() {
  window.addEventListener('deviceorientationabsolute', function(e) {
    diag.doaFired = true;
    diag.doaCount++;
    diag.lastUpdate = Date.now();
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doaData = true;
      if (!isManual) {
        activeStrategy = 'ABS';
        sensorSource = 'ABSOLUT';
        heading = normalizeAngle(e.alpha);
        hasData = true;
        updateStatus();
      }
    }
  }, {passive: true});

  window.addEventListener('deviceorientation', function(e) {
    diag.doFired = true;
    diag.doCount++;
    diag.lastUpdate = Date.now();
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doData = true;
      if (!isManual && (activeStrategy === 'NONE' || !hasData)) {
        heading = normalizeAngle(e.alpha);
        if (e.absolute === true) {
          activeStrategy = 'ABS_FLAG';
          sensorSource = 'ABSOLUT';
        } else {
          activeStrategy = 'REL';
          sensorSource = 'RELATIF';
        }
        hasData = true;
        updateStatus();
      }
    }
  }, {passive: true});

  if ('Magnetometer' in window) {
    try {
      const mag = new Magnetometer({frequency: 60});
      mag.addEventListener('reading', function() {
        diag.magFired = true;
        diag.magCount++;
        diag.lastUpdate = Date.now();
        rawMX = mag.x; rawMY = mag.y; rawMZ = mag.z;
        if (!isManual && (activeStrategy === 'NONE' || !hasData)) {
          if (rawAX !== 0 || rawAY !== 0 || rawAZ !== 0) {
            const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
            if (h !== null) {
              activeStrategy = 'MAGNET';
              sensorSource = 'MAGNETOMETER';
              heading = h;
              hasData = true;
              updateStatus();
            }
          } else if (!hasData) {
            let h = Math.atan2(rawMY, rawMX) * 180 / Math.PI;
            if (h < 0) h += 360;
            activeStrategy = 'MAG_NO_TILT';
            sensorSource = 'MAGNETOMETER';
            heading = h;
            hasData = true;
            updateStatus();
          }
        }
      });
      mag.start();
    } catch(e) {}
  }

  window.addEventListener('devicemotion', function(e) {
    diag.dmFired = true;
    diag.dmCount++;
    diag.lastUpdate = Date.now();
    const accel = e.accelerationIncludingGravity;
    if (accel && accel.x !== null) {
      rawAX = accel.x; rawAY = accel.y; rawAZ = accel.z;
      if (!isManual && diag.magFired && (activeStrategy === 'MAGNET' || !hasData)) {
        const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
        if (h !== null) {
          activeStrategy = 'MAGNET';
          sensorSource = 'MAGNETOMETER';
          heading = h;
          hasData = true;
          updateStatus();
        }
      }
    }
  }, {passive: true});
}

// ============================================================
// GPS
// ============================================================
function initGPS() {
  if (!navigator.geolocation) {
    addrDisplay.innerHTML = '❌ GPS tidak tersedia di browser ini';
    return;
  }

  const options = {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  };

  gpsWatchId = navigator.geolocation.watchPosition(
    function(position) {
      const lat = position.coords.latitude;
      const lng = position.coords.longitude;
      const acc = position.coords.accuracy;
      
      currentLat = lat;
      currentLng = lng;
      currentAcc = acc;
      
      latDisplay.textContent = lat.toFixed(6);
      lngDisplay.textContent = lng.toFixed(6);
      accDisplay.textContent = acc < 10 ? '🎯 ' + acc.toFixed(0) + 'm' : acc.toFixed(0) + 'm';
      
      const now = new Date();
      gpsTime.textContent = '⏱ ' + 
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0') + ':' +
        String(now.getSeconds()).padStart(2,'0');
      
      const shouldFetch = !lastAddressFetch || 
                         (Date.now() - lastAddressFetch > 5000) ||
                         (currentLat && currentLng && 
                          Math.abs(currentLat - (window._lastFetchLat || 0)) > 0.0001 ||
                          Math.abs(currentLng - (window._lastFetchLng || 0)) > 0.0001);
      
      if (shouldFetch && !addressFetching) {
        fetchAddress(lat, lng);
        window._lastFetchLat = lat;
        window._lastFetchLng = lng;
      }
      
      statusText.textContent = 'GPS + KOMPAS';
      statusDot.className = 'dot green';
    },
    function(error) {
      console.warn('GPS error:', error);
      addrDisplay.innerHTML = '⚠️ GPS error: ' + error.message;
      statusText.textContent = 'KOMPAS ONLY';
    },
    options
  );
}

// ============================================================
// REVERSE GEOCODING
// ============================================================
async function fetchAddress(lat, lng) {
  if (addressFetching) return;
  addressFetching = true;
  
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
    const response = await fetch(url);
    const data = await response.json();
    
    if (data && data.address) {
      const addr = data.address;
      
      let parts = [];
      
      if (addr.road) parts.push('<span class="highlight">Jalan ' + addr.road + '</span>');
      else if (addr.pedestrian) parts.push('<span class="highlight">' + addr.pedestrian + '</span>');
      
      let rtRwInfo = '';
      if (addr.house_number) {
        rtRwInfo = '<span class="rt">No. ' + addr.house_number + '</span>';
      }
      if (addr.building) {
        if (rtRwInfo) rtRwInfo += ' - <span class="highlight">' + addr.building + '</span>';
        else rtRwInfo = '<span class="highlight">' + addr.building + '</span>';
      }
      
      if (addr.village) parts.push('<span style="color:#fff176;font-weight:700">' + addr.village + '</span>');
      else if (addr.suburb) parts.push('<span style="color:#fff176;font-weight:700">' + addr.suburb + '</span>');
      
      if (addr.county) parts.push('<span style="color:#ffab00;font-weight:700">Kec. ' + addr.county + '</span>');
      else if (addr.municipality) parts.push('<span style="color:#ffab00;font-weight:700">Kec. ' + addr.municipality + '</span>');
      
      if (addr.city) parts.push('<span style="color:#ffffff;font-weight:700">' + addr.city + '</span>');
      else if (addr.town) parts.push('<span style="color:#ffffff;font-weight:700">' + addr.town + '</span>');
      else if (addr.state_district) parts.push('<span style="color:#ffffff;font-weight:700">' + addr.state_district + '</span>');
      
      if (addr.state) parts.push('<span style="color:#e0e0e0;font-weight:700">Prov. ' + addr.state + '</span>');
      
      if (addr.postcode) parts.push('<span style="color:#00e5ff;font-weight:700">' + addr.postcode + '</span>');
      
      if (addr.country) parts.push('<span style="color:#ffffff;font-weight:700">' + addr.country + '</span>');
      
      let fullAddress = parts.join(' • ');
      
      if (rtRwInfo) {
        fullAddress = rtRwInfo + ' • ' + fullAddress;
      }
      
      fullAddress = fullAddress.replace(/(RT\s*\d+\s*RW\s*\d+)/gi, '<span class="rt">$1</span>');
      fullAddress = fullAddress.replace(/(RT\s*\d+)/gi, '<span class="rt">$1</span>');
      fullAddress = fullAddress.replace(/(RW\s*\d+)/gi, '<span class="rt">$1</span>');
      
      addrDisplay.innerHTML = fullAddress;
      currentAddress = fullAddress;
      lastAddressFetch = Date.now();
    } else {
      addrDisplay.innerHTML = '📍 <span style="color:#ffffff;font-weight:700">' + lat.toFixed(6) + '</span>, <span style="color:#ffffff;font-weight:700">' + lng.toFixed(6) + '</span> <span style="color:#888">(alamat tidak ditemukan)</span>';
    }
  } catch (error) {
    console.warn('Reverse geocoding error:', error);
    addrDisplay.innerHTML = '📍 <span style="color:#ffffff;font-weight:700">' + lat.toFixed(6) + '</span>, <span style="color:#ffffff;font-weight:700">' + lng.toFixed(6) + '</span> <span style="color:#888">(error fetching address)</span>';
  }
  
  addressFetching = false;
}

// ============================================================
// MANUAL TOUCH
// ============================================================
let touchActive = false;
let touchStartAngle = 0;
let touchStartHeading = 0;

function initManualMode() {
  compassWrap.addEventListener('touchstart', function(e) {
    if (!isManual) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    touchActive = true;
  }, {passive: false});
  
  compassWrap.addEventListener('touchmove', function(e) {
    if (!isManual || !touchActive) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'SENTUHAN';
    updateStatus();
  }, {passive: false});
  
  compassWrap.addEventListener('touchend', function() { touchActive = false; }, {passive: true});
  
  compassWrap.addEventListener('mousedown', function(e) {
    if (!isManual) return;
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    touchActive = true;
    e.preventDefault();
  });
  
  document.addEventListener('mousemove', function(e) {
    if (!isManual || !touchActive) return;
    const rect = compassWrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'SENTUHAN';
    updateStatus();
  });
  
  document.addEventListener('mouseup', function() { touchActive = false; });
}

// ============================================================
// UPDATE STATUS
// ============================================================
function updateStatus() {
  if (isManual) {
    statusDot.className = 'dot cyan';
    statusText.textContent = 'MANUAL';
    manualBadge.classList.add('show');
  } else if (hasData && currentLat) {
    statusDot.className = 'dot green';
    statusText.textContent = 'GPS + KOMPAS';
    manualBadge.classList.remove('show');
  } else if (hasData) {
    statusDot.className = 'dot green';
    statusText.textContent = 'KOMPAS';
    manualBadge.classList.remove('show');
  } else {
    statusDot.className = 'dot red';
    statusText.textContent = 'MENUNGGU';
    manualBadge.classList.remove('show');
  }
}

// ============================================================
// UPDATE DISPLAY - PERBAIKAN: Rotasi dial dengan offset 45°
// ============================================================
function updateDisplay() {
  let displayHeading = heading;
  
  if (isSmooth && !isManual) {
    if (!smoothInitialized) {
      smoothHeading = heading;
      smoothInitialized = true;
    } else {
      const diff = angleDiff(heading, smoothHeading);
      smoothHeading = normalizeAngle(smoothHeading + diff * SMOOTH_ALPHA);
    }
    displayHeading = smoothHeading;
  } else {
    smoothHeading = heading;
    smoothInitialized = true;
  }
  
  if (isLocked) {
    displayHeading = lockedHeading;
  }
  
  const displayDeg = Math.round(displayHeading);
  const dir = getDirection(displayHeading);
  
  // Kompas display
  degDisplay.textContent = String(displayDeg).padStart(3, '0');
  
  if (isLocked) {
    dirDisplay.textContent = '🔒 TERKUNCI';
    subDirDisplay.textContent = 'Terkunci ' + lockedHeading + '°';
  } else {
    dirDisplay.textContent = dir.emoji + ' ' + dir.long;
    subDirDisplay.textContent = dir.desc + ' (' + dir.short + ')';
  }
  
  // PERBAIKAN UTAMA: 
  // - Dial sudah memiliki rotasi awal 45° di HTML
  // - Kita tambahkan rotasi -heading agar jarum menunjuk ke arah yang benar
  // - Rumus: rotasi = 45° (offset awal) - heading (rotasi dinamis)
  const rotation = 45 - displayHeading;
  dialGroup.setAttribute('transform', `rotate(${rotation}, 200, 200)`);
  
  // Info
  infoAz.textContent = displayDeg + '° (' + dir.short + ')';
  
  const magStrength = Math.sqrt(rawMX*rawMX + rawMY*rawMY + rawMZ*rawMZ);
  infoMag.textContent = magStrength > 0 ? magStrength.toFixed(1) + ' µT' : '---';
  
  const delta = Math.abs(angleDiff(displayHeading, lastHeading));
  infoAz.style.color = delta > 15 ? '#ff1744' : delta > 5 ? '#ffab00' : '#ffffff';
  lastHeading = displayHeading;
  
  infoSensor.textContent = sensorSource + (currentLat ? ' 📡' : '');
  
  updateCount++;
  const nowPerf = performance.now();
  if (nowPerf - lastUpdateTime >= 1000) {
    infoUpd.textContent = updateCount + '/dtk';
    updateCount = 0;
    lastUpdateTime = nowPerf;
  }
  
  history[historyIndex] = displayHeading;
  historyIndex = (historyIndex + 1) % history.length;
}

// ============================================================
// GRAPH
// ============================================================
function drawGraph() {
  const rect = graphCanvas.parentElement.getBoundingClientRect();
  graphCanvas.width = rect.width * 2;
  graphCanvas.height = rect.height * 2;
  ctx.scale(2, 2);
  
  const w = graphCanvas.width / 2;
  const h = graphCanvas.height / 2;
  
  ctx.clearRect(0, 0, w, h);
  
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2, 4]);
  ctx.beginPath();
  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);
  ctx.stroke();
  ctx.setLineDash([]);
  
  ctx.strokeStyle = 'rgba(255,23,68,0.6)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(255,23,68,0.2)';
  ctx.shadowBlur = 3;
  ctx.beginPath();
  
  const len = history.length;
  for (let i = 0; i < len; i++) {
    const idx = (historyIndex + i) % len;
    const val = history[idx];
    const x = (i / len) * w;
    const y = h/2 - (val - 180) / 180 * (h/2 - 2);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  const lastVal = history[(historyIndex - 1 + len) % len];
  const lastX = w - 2;
  const lastY = h/2 - (lastVal - 180) / 180 * (h/2 - 2);
  ctx.fillStyle = '#ff1744';
  ctx.shadowColor = '#ff1744';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

// ============================================================
// RENDER LOOP
// ============================================================
function render() {
  if (hasData || isManual) {
    updateDisplay();
    drawGraph();
  }
  
  fpsCount++;
  const now = performance.now();
  if (now - fpsTime >= 500) {
    fpsEl.textContent = Math.round(fpsCount / ((now - fpsTime) / 1000)) + ' FPS';
    fpsCount = 0;
    fpsTime = now;
  }
  
  requestAnimationFrame(render);
}

// ============================================================
// DIAGNOSTICS
// ============================================================
function updateDiag() {
  let html = '';
  html += `<div style="display:flex;gap:6px;flex-wrap:wrap">`;
  html += `<span>Secure: <span class="${window.isSecureContext ? 'ok' : 'err'}">${window.isSecureContext ? '✅' : '❌'}</span></span>`;
  html += `<span>HTTPS: <span class="${location.protocol === 'https:' ? 'ok' : 'err'}">${location.protocol === 'https:' ? '✅' : '❌'}</span></span>`;
  html += `<span>GPS: <span class="${currentLat ? 'ok' : 'warn'}">${currentLat ? '✅' : '⏳'}</span></span>`;
  html += `</div><br>`;
  html += `<div>DOA: ${diag.doaFired ? (diag.doaData ? '✅' : '⚠️') : '❌'} (${diag.doaCount}x)</div>`;
  html += `<div>DO: ${diag.doFired ? (diag.doData ? '✅' : '⚠️') : '❌'} (${diag.doCount}x)</div>`;
  html += `<div>Motion: ${diag.dmFired ? '✅' : '❌'} (${diag.dmCount}x)</div>`;
  html += `<div>Magnet: ${diag.magFired ? '✅' : '❌'} (${diag.magCount}x)</div>`;
  html += `<div>Strategy: <span class="ok">${activeStrategy}</span> | Source: <span class="ok">${sensorSource}</span></div>`;
  html += `<div>GPS: ${currentLat ? currentLat.toFixed(6) + ', ' + currentLng.toFixed(6) : '⏳ menunggu...'}</div>`;
  diagPanel.innerHTML = html;
}

// ============================================================
// TOAST
// ============================================================
let toastTimeout = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============================================================
// CALIBRATION
// ============================================================
function startCalibration() {
  if (isManual) { showToast('❌ Kalibrasi tidak di mode manual'); return; }
  if (isCalibrating) { stopCalibration(); return; }
  
  isCalibrating = true;
  calTotal = 0;
  calLastHeading = heading;
  calBar.style.width = '0%';
  calDone.style.display = 'none';
  calClose.style.display = 'none';
  calOverlay.classList.add('show');
  btnCalibrate.classList.add('calibrating');
  btnCalibrate.textContent = '⏳ KALIBRASI';
  showToast('🔄 Putar HP angka 8');
  
  calInterval = setInterval(() => {
    const change = Math.abs(angleDiff(heading, calLastHeading));
    calTotal += change;
    calLastHeading = heading;
    const progress = Math.min(100, (calTotal / 2000) * 100);
    calBar.style.width = progress + '%';
    if (progress >= 100) {
      stopCalibration();
      calDone.style.display = 'block';
      calClose.style.display = 'block';
      showToast('✅ Kalibrasi selesai!');
    }
  }, 100);
}

function stopCalibration() {
  isCalibrating = false;
  clearInterval(calInterval);
  calInterval = null;
  btnCalibrate.classList.remove('calibrating');
  btnCalibrate.textContent = '⚡ KALIBRASI';
}

// ============================================================
// BUTTON HANDLERS
// ============================================================
btnCalibrate.addEventListener('click', startCalibration);
calClose.addEventListener('click', function() {
  calOverlay.classList.remove('show');
  stopCalibration();
});

btnLock.addEventListener('click', function() {
  isLocked = !isLocked;
  if (isLocked) {
    lockedHeading = Math.round(heading);
    btnLock.classList.add('active');
    btnLock.textContent = '🔓 LEPAS';
    showToast('🔒 Terkunci ' + lockedHeading + '°');
  } else {
    btnLock.classList.remove('active');
    btnLock.textContent = '🔒 KUNCI';
    showToast('🔓 Bebas');
  }
});

btnSmooth.addEventListener('click', function() {
  isSmooth = !isSmooth;
  smoothInitialized = false;
  if (isSmooth) {
    btnSmooth.classList.add('active');
    btnSmooth.textContent = '🌀 RAW';
    showToast('🌀 Filter halus AKTIF');
  } else {
    btnSmooth.classList.remove('active');
    btnSmooth.textContent = '🌀 HALUS';
    showToast('🌀 Filter halus NONAKTIF');
  }
});

btnManual.addEventListener('click', function() {
  isManual = !isManual;
  if (isManual) {
    btnManual.classList.add('active');
    btnManual.textContent = '✋ AUTO';
    manualBadge.classList.add('show');
    hasData = true;
    activeStrategy = 'MANUAL';
    sensorSource = 'SENTUHAN';
    showToast('✋ Mode manual - geser kompas!');
  } else {
    btnManual.classList.remove('active');
    btnManual.textContent = '✋ MANUAL';
    manualBadge.classList.remove('show');
    if (!hasData) { activeStrategy = 'NONE'; sensorSource = 'NONE'; }
    showToast('🤖 Kembali ke sensor');
  }
  updateStatus();
});

diagToggle.addEventListener('click', function() {
  diagPanel.classList.toggle('open');
  if (diagPanel.classList.contains('open')) updateDiag();
});

// ============================================================
// AUTO-START
// ============================================================
async function startApp() {
  if (typeof DeviceOrientationEvent !== 'undefined' && 
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try { await DeviceOrientationEvent.requestPermission(); } catch(e) {}
  }
  
  generateTicks();
  initSensors();
  initManualMode();
  initGPS();
  
  setTimeout(() => {
    updateStatus();
    updateDiag();
    if (!hasData && !isManual) {
      showToast('💡 Tidak ada sensor? Aktifkan MANUAL');
    }
  }, 500);
  
  render();
  setInterval(updateDiag, 5000);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startApp);
} else {
  startApp();
}

window.addEventListener('resize', drawGraph);

})();
