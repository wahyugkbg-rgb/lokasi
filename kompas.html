<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KOMPAS OPPO A9 - FORCE REAL TIME</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0c10;--fg:#e8e6e1;--red:#ff1744;--green:#00e676;--cyan:#00e5ff;--gold:#ffab00;--glow:rgba(255,23,68,0.6)}
body{background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none}
#app{height:100vh;display:flex;flex-direction:column;padding:8px;position:relative}
.header{text-align:center;padding:4px 0}
.header h1{font-size:13px;font-weight:900;letter-spacing:6px;color:var(--red);text-shadow:0 0 30px var(--glow)}
.header .sub{font-size:8px;color:#555;letter-spacing:2px;margin-top:2px}
#statusBar{display:flex;justify-content:space-between;padding:6px 10px;background:rgba(20,22,28,0.95);border:1px solid rgba(255,23,68,0.2);border-radius:6px;margin:4px 0;font-size:8px}
#statusBar .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot.red{background:var(--red);box-shadow:0 0 12px var(--red)}
.dot.green{background:var(--green);box-shadow:0 0 12px var(--green)}
.dot.gold{background:var(--gold);box-shadow:0 0 12px var(--gold)}
.dot.cyan{background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
.compass-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;min-height:0}
.compass-wrap svg{width:min(85vw,380px);height:min(85vw,380px);filter:drop-shadow(0 0 40px rgba(255,23,68,0.15))}
#compassDisplay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;z-index:10}
#compassDisplay .deg{font-size:clamp(44px,15vw,72px);font-weight:900;font-variant-numeric:tabular-nums;text-shadow:0 0 40px rgba(255,255,255,0.08)}
#compassDisplay .dir{font-size:clamp(22px,7vw,34px);font-weight:900;color:var(--gold);letter-spacing:4px;text-shadow:0 0 30px rgba(255,171,0,0.25)}
.info-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin:6px 0}
.info-cell{background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.05);border-radius:4px;padding:6px 2px;text-align:center}
.info-cell .label{font-size:6px;color:#555;letter-spacing:1px;text-transform:uppercase}
.info-cell .value{font-size:11px;font-weight:700;margin-top:2px}
.value.red{color:var(--red)}.value.cyan{color:var(--cyan)}.value.green{color:var(--green)}.value.gold{color:var(--gold)}
.actions{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;padding:4px 0}
.actions button{background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:6px;color:var(--fg);font-family:inherit;font-size:8px;font-weight:700;padding:10px 2px;cursor:pointer;transition:all .1s;text-transform:uppercase;letter-spacing:1px}
.actions button:active{transform:scale(.95);background:var(--red);color:#000;border-color:var(--red)}
.actions button.active{background:var(--red);color:#000;border-color:var(--red);box-shadow:0 0 25px var(--glow)}
.actions button.calibrating{animation:pulse .5s ease-in-out infinite alternate;border-color:var(--gold)}
@keyframes pulse{from{box-shadow:0 0 10px var(--gold)}to{box-shadow:0 0 30px var(--gold)}}
#manualBadge{position:absolute;top:10px;right:10px;background:rgba(0,229,255,0.15);border:1px solid var(--cyan);color:var(--cyan);font-size:7px;font-weight:700;padding:4px 10px;border-radius:4px;display:none;letter-spacing:2px;animation:blink 1.2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
#manualBadge.show{display:block}
.diag-toggle{background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.05);border-radius:4px;color:#555;font-size:7px;padding:4px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;margin:2px 0;font-family:inherit}
.diag-panel{max-height:0;overflow:hidden;transition:max-height .3s ease;background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.05);border-radius:4px;font-size:7px}
.diag-panel.open{max-height:400px;overflow-y:auto;padding:8px}
.diag-panel .ok{color:var(--green)}.diag-panel .err{color:var(--red)}.diag-panel .warn{color:var(--gold)}
#fps{position:fixed;top:4px;right:6px;font-size:7px;color:#333;z-index:50;font-variant-numeric:tabular-nums}
#graph{width:100%;height:30px;background:rgba(20,22,28,0.95);border:1px solid rgba(255,255,255,0.05);border-radius:4px;margin:4px 0;overflow:hidden}
#graph canvas{width:100%;height:100%}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>⚡ KOMPAS FORCE</h1>
    <div class="sub" id="strategyLabel">STRATEGY: INIT</div>
  </div>

  <div id="statusBar">
    <div><span class="dot" id="statusDot"></span><span id="statusText">MENUNGGU</span></div>
    <div id="modeLabel">MODE: BEBAS</div>
    <div id="smoothLabel">SMOOTH: OFF</div>
  </div>

  <button class="diag-toggle" id="diagToggle">📊 DIAGNOSTIK SENSOR</button>
  <div class="diag-panel" id="diagPanel"></div>

  <div class="compass-wrap">
    <svg viewBox="0 0 400 400" id="compassSvg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle cx="200" cy="200" r="195" fill="none" stroke="rgba(255,23,68,0.08)" stroke-width="1"/>
      <circle cx="200" cy="200" r="185" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
      <circle cx="200" cy="200" r="160" fill="none" stroke="rgba(255,23,68,0.04)" stroke-width="0.5"/>
      
      <g id="dialGroup">
        <!-- Ticks akan di-generate oleh JS -->
        <g id="tickContainer"></g>
        <text x="200" y="32" text-anchor="middle" fill="var(--red)" font-size="24" font-weight="900" font-family="Courier New">U</text>
        <text x="370" y="206" text-anchor="middle" fill="var(--fg)" font-size="16" font-weight="700" font-family="Courier New">T</text>
        <text x="200" y="380" text-anchor="middle" fill="var(--fg)" font-size="16" font-weight="700" font-family="Courier New">S</text>
        <text x="30" y="206" text-anchor="middle" fill="var(--fg)" font-size="16" font-weight="700" font-family="Courier New">B</text>
        <text x="325" y="68" text-anchor="middle" fill="rgba(255,171,0,0.4)" font-size="10" font-weight="700">TL</text>
        <text x="325" y="345" text-anchor="middle" fill="rgba(255,171,0,0.4)" font-size="10" font-weight="700">TG</text>
        <text x="75" y="345" text-anchor="middle" fill="rgba(255,171,0,0.4)" font-size="10" font-weight="700">BD</text>
        <text x="75" y="68" text-anchor="middle" fill="rgba(255,171,0,0.4)" font-size="10" font-weight="700">BL</text>
      </g>
      
      <g id="needleGroup" filter="url(#glow)">
        <polygon points="200,50 193,195 200,185 207,195" fill="url(#needleGrad)" opacity="0.95"/>
        <polygon points="200,350 193,205 200,215 207,205" fill="#37474f" opacity="0.6"/>
        <circle cx="200" cy="200" r="10" fill="var(--red)" stroke="#0a0c10" stroke-width="3"/>
        <circle cx="200" cy="200" r="4" fill="#fff"/>
      </g>
      
      <defs>
        <linearGradient id="needleGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--red)"/>
          <stop offset="50%" stop-color="#ff5252"/>
          <stop offset="51%" stop-color="#455a64"/>
          <stop offset="100%" stop-color="#263238"/>
        </linearGradient>
      </defs>
    </svg>

    <div id="compassDisplay">
      <div class="deg" id="degDisplay">---</div>
      <div class="dir" id="dirDisplay">---</div>
    </div>
    <div id="manualBadge">✋ MODE MANUAL</div>
  </div>

  <div class="info-grid">
    <div class="info-cell"><div class="label">AZIMUTH</div><div class="value red" id="infoAz">---</div></div>
    <div class="info-cell"><div class="label">MAGNET</div><div class="value cyan" id="infoMag">---</div></div>
    <div class="info-cell"><div class="label">UPD/S</div><div class="value green" id="infoUpd">0</div></div>
    <div class="info-cell"><div class="label">DELTA</div><div class="value gold" id="infoDelta">---</div></div>
  </div>

  <div id="graph"><canvas id="graphCanvas"></canvas></div>

  <div class="actions">
    <button id="btnCalibrate">⚡ KALIBRASI</button>
    <button id="btnLock">🔒 KUNCI</button>
    <button id="btnSmooth">🌀 SMOOTH</button>
    <button id="btnManual">✋ MANUAL</button>
  </div>
</div>
<div id="fps">-- FPS</div>

<script>
(function(){
'use strict';

// ============================================================
// DOM REFS
// ============================================================
const $ = id => document.getElementById(id);
const compassSvg = $('compassSvg');
const dialGroup = $('dialGroup');
const needleGroup = $('needleGroup');
const tickContainer = $('tickContainer');
const degDisplay = $('degDisplay');
const dirDisplay = $('dirDisplay');
const statusDot = $('statusDot');
const statusText = $('statusText');
const modeLabel = $('modeLabel');
const smoothLabel = $('smoothLabel');
const strategyLabel = $('strategyLabel');
const infoAz = $('infoAz');
const infoMag = $('infoMag');
const infoUpd = $('infoUpd');
const infoDelta = $('infoDelta');
const fpsEl = $('fps');
const graphCanvas = $('graphCanvas');
const ctx = graphCanvas.getContext('2d');
const diagToggle = $('diagToggle');
const diagPanel = $('diagPanel');
const btnCalibrate = $('btnCalibrate');
const btnLock = $('btnLock');
const btnSmooth = $('btnSmooth');
const btnManual = $('btnManual');
const manualBadge = $('manualBadge');

// ============================================================
// STATE
// ============================================================
let heading = 0;
let lockedHeading = 0;
let isLocked = false;
let isSmooth = false;
let isManual = false;
let isCalibrating = false;
let calibrateProgress = 0;
let lastHeading = 0;
let updateCount = 0;
let lastUpdateTime = performance.now();

// Sensor data
let rawMX = 0, rawMY = 0, rawMZ = 0;
let rawAX = 0, rawAY = 0, rawAZ = 0;
let pitch = 0, roll = 0;
let hasData = false;
let activeStrategy = 'NONE';

// Smoothing
let smoothHeading = 0;
let smoothInitialized = false;

// FPS
let fpsCount = 0;
let fpsTime = performance.now();
let currentFps = 0;

// History for graph
const history = new Array(100).fill(0);
let historyIndex = 0;

// Diag data
let diag = {
  doaFired: false,
  doFired: false,
  dmFired: false,
  magFired: false,
  doaData: false,
  doData: false,
  doaCount: 0,
  doCount: 0,
  dmCount: 0,
  magCount: 0,
  doaLast: null,
  doLast: null,
  magLast: null
};

// ============================================================
// DIRECTION LOOKUP
// ============================================================
const directions = [
  {min:337.5, max:360, short:'U', long:'UTARA'},
  {min:0, max:22.5, short:'U', long:'UTARA'},
  {min:22.5, max:67.5, short:'TL', long:'TIMUR LAUT'},
  {min:67.5, max:112.5, short:'T', long:'TIMUR'},
  {min:112.5, max:157.5, short:'TG', long:'TENGGARA'},
  {min:157.5, max:202.5, short:'S', long:'SELATAN'},
  {min:202.5, max:247.5, short:'BD', long:'BARAT DAYA'},
  {min:247.5, max:292.5, short:'B', long:'BARAT'},
  {min:292.5, max:337.5, short:'BL', long:'BARAT LAUT'}
];

function getDirection(deg) {
  for (let d of directions) {
    if (deg >= d.min && deg < d.max) return d;
  }
  return directions[0];
}

function normalizeAngle(a) {
  a = a % 360;
  if (a < 0) a += 360;
  return a;
}

function angleDiff(a, b) {
  let d = a - b;
  while (d > 180) d -= 360;
  while (d < -180) d += 360;
  return d;
}

// ============================================================
// GENERATE COMPASS TICKS
// ============================================================
function generateTicks() {
  for (let deg = 0; deg < 360; deg += 5) {
    const rad = (deg - 90) * Math.PI / 180;
    const is30 = deg % 30 === 0;
    const is10 = deg % 10 === 0;
    const inner = is30 ? 155 : (is10 ? 162 : 170);
    const outer = 185;
    
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', 200 + inner * Math.cos(rad));
    line.setAttribute('y1', 200 + inner * Math.sin(rad));
    line.setAttribute('x2', 200 + outer * Math.cos(rad));
    line.setAttribute('y2', 200 + outer * Math.sin(rad));
    
    if (is30) {
      line.setAttribute('stroke', 'rgba(255,23,68,0.6)');
      line.setAttribute('stroke-width', '2');
    } else if (is10) {
      line.setAttribute('stroke', 'rgba(255,255,255,0.15)');
      line.setAttribute('stroke-width', '1');
    } else {
      line.setAttribute('stroke', 'rgba(255,255,255,0.05)');
      line.setAttribute('stroke-width', '0.5');
    }
    tickContainer.appendChild(line);
    
    // Degree labels
    if (is30 && deg % 90 !== 0) {
      const labelR = 140;
      const lx = 200 + labelR * Math.cos(rad);
      const ly = 200 + labelR * Math.sin(rad);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', lx);
      text.setAttribute('y', ly + 3);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('fill', 'rgba(255,255,255,0.15)');
      text.setAttribute('font-size', '8');
      text.setAttribute('font-family', 'Courier New');
      text.textContent = deg + '°';
      tickContainer.appendChild(text);
    }
  }
}

// ============================================================
// COMPASS HEADING COMPUTATION
// ============================================================
function computeHeading(mx, my, mz, ax, ay, az) {
  const mag = Math.sqrt(ax*ax + ay*ay + az*az);
  if (mag < 0.1) return null;
  
  const nax = ax / mag, nay = ay / mag, naz = az / mag;
  const pitch = Math.asin(Math.max(-1, Math.min(1, -nax)));
  const roll = Math.atan2(nay, naz);
  const cosP = Math.cos(pitch), sinP = Math.sin(pitch);
  const cosR = Math.cos(roll), sinR = Math.sin(roll);
  
  const Xh = mx * cosP + mz * sinP;
  const Yh = mx * sinR * sinP + my * cosR - mz * sinR * cosP;
  
  let h = Math.atan2(-Yh, Xh) * 180 / Math.PI;
  if (h < 0) h += 360;
  return h;
}

// ============================================================
// SENSOR STRATEGIES - AGGRESSIVE MULTI-LAYER
// ============================================================
function initSensors() {
  // STRATEGY 1: deviceorientationabsolute (priority)
  window.addEventListener('deviceorientationabsolute', function(e) {
    diag.doaFired = true;
    diag.doaCount++;
    diag.doaLast = {alpha: e.alpha, beta: e.beta, gamma: e.gamma};
    
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doaData = true;
      if (activeStrategy === 'NONE' || activeStrategy === 'ORIENTATION') {
        activeStrategy = 'DOA_ABSOLUTE';
        heading = normalizeAngle(e.alpha);
        pitch = e.beta || 0;
        roll = e.gamma || 0;
        hasData = true;
        updateStatus();
      }
    }
  }, {passive: true});

  // STRATEGY 2: deviceorientation with absolute flag
  window.addEventListener('deviceorientation', function(e) {
    diag.doFired = true;
    diag.doCount++;
    diag.doLast = {alpha: e.alpha, beta: e.beta, gamma: e.gamma};
    
    if (e.alpha !== null && e.alpha !== undefined && !isNaN(e.alpha)) {
      diag.doData = true;
      
      // If absolute and we don't have better data
      if (e.absolute === true && (activeStrategy === 'NONE' || activeStrategy === 'ORIENTATION')) {
        activeStrategy = 'DO_ABSOLUTE';
        heading = normalizeAngle(e.alpha);
        pitch = e.beta || 0;
        roll = e.gamma || 0;
        hasData = true;
        updateStatus();
      } 
      // Fallback to relative if nothing else works
      else if (!hasData || activeStrategy === 'ORIENTATION') {
        activeStrategy = 'DO_RELATIVE';
        heading = normalizeAngle(e.alpha);
        pitch = e.beta || 0;
        roll = e.gamma || 0;
        hasData = true;
        updateStatus();
      }
    }
  }, {passive: true});

  // STRATEGY 3: Generic Magnetometer API
  if ('Magnetometer' in window) {
    try {
      const mag = new Magnetometer({frequency: 60});
      mag.addEventListener('reading', function() {
        diag.magFired = true;
        diag.magCount++;
        diag.magLast = {x: mag.x, y: mag.y, z: mag.z};
        rawMX = mag.x;
        rawMY = mag.y;
        rawMZ = mag.z;
        
        // If we have accelerometer data, compute tilt-compensated heading
        if ((rawAX !== 0 || rawAY !== 0 || rawAZ !== 0) && 
            (activeStrategy === 'NONE' || activeStrategy === 'MAGNETOMETER' || !hasData)) {
          const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
          if (h !== null) {
            activeStrategy = 'MAGNETOMETER';
            heading = h;
            hasData = true;
            updateStatus();
          }
        }
      });
      mag.addEventListener('error', function(e) {
        console.warn('Magnetometer error:', e.error?.name);
      });
      mag.start();
    } catch(e) {
      console.warn('Magnetometer init failed:', e);
    }
  }

  // STRATEGY 4: DeviceMotion for accelerometer
  window.addEventListener('devicemotion', function(e) {
    diag.dmFired = true;
    diag.dmCount++;
    
    const accel = e.accelerationIncludingGravity;
    if (accel && accel.x !== null && accel.x !== undefined) {
      rawAX = accel.x;
      rawAY = accel.y;
      rawAZ = accel.z;
      
      // Recompute with magnetometer if available
      if (diag.magFired && (activeStrategy === 'MAGNETOMETER' || !hasData)) {
        const h = computeHeading(rawMX, rawMY, rawMZ, rawAX, rawAY, rawAZ);
        if (h !== null) {
          activeStrategy = 'MAGNETOMETER';
          heading = h;
          hasData = true;
          updateStatus();
        }
      }
    }
  }, {passive: true});
}

// ============================================================
// MANUAL MODE (TOUCH DRIVEN)
// ============================================================
let touchActive = false;
let touchStartAngle = 0;
let touchStartHeading = 0;

function initManualMode() {
  const wrap = document.querySelector('.compass-wrap');
  
  wrap.addEventListener('touchstart', function(e) {
    if (!isManual) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    touchActive = true;
  }, {passive: false});
  
  wrap.addEventListener('touchmove', function(e) {
    if (!isManual || !touchActive) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(touch.clientY - cy, touch.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    updateStatus();
  }, {passive: false});
  
  wrap.addEventListener('touchend', function() {
    touchActive = false;
  }, {passive: true});
  
  // Mouse support (desktop fallback)
  wrap.addEventListener('mousedown', function(e) {
    if (!isManual) return;
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    touchStartAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    touchStartHeading = heading;
    touchActive = true;
  });
  
  document.addEventListener('mousemove', function(e) {
    if (!isManual || !touchActive) return;
    const rect = wrap.getBoundingClientRect();
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
    const diff = angle - touchStartAngle;
    heading = normalizeAngle(touchStartHeading + diff);
    hasData = true;
    activeStrategy = 'MANUAL';
    updateStatus();
  });
  
  document.addEventListener('mouseup', function() {
    touchActive = false;
  });
}

// ============================================================
// UPDATE UI
// ============================================================
function updateStatus() {
  if (isManual) {
    statusDot.className = 'dot cyan';
    statusText.textContent = 'MANUAL';
    manualBadge.classList.add('show');
  } else if (hasData) {
    statusDot.className = 'dot green';
    statusText.textContent = 'AKTIF';
    manualBadge.classList.remove('show');
  } else {
    statusDot.className = 'dot red';
    statusText.textContent = 'TIDAK ADA DATA';
    manualBadge.classList.remove('show');
  }
  
  strategyLabel.textContent = `STRATEGY: ${activeStrategy}`;
  modeLabel.textContent = isLocked ? '🔒 TERKUNCI' : 'MODE: BEBAS';
  smoothLabel.textContent = isSmooth ? 'SMOOTH: ON' : 'SMOOTH: OFF';
}

function updateDisplay() {
  let displayHeading = heading;
  
  // Apply smoothing
  if (isSmooth && !isManual) {
    if (!smoothInitialized) {
      smoothHeading = heading;
      smoothInitialized = true;
    } else {
      smoothHeading = smoothHeading + angleDiff(heading, smoothHeading) * 0.25;
      if (smoothHeading < 0) smoothHeading += 360;
      if (smoothHeading >= 360) smoothHeading -= 360;
    }
    displayHeading = smoothHeading;
  } else {
    smoothHeading = heading;
    smoothInitialized = true;
  }
  
  // Lock
  if (isLocked) {
    displayHeading = lockedHeading;
  }
  
  const displayDeg = Math.round(displayHeading);
  const dir = getDirection(displayHeading);
  
  degDisplay.textContent = String(displayDeg).padStart(3, '0');
  dirDisplay.textContent = isLocked ? '🔒 LOCKED' : dir.long;
  
  // Rotate compass
  dialGroup.setAttribute('transform', `rotate(${-displayHeading}, 200, 200)`);
  
  // Info
  infoAz.textContent = displayDeg + '°';
  
  const magStrength = Math.sqrt(rawMX*rawMX + rawMY*rawMY + rawMZ*rawMZ);
  infoMag.textContent = magStrength > 0 ? magStrength.toFixed(1) + 'µT' : '---';
  
  const delta = Math.abs(angleDiff(displayHeading, lastHeading));
  infoDelta.textContent = delta.toFixed(1) + '°';
  infoDelta.style.color = delta > 10 ? 'var(--red)' : delta > 3 ? 'var(--gold)' : 'var(--green)';
  lastHeading = displayHeading;
  
  // Update counter
  updateCount++;
  const now = performance.now();
  if (now - lastUpdateTime >= 1000) {
    infoUpd.textContent = updateCount;
    updateCount = 0;
    lastUpdateTime = now;
  }
  
  // History for graph
  history[historyIndex] = displayHeading;
  historyIndex = (historyIndex + 1) % history.length;
}

// ============================================================
// GRAPH RENDER
// ============================================================
function drawGraph() {
  const rect = graphCanvas.parentElement.getBoundingClientRect();
  graphCanvas.width = rect.width * 2;
  graphCanvas.height = rect.height * 2;
  ctx.scale(2, 2);
  
  const w = graphCanvas.width / 2;
  const h = graphCanvas.height / 2;
  
  ctx.clearRect(0, 0, w, h);
  
  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);
  ctx.stroke();
  ctx.setLineDash([]);
  
  // Plot
  ctx.strokeStyle = 'rgba(255,23,68,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  
  const len = history.length;
  for (let i = 0; i < len; i++) {
    const idx = (historyIndex + i) % len;
    const val = history[idx];
    const x = (i / len) * w;
    const y = h/2 - (val - 180) / 180 * (h/2 - 2);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  // Current point
  const lastVal = history[(historyIndex - 1 + len) % len];
  const lastX = w - 2;
  const lastY = h/2 - (lastVal - 180) / 180 * (h/2 - 2);
  ctx.fillStyle = 'var(--red)';
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2.5, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// RENDER LOOP
// ============================================================
function render() {
  if (hasData || isManual) {
    updateDisplay();
    drawGraph();
  }
  
  // FPS
  fpsCount++;
  const now = performance.now();
  if (now - fpsTime >= 500) {
    currentFps = Math.round(fpsCount / ((now - fpsTime) / 1000));
    fpsEl.textContent = currentFps + ' FPS';
    fpsCount = 0;
    fpsTime = now;
  }
  
  requestAnimationFrame(render);
}

// ============================================================
// DIAGNOSTICS
// ============================================================
function updateDiag() {
  let html = '';
  html += `<div>Secure Context: <span class="${window.isSecureContext ? 'ok' : 'err'}">${window.isSecureContext ? '✅' : '❌'}</span></div>`;
  html += `<div>HTTPS: <span class="${location.protocol === 'https:' ? 'ok' : 'err'}">${location.protocol}</span></div>`;
  html += `<div>DeviceOrientation API: <span class="${typeof DeviceOrientationEvent !== 'undefined' ? 'ok' : 'err'}">${typeof DeviceOrientationEvent !== 'undefined' ? '✅' : '❌'}</span></div>`;
  html += `<div>&nbsp;</div>`;
  html += `<div>deviceorientationabsolute: <span class="${diag.doaFired ? (diag.doaData ? 'ok' : 'warn') : 'err'}">${diag.doaFired ? (diag.doaData ? '✅ DATA ('+diag.doaCount+'x)' : '⚠️ FIRED NO DATA') : '❌'}</span></div>`;
  if (diag.doaLast) html += `<div>&nbsp;&nbsp;α:${diag.doaLast.alpha?.toFixed(1) || 'null'} β:${diag.doaLast.beta?.toFixed(1) || 'null'} γ:${diag.doaLast.gamma?.toFixed(1) || 'null'}</div>`;
  html += `<div>deviceorientation: <span class="${diag.doFired ? (diag.doData ? 'ok' : 'warn') : 'err'}">${diag.doFired ? (diag.doData ? '✅ DATA ('+diag.doCount+'x)' : '⚠️ FIRED NO DATA') : '❌'}</span></div>`;
  if (diag.doLast) html += `<div>&nbsp;&nbsp;α:${diag.doLast.alpha?.toFixed(1) || 'null'} β:${diag.doLast.beta?.toFixed(1) || 'null'} γ:${diag.doLast.gamma?.toFixed(1) || 'null'}</div>`;
  html += `<div>devicemotion: <span class="${diag.dmFired ? 'ok' : 'err'}">${diag.dmFired ? '✅ ('+diag.dmCount+'x)' : '❌'}</span></div>`;
  html += `<div>Magnetometer API: <span class="${'Magnetometer' in window ? (diag.magFired ? 'ok' : 'warn') : 'err'}">${'Magnetometer' in window ? (diag.magFired ? '✅ ('+diag.magCount+'x)' : '⚠️ AVAILABLE NO DATA') : '❌'}</span></div>`;
  if (diag.magLast) html += `<div>&nbsp;&nbsp;x:${diag.magLast.x?.toFixed(1)} y:${diag.magLast.y?.toFixed(1)} z:${diag.magLast.z?.toFixed(1)}</div>`;
  html += `<div>&nbsp;</div>`;
  html += `<div>Active Strategy: <span class="ok">${activeStrategy}</span></div>`;
  html += `<div>Has Data: <span class="${hasData ? 'ok' : 'err'}">${hasData ? '✅' : '❌'}</span></div>`;
  html += `<div>&nbsp;</div>`;
  html += `<div style="color:var(--gold);font-size:8px">📌 FORCE STRATEGIES:</div>`;
  html += `<div style="font-size:7px;color:#666">1. deviceorientationabsolute (priority)</div>`;
  html += `<div style="font-size:7px;color:#666">2. deviceorientation (absolute flag)</div>`;
  html += `<div style="font-size:7px;color:#666">3. Magnetometer API + tilt compensation</div>`;
  html += `<div style="font-size:7px;color:#666">4. Manual touch (fallback)</div>`;
  html += `<div style="font-size:7px;color:#666;margin-top:4px">💡 Tips Oppo A9: Buka Chrome &gt; Setelan &gt; Setelan Situs &gt; Gerak &gt; Izinkan</div>`;
  
  diagPanel.innerHTML = html;
}

// ============================================================
// BUTTON HANDLERS
// ============================================================
btnCalibrate.addEventListener('click', function() {
  if (isManual) {
    alert('Kalibrasi tidak tersedia dalam mode manual');
    return;
  }
  
  if (isCalibrating) {
    isCalibrating = false;
    btnCalibrate.classList.remove('calibrating');
    btnCalibrate.textContent = '⚡ KALIBRASI';
    return;
  }
  
  isCalibrating = true;
  btnCalibrate.classList.add('calibrating');
  btnCalibrate.textContent = '⏳ KALIBRASI...';
  
  let totalChange = 0;
  let lastCalHeading = heading;
  let calCount = 0;
  
  const calInterval = setInterval(() => {
    const change = Math.abs(angleDiff(heading, lastCalHeading));
    totalChange += change;
    lastCalHeading = heading;
    calCount++;
    
    if (totalChange > 500 || calCount > 120) {
      clearInterval(calInterval);
      isCalibrating = false;
      btnCalibrate.classList.remove('calibrating');
      btnCalibrate.textContent = '⚡ KALIBRASI';
      alert('✅ Kalibrasi selesai! Putar HP membentuk angka 8 untuk hasil terbaik.');
    }
  }, 100);
});

btnLock.addEventListener('click', function() {
  isLocked = !isLocked;
  if (isLocked) {
    lockedHeading = Math.round(heading);
    btnLock.textContent = '🔓 LEPAS';
    btnLock.classList.add('active');
  } else {
    btnLock.textContent = '🔒 KUNCI';
    btnLock.classList.remove('active');
  }
  updateStatus();
});

btnSmooth.addEventListener('click', function() {
  isSmooth = !isSmooth;
  smoothInitialized = false;
  if (isSmooth) {
    btnSmooth.classList.add('active');
    btnSmooth.textContent = '🌀 RAW';
  } else {
    btnSmooth.classList.remove('active');
    btnSmooth.textContent = '🌀 SMOOTH';
  }
  updateStatus();
});

btnManual.addEventListener('click', function() {
  isManual = !isManual;
  if (isManual) {
    btnManual.classList.add('active');
    btnManual.textContent = '✋ AUTO';
    manualBadge.classList.add('show');
    hasData = true;
    activeStrategy = 'MANUAL';
    toast('Mode manual aktif - geser kompas!');
  } else {
    btnManual.classList.remove('active');
    btnManual.textContent = '✋ MANUAL';
    manualBadge.classList.remove('show');
    if (!hasData) {
      activeStrategy = 'NONE';
      toast('Kembali ke mode sensor');
    }
  }
  updateStatus();
});

diagToggle.addEventListener('click', function() {
  diagPanel.classList.toggle('open');
  if (diagPanel.classList.contains('open')) {
    updateDiag();
  }
});

// ============================================================
// TOAST
// ============================================================
function toast(msg) {
  const old = document.querySelector('.toast-msg');
  if (old) old.remove();
  
  const el = document.createElement('div');
  el.className = 'toast-msg';
  el.style.cssText = `
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); color: #fff; padding: 10px 20px;
    border-radius: 8px; font-size: 11px; font-family: 'Courier New', monospace;
    z-index: 999; border: 1px solid rgba(255,23,68,0.3);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5); max-width: 90%;
    text-align: center; font-weight: 700; letter-spacing: 0.5px;
  `;
  el.textContent = msg;
  document.body.appendChild(el);
  
  setTimeout(() => {
    if (el.parentNode) el.remove();
  }, 3000);
}

// ============================================================
// AUTO-START WITH PERMISSION CHECK
// ============================================================
async function start() {
  // Request permission for iOS
  if (typeof DeviceOrientationEvent !== 'undefined' && 
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const result = await DeviceOrientationEvent.requestPermission();
      if (result !== 'granted') {
        toast('⚠️ Izin sensor diperlukan');
        // Still try to start with manual fallback
      }
    } catch(e) {}
  }
  
  // Initialize everything
  generateTicks();
  initSensors();
  initManualMode();
  
  // Update status after sensors initialized
  setTimeout(() => {
    updateStatus();
    updateDiag();
    
    // If no data after 5 seconds, show manual suggestion
    if (!hasData && !isManual) {
      setTimeout(() => {
        if (!hasData && !isManual) {
          toast('💡 Tidak ada sensor? Aktifkan mode MANUAL');
          btnManual.style.animation = 'pulse 0.8s ease-in-out 3';
          setTimeout(() => {
            btnManual.style.animation = '';
          }, 2400);
        }
      }, 5000);
    }
  }, 500);
  
  // Start render loop
  render();
  
  // Periodic diag update
  setInterval(updateDiag, 3000);
}

// ============================================================
// BOOT
// ============================================================
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', start);
} else {
  start();
}

// Handle resize for graph
window.addEventListener('resize', () => {
  drawGraph();
});

})();
</script>
