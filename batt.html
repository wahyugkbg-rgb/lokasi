<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚡ Neural Battery · Analisis Futuristik</title>
    <!-- Chart.js ringan & modern -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #f9f3ff, #e0f0ff);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .dashboard {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.38);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 60px 60px 40px 40px;
            padding: 28px 32px 38px;
            box-shadow: 0 30px 60px rgba(0, 20, 50, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: all 0.2s ease;
        }

        /* header futuristik */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-weight: 650;
            font-size: 2.1rem;
            background: linear-gradient(145deg, #0b1a3a, #2d4b7c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 small {
            font-size: 0.9rem;
            background: rgba(10, 40, 80, 0.15);
            padding: 6px 18px;
            border-radius: 80px;
            color: #1c3b66;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .badge-time {
            background: rgba(0, 20, 60, 0.08);
            padding: 10px 24px;
            border-radius: 80px;
            font-weight: 500;
            color: #0a2647;
            border: 1px solid rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            box-shadow: 0 8px 16px -8px rgba(0,0,0,0.05);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* kartu utama */
        .grid-utama {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr 1fr;
            gap: 22px;
            margin-bottom: 32px;
        }

        .card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 22px 22px 26px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 30px -12px rgba(0, 20, 40, 0.15);
            transition: all 0.2s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 25px 40px -16px #1d3b6b30;
        }

        .card-title {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #2c4b74;
            opacity: 0.8;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .battery-level {
            font-size: 3.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0b2b5c, #3a6e9f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .battery-sub {
            font-size: 1.2rem;
            font-weight: 400;
            color: #1e3d62;
            margin-left: 6px;
        }

        .status-badge {
            display: inline-block;
            margin-top: 6px;
            padding: 8px 22px;
            border-radius: 80px;
            background: rgba(0, 200, 100, 0.2);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 200, 100, 0.3);
            font-weight: 600;
            font-size: 0.95rem;
            color: #005f3a;
        }

        .status-badge.charging {
            background: rgba(0, 180, 255, 0.2);
            border-color: #0099ff80;
            color: #005f9e;
        }

        .time-metrics {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px 24px;
        }

        .metric-item {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            padding: 4px 14px 4px 10px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .metric-item label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #1f3f64;
            opacity: 0.7;
        }

        .metric-item span {
            font-weight: 650;
            color: #0f2c4a;
            margin-left: 6px;
        }

        /* grafik */
        .chart-wrapper {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 38px;
            padding: 16px 12px 6px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            margin: 12px 0 10px;
            height: 200px;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .tips-box {
            background: rgba(230, 245, 255, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px 22px;
            border-left: 6px solid #3f8cff;
            margin-top: 14px;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .tips-box p {
            font-weight: 500;
            color: #0d2f4e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tips-box i {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 6px #3f8cff80);
        }

        .btn-agresif {
            background: linear-gradient(145deg, #ffffff, #e6f0ff);
            border: none;
            padding: 12px 24px;
            border-radius: 80px;
            font-weight: 600;
            color: #00337a;
            border: 1px solid white;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px -6px #001c3d30;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
        }

        .btn-agresif:hover {
            background: white;
            transform: scale(1.02);
            box-shadow: 0 12px 28px -8px #002b5e60;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            gap: 16px;
        }

        .history-badge {
            background: rgba(0, 30, 70, 0.04);
            padding: 8px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.5);
            font-size: 0.9rem;
            color: #1a3860;
        }

        @media (max-width: 920px) {
            .grid-utama {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .dashboard {
                padding: 20px;
            }
            .header h1 {
                font-size: 1.7rem;
            }
        }

        /* animasi halus */
        .fade-in {
            animation: softRise 0.4s ease;
        }
        @keyframes softRise {
            0% { opacity: 0.5; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .glow-text {
            text-shadow: 0 0 12px #8ab9ff70;
        }
    </style>
</head>
<body>
<div class="dashboard fade-in" id="app">
    <div class="header">
        <h1>⚡ NeuralBattery <small>v.2 · prediktif</small></h1>
        <div class="badge-time" id="liveTime">⏱️ <span id="timeDisplay">--:--:--</span></div>
    </div>

    <!-- grid 3 kartu -->
    <div class="grid-utama">
        <!-- kartu level & status -->
        <div class="card">
            <div class="card-title">🔋 status real-time</div>
            <div>
                <span class="battery-level" id="levelDisplay">--</span><span class="battery-sub">%</span>
                <div id="statusBadge" class="status-badge">⏳ memuat</div>
            </div>
            <div class="time-metrics">
                <div class="metric-item"><label>⏳ pengisian</label> <span id="chargeTime">--</span></div>
                <div class="metric-item"><label>🔋 pemakaian</label> <span id="dischargeTime">--</span></div>
            </div>
            <div style="margin-top: 14px; font-size:0.9rem; background: rgba(0,0,0,0.02); padding: 8px 12px; border-radius: 30px;">
                <span style="opacity:0.6;">📊 histori tersimpan: </span><span id="historyCount">0</span>
            </div>
        </div>

        <!-- kartu grafik (chart) -->
        <div class="card" style="grid-column: span 1;">
            <div class="card-title">📈 pola konsumsi (6 jam)</div>
            <div class="chart-wrapper">
                <canvas id="batteryChart" width="300" height="150"></canvas>
            </div>
            <div style="display: flex; justify-content: flex-end; margin-top: 4px;">
                <span style="font-size:0.7rem; background: #ffffff70; padding: 2px 16px; border-radius: 50px;">estimasi waktu pakai</span>
            </div>
        </div>

        <!-- kartu tips & estimasi -->
        <div class="card">
            <div class="card-title">🧠 tips hemat kontekstual</div>
            <div id="tipsContainer" class="tips-box">
                <p><span style="font-size:2rem;">💡</span> <span id="tipText">Memuat saran cerdas...</span></p>
            </div>
            <div style="margin-top: 18px; display: flex; gap: 10px; flex-wrap: wrap;">
                <span class="metric-item"><label>⏱️ estimasi tersisa</label> <span id="estTimeLeft">--</span></span>
                <span class="metric-item"><label>⚡ konsumsi rata-rata</label> <span id="avgConsumption">--</span></span>
            </div>
        </div>
    </div>

    <!-- footer interaktif -->
    <div class="footer-actions">
        <div class="history-badge">📀 IndexedDB · <span id="dbStatus">aktif</span></div>
        <div>
            <button class="btn-agresif" id="resetHistoryBtn">⟳ reset histori</button>
            <button class="btn-agresif" id="notifTestBtn" style="margin-left: 8px;">🔔 uji notifikasi</button>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---- DOM refs ----
        const levelDisplay = document.getElementById('levelDisplay');
        const statusBadge = document.getElementById('statusBadge');
        const chargeTimeSpan = document.getElementById('chargeTime');
        const dischargeTimeSpan = document.getElementById('dischargeTime');
        const estTimeLeft = document.getElementById('estTimeLeft');
        const avgConsumption = document.getElementById('avgConsumption');
        const tipText = document.getElementById('tipText');
        const historyCountSpan = document.getElementById('historyCount');
        const timeDisplay = document.getElementById('timeDisplay');

        // ---- Chart.js ----
        const ctx = document.getElementById('batteryChart').getContext('2d');
        let batteryChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['-6h', '-5h', '-4h', '-3h', '-2h', '-1h', 'sekarang'],
                datasets: [{
                    label: 'Level baterai %',
                    data: [72, 68, 61, 53, 44, 38, 32],
                    borderColor: '#2f7be0',
                    backgroundColor: 'rgba(47, 123, 224, 0.08)',
                    borderWidth: 3.5,
                    tension: 0.3,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#1f5bb0',
                    pointRadius: 5,
                    fill: true,
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { backgroundColor: '#0a1e3dcc', titleColor: '#d6e6ff' }
                },
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#b8cef0', lineWidth: 0.5 }, ticks: { color: '#1a3a62' } },
                    x: { grid: { display: false }, ticks: { color: '#1a3a62' } }
                }
            }
        });

        // ---- IndexedDB ----
        let db = null;
        const DB_NAME = 'BatteryHistoryDB';
        const STORE_NAME = 'history';

        function openDB() {
            return new Promise((resolve, reject) => {
                const req = indexedDB.open(DB_NAME, 2);
                req.onupgradeneeded = (ev) => {
                    const db = ev.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'timestamp' });
                        store.createIndex('level', 'level', { unique: false });
                    }
                };
                req.onsuccess = (ev) => { db = ev.target.result; resolve(db); };
                req.onerror = (ev) => reject(ev.target.error);
            });
        }

        async function saveHistory(level, charging) {
            try {
                if (!db) await openDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const entry = { timestamp: Date.now(), level: Math.round(level), charging };
                store.put(entry);
                await new Promise((resolve, reject) => {
                    tx.oncomplete = resolve;
                    tx.onerror = (e) => reject(e.target.error);
                });
            } catch (e) { console.warn('DB save error', e); }
        }

        async function getHistory(limit = 20) {
            try {
                if (!db) await openDB();
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const index = store.index('level');
                const data = await new Promise((resolve, reject) => {
                    const result = [];
                    const cursor = store.openCursor(null, 'prev');
                    cursor.onsuccess = (e) => {
                        const cur = e.target.result;
                        if (cur && result.length < limit) {
                            result.push(cur.value);
                            cur.continue();
                        } else {
                            resolve(result);
                        }
                    };
                    cursor.onerror = (e) => reject(e.target.error);
                });
                return data;
            } catch (e) { console.warn('getHistory error', e); return []; }
        }

        async function clearHistory() {
            if (!db) await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.clear();
            await new Promise((resolve, reject) => {
                tx.oncomplete = resolve;
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        // ---- update UI dengan data baterai ----
        function updateUI(level, charging, chargingTime, dischargingTime) {
            const levelInt = Math.round(level * 100);
            levelDisplay.textContent = levelInt;
            // status
            if (charging) {
                statusBadge.textContent = '⚡ sedang mengisi';
                statusBadge.className = 'status-badge charging';
            } else {
                statusBadge.textContent = '🔋 menggunakan baterai';
                statusBadge.className = 'status-badge';
            }
            // waktu
            if (charging && chargingTime !== Infinity && chargingTime > 0) {
                const mins = Math.floor(chargingTime / 60);
                const secs = Math.floor(chargingTime % 60);
                chargeTimeSpan.textContent = `${mins}m ${secs}s`;
            } else {
                chargeTimeSpan.textContent = charging ? '⏳ menghitung...' : '--';
            }
            if (!charging && dischargingTime !== Infinity && dischargingTime > 0) {
                const mins = Math.floor(dischargingTime / 60);
                const secs = Math.floor(dischargingTime % 60);
                dischargeTimeSpan.textContent = `${mins}m ${secs}s`;
                estTimeLeft.textContent = `${mins}m ${secs}s`;
            } else {
                dischargeTimeSpan.textContent = '--';
                estTimeLeft.textContent = '--';
            }

            // estimasi konsumsi rata-rata (simulasi cerdas)
            const avg = (100 - levelInt) / 6; 
            avgConsumption.textContent = avg.toFixed(1) + '%/jam';

            // tips kontekstual
            if (charging) {
                tipText.textContent = '🔌 Sedang mengisi: sambungkan ke charger cepat jika tersedia.';
            } else if (levelInt < 20) {
                tipText.textContent = '⚠️ Baterai kritis! Aktifkan mode hemat & redupkan layar.';
            } else if (levelInt < 50) {
                tipText.textContent = '📉 Konsumsi sedang. Matikan GPS & Bluetooth jika tidak perlu.';
            } else {
                tipText.textContent = '✅ Baterai sehat. Pertahankan suhu optimal untuk umur panjang.';
            }
            // update grafik dengan data baru (push shift)
            const chartData = batteryChart.data.datasets[0].data;
            chartData.push(levelInt);
            if (chartData.length > 15) chartData.shift();
            batteryChart.update();

            // simpan ke IndexedDB
            saveHistory(levelInt, charging);
            updateHistoryCount();
        }

        async function updateHistoryCount() {
            const history = await getHistory(50);
            historyCountSpan.textContent = history.length;
        }

        // ---- Battery API dengan aggressive polling ----
        let battery = null;
        async function initBattery() {
            try {
                if (!navigator.getBattery) {
                    throw new Error('Battery API tidak didukung');
                }
                battery = await navigator.getBattery();
                // update pertama
                updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);

                // event listener
                battery.addEventListener('levelchange', () => {
                    updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
                });
                battery.addEventListener('chargingchange', () => {
                    updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
                });
                battery.addEventListener('chargingtimechange', () => {
                    updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
                });
                battery.addEventListener('dischargingtimechange', () => {
                    updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
                });

                // polling agresif setiap 15 detik untuk pembaruan ekstra
                setInterval(() => {
                    if (battery) {
                        updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
                    }
                }, 15000);
            } catch (e) {
                console.warn('Battery API error:', e);
                levelDisplay.textContent = '--';
                statusBadge.textContent = '⚠️ API tidak tersedia';
                tipText.textContent = 'Gunakan browser modern dengan Battery API.';
            }
        }

        // ---- Notification API ----
        async function triggerNotification() {
            if (!('Notification' in window)) {
                alert('Notifikasi tidak didukung di browser ini.');
                return;
            }
            if (Notification.permission === 'granted') {
                new Notification('🔋 NeuralBattery', {
                    body: `Level baterai saat ini: ${levelDisplay.textContent}%`,
                    icon: '🔋'
                });
            } else if (Notification.permission === 'denied') {
                alert('Izin notifikasi ditolak. Aktifkan di pengaturan browser.');
            } else {
                const perm = await Notification.requestPermission();
                if (perm === 'granted') {
                    new Notification('✅ Notifikasi diaktifkan!', { body: 'Siap memantau baterai.' });
                }
            }
        }

        // ---- reset history ----
        async function resetHistory() {
            if (confirm('Hapus semua histori baterai?')) {
                await clearHistory();
                updateHistoryCount();
                // reset chart ke default
                batteryChart.data.datasets[0].data = [72, 68, 61, 53, 44, 38, 32];
                batteryChart.update();
                tipText.textContent = '🔄 Histori direset. Mulai pencatatan baru.';
            }
        }

        // ---- waktu realtime ----
        function updateClock() {
            const d = new Date();
            timeDisplay.textContent = d.toLocaleTimeString('id-ID', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ---- inisialisasi ----
        window.addEventListener('load', async () => {
            await openDB();
            await updateHistoryCount();
            initBattery();

            // ambil histori untuk grafik awal (opsional)
            const history = await getHistory(12);
            if (history.length > 2) {
                const levels = history.map(h => h.level).reverse();
                const chartData = batteryChart.data.datasets[0].data;
                // ambil 7 terakhir
                const last7 = levels.slice(-7);
                if (last7.length === 7) {
                    batteryChart.data.datasets[0].data = last7;
                    batteryChart.update();
                }
            }
        });

        // ---- event binding ----
        document.getElementById('resetHistoryBtn').addEventListener('click', resetHistory);
        document.getElementById('notifTestBtn').addEventListener('click', triggerNotification);

        // juga update saat kembali ke tab (agresif)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && battery) {
                updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
            }
        });

        // Interval tambahan untuk update chart dan history count
        setInterval(() => {
            if (battery) {
                updateUI(battery.level, battery.charging, battery.chargingTime, battery.dischargingTime);
            }
            updateHistoryCount();
        }, 8000);

        console.log('⚡ NeuralBattery siap — futuristik & agresif');
    })();
</script>
</body>
</html>
