<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>NeoBattery · Analisis Real-time</title>
  <!-- Chart.js 3.9.1 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <!-- Font & ikon tambahan -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(145deg, #f9f3e8 0%, #fff9f0 100%);
      min-height: 100vh;
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* wadah futuristik dengan glassmorphism + neon aksen */
    .dashboard {
      max-width: 1200px;
      width: 100%;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border-radius: 56px;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 60px rgba(0, 20, 30, 0.15), 0 0 0 1px rgba(255, 215, 150, 0.3);
      border: 1px solid rgba(255, 235, 200, 0.7);
      transition: all 0.2s ease;
    }

    /* judul & header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-weight: 700;
      font-size: 2.1rem;
      background: linear-gradient(135deg, #f97316, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header h1 i {
      background: rgba(251, 191, 36, 0.25);
      padding: 8px 12px;
      border-radius: 60px;
      font-size: 1.8rem;
      -webkit-text-fill-color: #f97316;
    }

    .real-time-badge {
      background: rgba(16, 185, 129, 0.2);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1.4rem;
      border-radius: 60px;
      border: 1px solid #34d399;
      color: #065f46;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 0 15px rgba(52, 211, 153, 0.3);
    }

    .real-time-badge i {
      color: #10b981;
      font-size: 1rem;
      animation: pulse-dot 1.8s infinite;
    }

    @keyframes pulse-dot {
      0% { opacity: 0.4; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.4; transform: scale(0.9); }
    }

    /* kartu stat */
    .grid-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 32px;
      padding: 1rem 1.2rem;
      border: 1px solid rgba(255, 215, 150, 0.4);
      box-shadow: 0 8px 20px -8px rgba(0,0,0,0.05);
      transition: 0.2s;
    }

    .stat-card .label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #7c6b5a;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #1e1a16;
      margin-top: 6px;
    }

    .stat-card .sub {
      font-size: 0.8rem;
      color: #5b4d3e;
      opacity: 0.8;
    }

    /* grafik */
    .chart-wrapper {
      background: rgba(255, 250, 240, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 1.5rem 1rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 215, 150, 0.3);
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
    }

    .chart-container {
      position: relative;
      height: 200px;
      width: 100%;
    }

    /* tips + peringatan */
    .action-row {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: stretch;
      margin-bottom: 1.5rem;
    }

    .tips-box {
      flex: 2;
      min-width: 200px;
      background: rgba(255, 243, 224, 0.6);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 1.2rem 1.5rem;
      border-left: 6px solid #fbbf24;
    }

    .tips-box h4 {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #92400e;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 6px;
    }

    .tips-box p {
      color: #5b3d1a;
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .notification-preview {
      flex: 1;
      min-width: 150px;
      background: rgba(220, 245, 235, 0.5);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #a7f3d0;
      color: #065f46;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .notification-preview i {
      font-size: 1.6rem;
      color: #10b981;
    }

    .btn-request {
      background: #fbbf24;
      border: none;
      border-radius: 60px;
      padding: 0.5rem 1.2rem;
      font-weight: 700;
      color: #1e1a16;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 16px -6px rgba(251, 191, 36, 0.4);
      transition: 0.15s;
      cursor: pointer;
      border: 1px solid #fcd34d;
    }

    .btn-request:active { transform: scale(0.95); }

    .footer-note {
      display: flex;
      justify-content: flex-end;
      font-size: 0.7rem;
      color: #a28d78;
      margin-top: 0.5rem;
      letter-spacing: 0.3px;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* HP */
    @media (max-width: 600px) {
      .dashboard { padding: 1.2rem 1rem; border-radius: 32px; }
      .header h1 { font-size: 1.6rem; }
      .stat-card .value { font-size: 1.7rem; }
      .chart-container { height: 160px; }
      .action-row { flex-direction: column; }
    }

    /* smooth */
    .fade-in { animation: fadeUp 0.6s ease; }
    @keyframes fadeUp { 0% { opacity: 0.3; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
<div class="dashboard fade-in" id="app">
  <div class="header">
    <h1><i class="fas fa-bolt"></i> NeoBattery</h1>
    <span class="real-time-badge"><i class="fas fa-circle"></i> LIVE · realtime</span>
  </div>

  <!-- Stat cards -->
  <div class="grid-stats" id="statsGrid">
    <div class="stat-card"><div class="label"><i class="fas fa-battery-three-quarters"></i> Level</div><div class="value" id="battLevel">--%</div><div class="sub" id="battStatus">Memuat...</div></div>
    <div class="stat-card"><div class="label"><i class="fas fa-clock"></i> Sisa pakai</div><div class="value" id="dischargeTime">--</div><div class="sub">estimasi</div></div>
    <div class="stat-card"><div class="label"><i class="fas fa-plug"></i> Waktu isi</div><div class="value" id="chargeTime">--</div><div class="sub">hingga penuh</div></div>
    <div class="stat-card"><div class="label"><i class="fas fa-history"></i> Histori</div><div class="value" id="historyCount">0</div><div class="sub">data tersimpan</div></div>
  </div>

  <!-- Grafik -->
  <div class="chart-wrapper">
    <div class="chart-container">
      <canvas id="batteryChart"></canvas>
    </div>
  </div>

  <!-- Tips & notifikasi -->
  <div class="action-row">
    <div class="tips-box" id="tipsBox">
      <h4><i class="fas fa-lightbulb" style="color: #f59e0b;"></i> Tips hemat kontekstual</h4>
      <p id="tipText">Memuat saran cerdas...</p>
    </div>
    <div class="notification-preview" id="notifBox">
      <i class="fas fa-bell"></i>
      <span id="notifMessage">Notifikasi siap</span>
      <button class="btn-request" id="notifBtn"><i class="fas fa-check-circle"></i> Izin</button>
    </div>
  </div>

  <div class="footer-note">
    <span><i class="fas fa-database"></i> IndexedDB · histori lokal</span>
    <span><i class="fas fa-chart-line"></i> analisis pola real-time</span>
  </div>
</div>

<script>
  (function(){
    "use strict";

    // ---- elemen ----
    const battLevel = document.getElementById('battLevel');
    const battStatus = document.getElementById('battStatus');
    const dischargeTime = document.getElementById('dischargeTime');
    const chargeTime = document.getElementById('chargeTime');
    const historyCount = document.getElementById('historyCount');
    const tipText = document.getElementById('tipText');
    const notifMessage = document.getElementById('notifMessage');

    // ---- IndexedDB ----
    const DB_NAME = 'BatteryHistoryDB';
    const STORE_NAME = 'history';
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = (ev) => {
          const d = ev.target.result;
          if (!d.objectStoreNames.contains(STORE_NAME)) {
            d.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
          }
        };
        request.onsuccess = (ev) => { db = ev.target.result; resolve(db); };
        request.onerror = (ev) => reject(ev.target.error);
      });
    }

    function saveHistory(entry) {
      return openDB().then(d => {
        return new Promise((resolve, reject) => {
          const tx = d.transaction(STORE_NAME, 'readwrite');
          const store = tx.objectStore(STORE_NAME);
          const req = store.add(entry);
          req.onsuccess = () => resolve();
          req.onerror = () => reject(req.error);
        });
      });
    }

    function getHistoryCount() {
      return openDB().then(d => {
        return new Promise((resolve, reject) => {
          const tx = d.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.count();
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      });
    }

    function getLastHistory(limit = 20) {
      return openDB().then(d => {
        return new Promise((resolve, reject) => {
          const tx = d.transaction(STORE_NAME, 'readonly');
          const store = tx.objectStore(STORE_NAME);
          const req = store.openCursor(null, 'prev');
          const results = [];
          let count = 0;
          req.onsuccess = (ev) => {
            const cursor = ev.target.result;
            if (cursor && count < limit) {
              results.push(cursor.value);
              count++;
              cursor.continue();
            } else {
              resolve(results.reverse());
            }
          };
          req.onerror = () => reject(req.error);
        });
      });
    }

    // ---- Chart.js ----
    const ctx = document.getElementById('batteryChart').getContext('2d');
    let chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [{
          label: 'Level baterai %',
          data: [],
          borderColor: '#f97316',
          backgroundColor: 'rgba(251, 146, 60, 0.15)',
          borderWidth: 3,
          pointBackgroundColor: '#fbbf24',
          pointBorderColor: '#fff',
          pointRadius: 4,
          tension: 0.2,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: 'rgba(30,25,20,0.8)', titleColor: '#fbbf24' }
        },
        scales: {
          y: { min: 0, max: 100, grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { stepSize: 20 } },
          x: { grid: { display: false }, ticks: { maxTicksLimit: 8 } }
        },
        interaction: { intersect: false, mode: 'index' }
      }
    });

    // update chart dari histori
    async function refreshChart() {
      try {
        const history = await getLastHistory(20);
        const labels = history.map((_, idx) => `T-${history.length - idx}`);
        const data = history.map(h => Math.round(h.level * 100));
        chart.data.labels = labels;
        chart.data.datasets[0].data = data;
        chart.update();
        const count = await getHistoryCount();
        historyCount.innerText = count;
      } catch (e) { console.warn('chart update error', e); }
    }

    // ---- notifikasi ----
    async function requestNotifPermission() {
      if (!('Notification' in window)) {
        notifMessage.innerText = 'Tidak support';
        return;
      }
      if (Notification.permission === 'granted') {
        notifMessage.innerText = 'Izin diberikan ✅';
        return;
      }
      if (Notification.permission === 'denied') {
        notifMessage.innerText = 'Izin ditolak';
        return;
      }
      const result = await Notification.requestPermission();
      if (result === 'granted') {
        notifMessage.innerText = 'Notifikasi aktif!';
        // kirim test
        new Notification('⚡ NeoBattery siap', { body: 'Peringatan baterai akan dikirim.', icon: '🔋' });
      } else {
        notifMessage.innerText = 'Izin diperlukan';
      }
    }
    document.getElementById('notifBtn').addEventListener('click', requestNotifPermission);

    // kirim notifikasi jika level rendah ( < 20% )
    function sendLowBatteryNotif(level) {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      if (level < 0.2) {
        new Notification('⚠️ Baterai rendah', { body: `Level ${Math.round(level*100)}%. Segera charge.`, icon: '🔋' });
      } else if (level > 0.85 && navigator.getBattery) {
        // notifikasi hampir penuh (opsional)
        new Notification('🔋 Baterai hampir penuh', { body: `Level ${Math.round(level*100)}%`, icon: '🔋' });
      }
    }

    // ---- tips kontekstual ----
    function updateTips(level, charging) {
      let msg = '';
      if (charging) {
        if (level < 0.3) msg = '⚡ Isi daya cepat: hindari penggunaan berat saat charging.';
        else if (level < 0.7) msg = '🔋 Pengisian stabil. Jaga suhu baterai tidak terlalu panas.';
        else msg = '✅ Hampir penuh! Cabut charger di 100% untuk menjaga umur baterai.';
      } else {
        if (level < 0.15) msg = '🚨 Baterai kritis! Aktifkan mode hemat segera.';
        else if (level < 0.35) msg = '📉 Kurangi kecerahan & matikan GPS untuk hemat daya.';
        else if (level < 0.6) msg = '⚖️ Konsumsi normal. Tutup aplikasi yang tidak digunakan.';
        else msg = '👍 Baterai sehat. Pertahankan pola penggunaan ini.';
      }
      tipText.innerText = msg;
    }

    // ---- update UI dari Battery API ----
    async function updateBatteryUI(battery) {
      const level = battery.level; // 0..1
      const charging = battery.charging;
      const chargingTime = battery.chargingTime;
      const dischargingTime = battery.dischargingTime;

      // stat
      battLevel.innerText = `${Math.round(level * 100)}%`;
      battStatus.innerText = charging ? '🔌 Mengisi' : '🔋 Memakai';
      if (charging && chargingTime !== Infinity && chargingTime > 0) {
        const mins = Math.ceil(chargingTime / 60);
        chargeTime.innerText = `${mins} mnt`;
      } else if (charging) {
        chargeTime.innerText = '~ menghitung';
      } else {
        chargeTime.innerText = '--';
      }

      if (!charging && dischargingTime !== Infinity && dischargingTime > 0) {
        const mins = Math.ceil(dischargingTime / 60);
        dischargeTime.innerText = `${mins} mnt`;
      } else if (!charging) {
        dischargeTime.innerText = '~ menghitung';
      } else {
        dischargeTime.innerText = '--';
      }

      // tips
      updateTips(level, charging);

      // simpan ke indexedDB
      const entry = { level, charging, timestamp: Date.now() };
      await saveHistory(entry);

      // refresh chart & count
      await refreshChart();

      // notifikasi peringatan
      sendLowBatteryNotif(level);

      // notif box info
      if (level < 0.2 && !charging) {
        notifMessage.innerText = '⚠️ Baterai rendah!';
      } else if (charging && level > 0.9) {
        notifMessage.innerText = '🔋 Hampir penuh';
      } else {
        notifMessage.innerText = charging ? '⚡ Mengisi daya' : '📊 Memantau';
      }
    }

    // ---- main loop: ambil baterai & update ----
    async function batteryLoop() {
      try {
        if (!navigator.getBattery) {
          battStatus.innerText = 'Tidak support';
          return;
        }
        const battery = await navigator.getBattery();
        // update pertama
        await updateBatteryUI(battery);
        // event listener
        battery.addEventListener('levelchange', () => updateBatteryUI(battery));
        battery.addEventListener('chargingchange', () => updateBatteryUI(battery));
        battery.addEventListener('chargingtimechange', () => updateBatteryUI(battery));
        battery.addEventListener('dischargingtimechange', () => updateBatteryUI(battery));

        // interval tambahan (real-time) setiap 30 detik refresh chart & count
        setInterval(async () => {
          try {
            const bat = await navigator.getBattery();
            await updateBatteryUI(bat);
          } catch (e) {}
        }, 30000);

        // request notifikasi di awal
        if (Notification.permission === 'default') {
          // minta izin pasif
          setTimeout(() => requestNotifPermission(), 2000);
        }
      } catch (err) {
        battStatus.innerText = 'Error';
        console.warn(err);
      }
    }

    // inisialisasi
    batteryLoop();

    // load histori awal
    refreshChart();

    // request izin notifikasi via tombol sudah di atas

    // fungsi tambahan: jika tidak ada data, tampilkan contoh dummy (agar grafik tidak kosong)
    setTimeout(async () => {
      try {
        const count = await getHistoryCount();
        if (count === 0) {
          // seed dummy
          for (let i = 0; i < 6; i++) {
            const lvl = 0.3 + (i * 0.1) + Math.random() * 0.05;
            await saveHistory({ level: Math.min(lvl, 0.95), charging: false, timestamp: Date.now() - (60000 * (6-i)) });
          }
          await refreshChart();
        }
      } catch (_) {}
    }, 800);

  })();
</script>
</body>
</html>
